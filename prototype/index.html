<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lumen — Your Personal Style Guide</title>
<style>
:root {
  --bg:#FFFFFF; --card:#F5F5F5; --photo:#F0EEEC;
  --tx1:#111111; --tx2:#666666; --tx3:#999999;
  --accent:#E8490F; --border:#E5E5E5;
  --font:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--tx1); font-family:var(--font); -webkit-font-smoothing:antialiased; }

.lumen-app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* HEADER */
.l-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; z-index:10; }
.l-logo { font-size:20px; font-weight:700; color:var(--tx1); display:flex; align-items:center; gap:4px; }
.l-dot { width:8px; height:8px; border-radius:50%; background:radial-gradient(circle,#F5C842,#E8490F); display:inline-block; flex-shrink:0; }
.l-profile-btn { width:36px; height:36px; border-radius:50%; background:var(--card); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--tx2); }

/* CHAT */
.l-chat { flex:1; overflow-y:auto; overflow-x:hidden; padding:16px 0 140px; -webkit-overflow-scrolling:touch; }
.l-chat::-webkit-scrollbar { display:none; }

/* MESSAGES */
.l-msg { display:flex; align-items:flex-end; gap:8px; padding:3px 16px; margin-bottom:2px; }
.l-msg.ai { flex-direction:row; }
.l-msg.user { flex-direction:row-reverse; }
.l-av { width:28px; height:28px; border-radius:50%; background:var(--tx1); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-bottom:2px; }
.l-av.user { background:#E8E8E8; }
.l-bbl { max-width:78%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; }
.l-bbl.ai { background:var(--card); color:var(--tx1); border-bottom-left-radius:4px; }
.l-bbl.user { background:var(--tx1); color:#fff; border-bottom-right-radius:4px; }

/* CHIPS */
.l-chips { display:flex; flex-wrap:wrap; gap:7px; padding:4px 16px 8px 52px; }
.l-chip { padding:7px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg); font-size:13px; font-weight:500; color:var(--tx1); cursor:pointer; font-family:var(--font); transition:all 0.15s; white-space:nowrap; }
.l-chip:active { background:var(--tx1); color:#fff; border-color:var(--tx1); }

/* PRODUCT CARD ROW */
.l-card-row { padding:8px 16px; display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.l-card-row::-webkit-scrollbar { display:none; }

/* PRODUCT CARD */
.l-card { flex-shrink:0; width:200px; border-radius:16px; border:1.5px solid var(--border); background:var(--bg); overflow:hidden; cursor:pointer; scroll-snap-align:start; transition:transform 0.15s; position:relative; }
.l-card:active { transform:scale(0.97); }
.l-card-img { width:100%; height:180px; background:var(--photo); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.l-card-img img { width:100%; height:100%; object-fit:cover; }
.l-card-body { padding:10px 12px 12px; }
.l-card-brand { font-size:10px; font-weight:700; color:var(--tx3); text-transform:uppercase; letter-spacing:0.5px; }
.l-card-name { font-size:13px; font-weight:600; color:var(--tx1); margin:2px 0 4px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.l-card-price-row { display:flex; align-items:center; justify-content:space-between; }
.l-card-price { font-size:15px; font-weight:700; color:var(--tx1); }
.l-card-indicator { font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; }
.l-card-indicator.LOW { background:#E8F5E9; color:#2E7D32; }
.l-card-indicator.USUAL { background:#FFF8E1; color:#F57F17; }
.l-card-indicator.HIGH { background:#FFEBEE; color:#C62828; }
.l-card-source { font-size:11px; color:var(--tx3); margin-top:4px; }
.l-card-stars { font-size:11px; color:var(--tx2); margin-top:2px; }
.l-card-pin { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; background:white; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.l-card-pin.saved { background:var(--tx1); }
.l-card-pin.saved svg { stroke:white; }
.l-expert-badge { position:absolute; top:8px; left:8px; background:var(--accent); color:white; font-size:9px; font-weight:700; padding:3px 7px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }

/* INPUT BAR */
.l-input-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px)); background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; z-index:10; }
.l-input { flex:1; padding:10px 16px; border-radius:24px; border:1.5px solid var(--border); background:var(--card); font-size:15px; font-family:var(--font); color:var(--tx1); outline:none; }
.l-input:focus { border-color:var(--tx1); }
.l-send-btn { width:40px; height:40px; border-radius:50%; background:var(--tx1); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.l-icon-btn { width:40px; height:40px; border-radius:50%; background:var(--card); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* PROFILE SHEET */
.l-profile-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; background:var(--bg); border-radius:20px 20px 0 0; border-top:1px solid var(--border); padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px)); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:100; }
.l-profile-sheet.open { transform:translateX(-50%) translateY(0); }

/* DEEP DIVE */
.l-deep-dive { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; height:85vh; background:var(--bg); border-radius:20px 20px 0 0; overflow-y:auto; transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:200; }
.l-deep-dive::-webkit-scrollbar { display:none; }
.l-deep-dive.open { transform:translateX(-50%) translateY(0); }

/* OVERLAY */
.l-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.l-overlay.show { opacity:1; pointer-events:all; }

/* Style quiz cards */
.sq-card { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border); margin-bottom:8px; cursor:pointer; background:#fff; transition:all 0.15s; }
.sq-card.sel { border-color:var(--tx1); background:var(--card); }

/* Enrich loading */
.enrich-progress { height:2px; background:var(--border); border-radius:1px; margin:10px 0 4px; overflow:hidden; }
.enrich-progress-fill { height:100%; width:35%; background:var(--tx3); border-radius:1px; animation:enrichSlide 1.4s ease-in-out infinite; }
@keyframes enrichSlide { 0%{transform:translateX(-200%);} 100%{transform:translateX(500%);} }

/* DESKTOP */
@media (min-width:768px) {
  .lumen-app { max-width:100%; flex-direction:row; }
  .l-sidebar { width:280px; border-right:1px solid var(--border); padding:24px 20px; flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .l-main { flex:1; display:flex; flex-direction:column; height:100vh; max-width:520px; }
  .l-input-bar { position:sticky; bottom:0; transform:none; left:auto; max-width:none; }
  .l-profile-sheet, .l-deep-dive { max-width:560px; }
}
</style>
</head>
<body>

<div class="lumen-app">

  <!-- HEADER -->
  <div class="l-header">
    <div class="l-logo">Lumen <span class="l-dot"></span></div>
    <div class="l-profile-btn" id="profileBtn" onclick="openProfile()">👤</div>
  </div>

  <!-- Desktop sidebar (visible ≥768px) -->
  <div class="l-sidebar" id="lSidebar" style="display:none">
    <div>
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">Your Profile</div>
      <div id="sidebarPalette" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px"></div>
      <div id="sidebarSeason" style="font-size:13px;color:var(--tx2);margin-bottom:4px"></div>
      <div id="sidebarEmail" style="font-size:12px;color:var(--tx3)"></div>
    </div>
    <div id="sidebarSaved" style="margin-top:8px">
      <div style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">★ Saved</div>
      <div id="sidebarSavedGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
    </div>
  </div>

  <!-- MAIN chat area -->
  <div class="l-main" id="lMain">
    <!-- CHAT THREAD -->
    <div class="l-chat" id="lumenChat"></div>

    <!-- INPUT BAR -->
    <div class="l-input-bar">
      <div style="display:flex;gap:6px;align-items:center">
        <label for="cameraInput" title="Take a photo" class="l-icon-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoUpload(event)">
        </label>
        <label for="galleryInput" title="Upload from gallery" class="l-icon-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)">
        </label>
      </div>
      <input class="l-input" id="lumenInput" type="text" placeholder="Ask Lumen anything about style…">
      <button class="l-send-btn" id="lumenSend">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- PROFILE SHEET -->
  <div class="l-profile-sheet" id="profileSheet">
    <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px"></div>
    <div id="profileContent"></div>
  </div>

  <!-- DEEP DIVE PANEL -->
  <div class="l-deep-dive" id="deepDive"></div>

  <!-- OVERLAY -->
  <div class="l-overlay" id="overlay" onclick="handleOverlayClick()"></div>

</div>

<script>
// ── Supabase config (anon key is public by design) ────────────────────────
const SUPABASE_URL      = 'https://mipdomxenbsmgrsitote.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcGRvbXhlbmJzbWdyc2l0b3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MjM0MzUsImV4cCI6MjA5NTQ5OTQzNX0.5BOsjNK60UMz8woU-tHyNloPACX6lIKOrBF4BgdLdKw';

// ── State ─────────────────────────────────────────────────────────────────
let products        = [];
let savedItems      = [];   // saved product ids
let savedProducts   = [];   // saved product objects
let messages        = [];
let userProfile     = {};
let enrichCache     = {};
let isLoading       = false;
let enrichLoadTimer = null;
let deepDiveOpen    = false;
let profileOpen     = false;

// Onboarding
let onboardingStep   = 0;
let onboardingActive = true;
let styleProfile = { undertone:null, season:null, palette:[], aesthetic:null };

// User context chips
let userGender        = null;
let userAge           = null;
let userCurrentSeason = null;

// Photo upload
let photoBase64   = null;
let photoMimeType = null;

// Auth state
let currentUser    = null;
let currentSession = null;
let currentAuthTab = 'login';

// API mode (auto-detected from message content, invisible to user)
let currentMode = 'style';

const ENRICH_LABELS = [
  'Scanning expert reviews…',
  'Analyzing value for money…',
  'Checking buyer feedback…',
  'Building your expert report…'
];

// ── Utilities ─────────────────────────────────────────────────────────────
function stars(r) {
  const f = Math.round(r || 0);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function parseMarkdown(t) {
  if (!t) return '';
  return t
    .replace(/SEARCH_MODELS:\{[\s\S]*?\}/g, '')
    .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '')
    .replace(/```[\s\S]*?```/g, '')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
    .replace(/^\|\s*(.*?)\s*\|$/gm, row => {
      if (/^[\s|:-]+$/.test(row)) return '';
      const cells = row.split('|').filter(c => c.trim()).map(c => '<td style="padding:4px 8px;border:1px solid var(--border);font-size:12px">' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/gs, m => '<table style="border-collapse:collapse;width:100%;margin:8px 0">' + m + '</table>')
    .replace(/^[-•]\s+(.+)$/gm, '<div style="padding:2px 0 2px 12px;border-left:2px solid var(--accent)">$1</div>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function shortName(p) {
  let n = p.name || '';
  const b = (p.brand || '').toLowerCase();
  if (n.toLowerCase().startsWith(b + ' ' + b)) n = n.slice(p.brand.length + 1);
  if (n.toLowerCase().startsWith(b)) n = p.brand + n.slice(p.brand.length);
  return n.length > 40 ? n.slice(0, 38) + '…' : n;
}

function extractProfile(msgs) {
  const t = msgs.map(m => typeof m.content === 'string' ? m.content : '').join(' ').toLowerCase();
  const p = {};
  const sz  = t.match(/size\s+(\d+(?:\.\d+)?)/);
  const bud = t.match(/under\s+\$?(\d+)/);
  if (sz)  p.shoeSize = sz[1];
  if (bud) p.budget   = parseInt(bud[1]);
  if (t.includes('wide'))   p.width = 'wide';
  if (t.includes('narrow')) p.width = 'narrow';
  ['running','hiking','basketball','tennis','casual','walking'].forEach(u => { if (t.includes(u)) p.useCase = u; });
  return p;
}

function detectApiMode(text) {
  return /\b(find|shop|buy|search|where (to )?(buy|get|find)|price|store|purchase|sneaker|boot|sandal|shoe|clothing|outfit pieces|pieces for)\b/i.test(text) ? 'discover' : 'style';
}

function startEnrichAnim() {
  stopEnrichAnim();
  let i = 0;
  enrichLoadTimer = setInterval(() => {
    i = (i + 1) % ENRICH_LABELS.length;
    const el = document.querySelector('.enrich-loading-label');
    if (el) el.textContent = ENRICH_LABELS[i];
  }, 2000);
}

function stopEnrichAnim() {
  clearInterval(enrichLoadTimer);
  enrichLoadTimer = null;
}

// ── Chat helpers ──────────────────────────────────────────────────────────
function chat() { return document.getElementById('lumenChat'); }

function scrollToLatest() {
  const el = chat();
  if (!el) return;
  const last = el.lastElementChild;
  if (last) last.scrollIntoView({ behavior:'smooth', block:'start' });
}

function addMessage(role, text, id) {
  const isAI  = role === 'ai';
  const idAttr = id ? ` id="${id}"` : '';
  const html = `<div class="l-msg ${isAI ? 'ai' : 'user'}"${idAttr}>` +
    `<div class="l-av ${isAI ? '' : 'user'}">${isAI ? '✨' : '😊'}</div>` +
    `<div class="l-bbl ${isAI ? 'ai' : 'user'}">${isAI ? parseMarkdown(text) : text}</div>` +
    `</div>`;
  const c = chat();
  if (c) { c.insertAdjacentHTML('beforeend', html); scrollToLatest(); }
}

function showTyping() {
  const id   = 'typ' + Date.now();
  const html = `<div class="l-msg ai" id="${id}"><div class="l-av">✨</div><div class="l-bbl ai" style="color:var(--tx3);font-style:italic">Lumen is thinking…</div></div>`;
  const c = chat();
  if (c) { c.insertAdjacentHTML('beforeend', html); scrollToLatest(); }
  return id;
}

function removeTyping(id) {
  document.querySelectorAll('#' + id).forEach(el => el.remove());
}

function addSeparator(label) {
  const c = chat();
  if (c) c.insertAdjacentHTML('beforeend',
    `<div style="text-align:center;font-size:10px;color:var(--tx3);padding:10px 0 4px;letter-spacing:0.5px;text-transform:uppercase">— ${label} —</div>`);
}

// ── Chip groups ───────────────────────────────────────────────────────────
function renderChipGroup(chips, onSelect) {
  const c = chat();
  if (!c) return;
  const row = document.createElement('div');
  row.className = 'l-chips';
  chips.forEach(chip => {
    const btn = document.createElement('button');
    btn.className = 'l-chip';
    btn.textContent = chip.label;
    btn.onclick = () => {
      document.querySelectorAll('.chip-group').forEach(el => el.remove());
      row.remove();
      if (onSelect) onSelect(chip.msg, chip.action);
    };
    row.appendChild(btn);
  });
  row.classList.add('chip-group');
  c.appendChild(row);
  scrollToLatest();
}

// ── Profile display ───────────────────────────────────────────────────────
function renderPaletteInChat(palette, season) {
  if (!palette || !palette.length) return;
  const dots = palette.map(hex =>
    `<div style="width:30px;height:30px;border-radius:50%;background:${hex};border:1px solid rgba(0,0,0,0.08);flex-shrink:0" title="${hex}"></div>`
  ).join('');
  const c = chat();
  if (c) {
    c.insertAdjacentHTML('beforeend',
      `<div class="l-msg ai"><div class="l-av">✨</div><div class="l-bbl ai"><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:2px 0">${dots}${season ? `<span style="font-size:11px;font-weight:600;color:var(--tx3);margin-left:4px">${season}</span>` : ''}</div></div></div>`
    );
    scrollToLatest();
  }
}

function updateProfileDisplay() {
  // Sidebar (desktop)
  const sp = document.getElementById('sidebarPalette');
  const ss = document.getElementById('sidebarSeason');
  const se = document.getElementById('sidebarEmail');
  const palette = styleProfile.palette || userProfile.palette || [];
  if (sp && palette.length) {
    sp.innerHTML = palette.map(h => `<div style="width:18px;height:18px;border-radius:50%;background:${h};border:1px solid rgba(0,0,0,0.1)"></div>`).join('');
  }
  if (ss) ss.textContent = styleProfile.season ? styleProfile.season + ' Season' : '';
  if (se && currentUser) se.textContent = currentUser.email || '';
  // Profile button initials
  const pb = document.getElementById('profileBtn');
  if (pb && currentUser?.email) pb.textContent = currentUser.email[0].toUpperCase();
  updateSidebarSaved();
}

function updateSidebarSaved() {
  const grid = document.getElementById('sidebarSavedGrid');
  if (!grid) return;
  const saved = savedProducts.filter(p => savedItems.includes(p.id));
  if (!saved.length) { grid.innerHTML = '<div style="font-size:12px;color:var(--tx3)">Nothing saved yet</div>'; return; }
  grid.innerHTML = saved.map(p => p.img
    ? `<div style="aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer" onclick="openDeepDive(savedProducts.find(x=>x.id==${p.id}))"><img src="${p.img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`
    : `<div style="aspect-ratio:1;border-radius:8px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px">👟</div>`
  ).join('');
}

// ── API ───────────────────────────────────────────────────────────────────
async function apiFetch(path, body) {
  const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
  const token   = session?.access_token || '';
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(path + ' ' + res.status);
  return res.json();
}

async function enrichProduct(p) {
  if (enrichCache[p.id]) return enrichCache[p.id];
  const data = await apiFetch('/api/enrich', { product:p, userProfile });
  enrichCache[p.id] = data;
  return data;
}

// ── Product cards (inline in chat) ────────────────────────────────────────
function renderProductsInline(prods, label) {
  const c = chat();
  if (!c) return;

  if (label) {
    const lbl = document.createElement('div');
    lbl.style.cssText = 'padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px';
    lbl.textContent = label;
    c.appendChild(lbl);
  }

  const row = document.createElement('div');
  row.className = 'l-card-row';

  prods.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'l-card';
    card.onclick = () => openDeepDive(p);

function toggleSave(id) {
  const p = products.find(x => x.id === id) || savedProducts.find(x => x.id === id);
  if (!p) return;
  if (savedItems.includes(id)) {
    savedItems = savedItems.filter(x => x !== id);
    savedProducts = savedProducts.filter(x => x.id !== id);
  } else {
    savedItems.push(id);
    if (!savedProducts.find(x => x.id === id)) savedProducts.push(p);
  }
  const btn = document.getElementById('pin-' + id);
  if (btn) {
    btn.classList.toggle('saved', savedItems.includes(id));
    const svg = btn.querySelector('svg');
    if (svg) svg.setAttribute('fill', savedItems.includes(id) ? 'currentColor' : 'none');
  }
  updateSidebarSaved();
}

// ── Deep dive touch (swipe down to close) ────────────────────────────────
(function() {
  let tx0 = 0, ty0 = 0, tt0 = 0, dragging = false;
  const el = () => document.getElementById('deepDive');

  document.addEventListener('touchstart', e => {
    const dd = el();
    if (!dd || !deepDiveOpen) return;
    if (!dd.contains(e.target)) return;
    tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; tt0 = Date.now();
    dragging = true;
    dd.style.transition = 'none';
  }, { passive:true });

  document.addEventListener('touchmove', e => {
    const dd = el();
    if (!dragging || !dd) return;
    const dy = e.touches[0].clientY - ty0;
    if (dy > 0 && dd.scrollTop <= 0) {
      dd.style.transform = `translateX(-50%) translateY(${dy * 0.4}px)`;
      e.preventDefault();
    }
  }, { passive:false });

  document.addEventListener('touchend', e => {
    const dd = el();
    if (!dragging || !dd) return;
    dragging = false;
    const dy  = e.changedTouches[0].clientY - ty0;
    const vel = dy / (Date.now() - tt0);
    dd.style.transition = '';
    if (dy > 80 && vel > 0.2) { closeDeepDive(); return; }
    dd.style.transform = '';
  }, { passive:true });
})();

// ── Photo Upload & Vision ─────────────────────────────────────────────────
async function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const dataUrl  = ev.target.result;
    const base64   = dataUrl.split(',')[1];
    const mimeType = file.type;
    const c = chat();

    if (c) {
      const preview = document.createElement('div');
      preview.className = 'l-msg user';
      preview.innerHTML =
        '<div class="l-av user">😊</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">' +
        `<img src="${dataUrl}" style="width:120px;height:120px;object-fit:cover;border-radius:12px;border:1.5px solid var(--border)">` +
        '<div class="l-bbl user" style="font-size:12px">Analyzing your photo...</div></div>';
      c.appendChild(preview);
      scrollToLatest();
    }

    const loadingId = 'vision-loading-' + Date.now();
    addMessage('ai', '🔍 Let me take a look at this...', loadingId);

    try {
      const result = await fetch('/api/vision', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + (currentSession?.access_token || '') },
        body: JSON.stringify({ imageBase64:base64, mimeType, mode:'identify' })
      }).then(r => r.json());

      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());

      if (result.error) { addMessage('ai', 'I had trouble analyzing that photo. Try a clearer image or describe what you see.'); return; }
      renderVisionResults(result, dataUrl);

    } catch(err) {
      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());
      addMessage('ai', 'Something went wrong. Please try again.');
    }
  };
  reader.readAsDataURL(file);
}

// ── Send Message ──────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;

  if (onboardingActive && onboardingStep === 0) onboardingStep = 1;

  addMessage('user', text);
  messages.push({ role:'user', content:text });
  const typId = showTyping();

  try {
    const chatMessages = savedProducts.length > 0
      ? [...messages.slice(0, -1), {
          role:'user',
          content: messages[messages.length - 1].content +
            '\n\n[Context: User has saved these items: ' +
            savedProducts.filter(p => savedItems.includes(p.id)).map(p => p.brand + ' ' + shortName(p)).join(', ') + ']'
        }]
      : messages;

    let apiMessages = chatMessages;
    const hadPhoto = !!photoBase64;
    if (photoBase64) {
      const last = apiMessages[apiMessages.length - 1];
      apiMessages = [
        ...apiMessages.slice(0, -1),
        { role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:photoMimeType, data:photoBase64 } },
            { type:'text', text:typeof last.content === 'string' ? last.content : text }
        ]}
      ];
      photoBase64 = null; photoMimeType = null;
    }

    const tab = currentMode = detectApiMode(text);
    const userContext = [
      userGender        ? 'Gender: ' + userGender : null,
      userAge           ? 'Age: '    + userAge    : null,
      userCurrentSeason ? 'Color season: ' + userCurrentSeason : null,
    ].filter(Boolean).join(', ') || undefined;

    const data    = await apiFetch('/api/chat', { messages:apiMessages, tab, userContext });
    removeTyping(typId);
    const content = data.content || '';

    // Parse PROFILE_UPDATE
    const profMatch = content.match(/PROFILE_UPDATE:\s*(\{[\s\S]*?\})/);
    if (profMatch) {
      try {
        const cleaned = profMatch[1].replace(/'/g, '"').replace(/(\w+):/g, '"$1":').replace(/"(\w+)":\s*"([^"]*)"/g, '"$1":"$2"');
        const prof = JSON.parse(cleaned);
        if (prof.season)  { styleProfile.season    = prof.season;    userProfile.season    = prof.season; }
        if (prof.undertone){ styleProfile.undertone = prof.undertone; userProfile.undertone = prof.undertone; }
        if (prof.palette && Array.isArray(prof.palette)) {
          styleProfile.palette = prof.palette;
          userProfile.palette  = prof.palette;
          renderPaletteInChat(prof.palette, prof.season);
        }
        if (prof.style) userProfile.style = prof.style;
        updateProfileDisplay();
        if (onboardingStep === 1 && prof.palette?.length > 0) { onboardingStep = 2; setTimeout(() => renderStyleQuiz(), 600); }
        if (hadPhoto && prof.palette?.length > 0) {
          setTimeout(() => {
            renderChipGroup([
              { label:'👗 Build outfits for me', msg:'Based on my colors, give me 3 outfit formulas' },
              { label:'🛍️ Shop my palette',     msg:'Find clothes in my color palette' },
              { label:'✨ See my style quiz',    msg:null, action:'quiz' },
            ], (msg, action) => { if (action === 'quiz') renderStyleQuiz(); else sendMessage(msg); });
            scrollToLatest();
          }, 400);
        }
      } catch(e) { console.error('[profile] parse error:', e.message); }
    }

    // Parse SEARCH_MODELS
    const tokMatch = content.match(/SEARCH_MODELS:\s*(\{[\s\S]*\})/);
    if (tokMatch) {
      const displayText = content.slice(0, content.indexOf('SEARCH_MODELS:')).replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').replace(/\s*```[a-z]*\s*$/g, '').trim();
      if (displayText) addMessage('ai', displayText);
      messages.push({ role:'assistant', content });
      userProfile = { ...userProfile, ...extractProfile(messages) };
      updateProfileDisplay();

      let modelData;
      try { modelData = JSON.parse(tokMatch[1]); }
      catch(e) { addMessage('ai', 'Let me search for the best options for you…'); isLoading = false; return; }

      const srchTypId = showTyping();
      try {
        const found = await apiFetch('/api/search', { models:modelData.models || [], userProfile });
        removeTyping(srchTypId);
        if (!found.length) { addMessage('ai', "I couldn't find exact matches right now. Could you try rephrasing?"); isLoading = false; return; }
        products = found;
        const useCase = (products[0]?.category) || 'your needs';
        addMessage('ai', products[0]?.why
          ? 'Here are my picks for you — each selected for ' + useCase + '. Real prices across retailers.'
          : 'I found ' + products.length + ' options — here are your top picks:');
        renderProductsInline(products, 'Expert picks for you');
        renderChipGroup([
          { label:'🔍 Compare these',    msg:'Compare the items shown' },
          { label:'💰 Lower budget',     msg:'Show me lower budget options' },
          { label:'🏆 More premium',     msg:'Show me more premium options' },
          { label:'🎨 Specific color',   msg:'I want a specific color' },
        ], msg => sendMessage(msg));
      } catch(e) {
        removeTyping(srchTypId);
        addMessage('ai', 'I had trouble searching right now. Please try again in a moment.');
      }

    } else {
      const displayContent = content.replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').trim();
      messages.push({ role:'assistant', content });
      addMessage('ai', displayContent);
      renderOutfitCards(displayContent);
      if (onboardingActive && onboardingStep === 3) onboardingActive = false;
    }

  } catch(e) {
    removeTyping(typId);
    addMessage('ai', "I'm having trouble connecting. Please check your connection and try again.");
  }

  isLoading = false;
}

// ── Input wiring ──────────────────────────────────────────────────────────
function wireInput(inp, btn) {
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
  });
  if (btn) btn.addEventListener('click', go);
  function go() {
    const v = inp.value.trim();
    if (!v) return;
    inp.value = '';
    sendMessage(v);
  }
}

function showAuthTab(tab) {
  currentAuthTab = tab;
  const tl = document.getElementById('tab-login');
  const ts = document.getElementById('tab-signup');
  if (tl) { tl.style.background = tab === 'login'  ? 'var(--tx1)' : '#fff'; tl.style.color = tab === 'login'  ? '#fff' : 'var(--tx2)'; }
  if (ts) { ts.style.background = tab === 'signup' ? 'var(--tx1)' : '#fff'; ts.style.color = tab === 'signup' ? '#fff' : 'var(--tx2)'; }
}

async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }

  try {
    if (currentAuthTab === 'signup') {
      const signupRes  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'signup', email, password }) });
      const signupData = await signupRes.json();
      if (!signupRes.ok) { errEl.textContent = signupData.error || 'Signup failed'; return; }
    }
    const res  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'login', email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Something went wrong'; return; }
    localStorage.setItem('lumen_session', JSON.stringify(data.session));
    localStorage.setItem('lumen_user',    JSON.stringify(data.user));
    document.getElementById('auth-screen').remove();
    currentUser = data.user; currentSession = data.session;
    init();
  } catch(e) {
    errEl.textContent = 'Connection error. Try again.';
  }
}

async function signInWithGoogle() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { error } = await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:window.location.origin } });
    if (error) { const e = document.getElementById('auth-error'); if (e) e.textContent = 'Google sign-in failed. Try email instead.'; }
  } catch(e) {
    const errEl = document.getElementById('auth-error');
    if (errEl) errEl.textContent = 'Google sign-in unavailable. Try email instead.';
  }
}

// ── Session management ────────────────────────────────────────────────────
async function checkSession() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data:{ session } } = await supabase.auth.getSession();
    if (session) {
      localStorage.setItem('lumen_session', JSON.stringify(session));
      localStorage.setItem('lumen_user',    JSON.stringify(session.user));
      currentUser = session.user; currentSession = session;
      init(); return;
    }
  } catch(e) { /* fall through */ }

  const stored = localStorage.getItem('lumen_session');
  if (!stored) { showAuthScreen(); return; }

  try {
    const session = JSON.parse(stored);
    const res = await fetch('/api/auth', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + (session.access_token || '') },
      body:JSON.stringify({ action:'verify' })
    });
    if (res.ok) {
      const data = await res.json();
      currentUser = data.user; currentSession = session;
      init();
    } else {
      localStorage.removeItem('lumen_session');
      showAuthScreen();
    }
  } catch(e) { showAuthScreen(); }
}

async function loadUserGreeting() {
  if (!currentUser) { showOnboardingWelcome(); return; }
  try {
    const context = await apiFetch('/api/profile', {});
    if (context.profile?.color_season) {
      addMessage('ai',
        'Welcome back! 👋\n\nI remember you — ' + context.profile.color_season + ' palette' +
        (context.profile.gender ? ', ' + context.profile.gender : '') +
        '. Ready to continue where we left off?\n\nWhat are we working on today?');
      renderChipGroup([
        { label:'📸 Find something I saw', msg:'I saw something I love and want to find it' },
        { label:'👗 What do I wear today',  msg:'Help me put together an outfit' },
        { label:'🛍️ Shop for something',   msg:'I want to shop for something specific' }
      ], msg => sendMessage(msg));
    } else {
      showOnboardingWelcome();
    }
  } catch(e) { showOnboardingWelcome(); }
}

// ── Desktop layout ────────────────────────────────────────────────────────
function setupDesktopLayout() {
  if (window.innerWidth < 768) return;
  const sidebar = document.getElementById('lSidebar');
  const main    = document.getElementById('lMain');
  if (sidebar) sidebar.style.display = 'flex';
  if (main) main.style.flex = '1';
  updateProfileDisplay();
}

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  try {
    const saved = localStorage.getItem('lumen_profile');
    if (saved) userProfile = JSON.parse(saved);
  } catch(e) {}

  wireInput(document.getElementById('lumenInput'), document.getElementById('lumenSend'));
  setupDesktopLayout();
  loadUserGreeting();
}

checkSession();
