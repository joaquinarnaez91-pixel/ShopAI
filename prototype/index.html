<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF9F7">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">

<title>Lumen — Your Personal Style Guide</title>
<style>
:root {
  /* Design tokens */
  --bg:#FAF9F7; --surface:#FFFFFF; --surface-warm:#F0EEEC;
  --ink:#111110; --ink-soft:#6B6862; --ink-faint:#9B9793;
  --accent:#E8490F; --border:#E8E6E1; --garment-bg:#F2F1EF;
  --radius-card:16px; --radius-pill:999px;
  --shadow-card:0 2px 12px rgba(17,17,16,0.06);
  --font-display:'Fraunces',Georgia,serif;
  --font:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  /* Legacy aliases — keep old names so existing inline styles resolve to new values */
  --card:#FFFFFF; --photo:#F2F1EF;
  --tx1:#111110; --tx2:#6B6862; --tx3:#9B9793;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased; }

.lumen-app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* HEADER */
.l-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; z-index:10; }
.l-logo { font-family:var(--font-display); font-weight:700; font-size:22px; color:var(--ink); letter-spacing:-0.01em; display:flex; align-items:center; gap:0; }
.l-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block; margin-left:4px; flex-shrink:0; margin-bottom:2px; }
.l-profile-btn { width:36px; height:36px; border-radius:50%; background:var(--surface); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); }

/* CHAT */
.l-chat { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:12px 0; padding-bottom:160px; scroll-behavior:smooth; background:var(--bg); }
.l-chat::-webkit-scrollbar { display:none; }

/* MESSAGES */
.l-msg { display:flex; align-items:flex-end; gap:8px; padding:3px 16px; margin-bottom:2px; }
.l-msg.ai { flex-direction:row; }
.l-msg.user { flex-direction:row-reverse; }
.l-av { width:28px; height:28px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-bottom:2px; color:#fff; }
.l-av.user { background:var(--surface-warm); color:var(--ink-soft); }
.l-bbl { max-width:78%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; }
.l-bbl.ai { background:var(--surface); color:var(--ink); border-bottom-left-radius:4px; box-shadow:var(--shadow-card); }
.l-bbl.user { background:var(--ink); color:#fff; border-bottom-right-radius:4px; }

/* CHIPS */
.l-chips { display:flex; flex-wrap:wrap; gap:7px; padding:4px 16px 8px 52px; }
.l-chip { padding:8px 15px; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; font-family:var(--font); transition:all 0.15s; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.l-chip:active { background:var(--ink); color:#fff; border-color:var(--ink); }
.l-sgst-chip { padding:9px 16px; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; font-family:var(--font); white-space:nowrap; flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,0.07); transition:all 0.15s; }
.l-sgst-chip:active { background:var(--ink); color:#fff; border-color:var(--ink); }

/* PRODUCT CARD ROW */
.l-card-row { padding:8px 16px; display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; cursor:grab; user-select:none; }
.l-card-row::-webkit-scrollbar { display:none; }
.l-card-row.dragging { cursor:grabbing; scroll-snap-type:none; }

/* PRODUCT CARD */
.l-card { flex-shrink:0; width:220px; border-radius:var(--radius-card); border:1px solid var(--border); background:var(--surface); overflow:hidden; cursor:pointer; scroll-snap-align:start; box-shadow:var(--shadow-card); transition:transform 0.15s,box-shadow 0.15s; position:relative; }
.l-card:active { transform:scale(0.97); }
.l-card-img { width:100%; height:200px; background:var(--garment-bg); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.l-card-img img { width:100%; height:100%; object-fit:cover; }
.l-card-body { padding:10px 12px 12px; }
.l-card-brand { font-size:10px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.5px; }
.l-card-name { font-size:13px; font-weight:600; color:var(--ink); margin:2px 0 4px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.l-card-price-row { display:flex; align-items:center; justify-content:space-between; }
.l-card-price { font-size:15px; font-weight:700; color:var(--ink); }
.l-card-indicator { font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; }
.l-card-indicator.LOW { background:#E8F5E9; color:#2E7D32; }
.l-card-indicator.USUAL { background:#FFF8E1; color:#F57F17; }
.l-card-indicator.HIGH { background:#FFEBEE; color:#C62828; }
.l-card-source { font-size:11px; color:var(--ink-faint); margin-top:4px; }
.l-card-stars { font-size:11px; color:var(--ink-soft); margin-top:2px; }
.l-card-pin { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; background:var(--surface); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(17,17,16,0.12); }
.l-card-pin.saved { background:var(--ink); }
.l-card-pin.saved svg { stroke:#fff; }
.l-expert-badge { position:absolute; top:8px; left:8px; background:var(--accent); color:#fff; font-size:9px; font-weight:700; padding:3px 7px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }

/* INPUT BAR */
.l-input-bar { position:fixed; bottom:0; left:0; right:0; width:100%; max-width:480px; margin:0 auto; padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom,16px)); background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; z-index:10; box-sizing:border-box; }
.l-input { flex:1; padding:10px 16px; border-radius:var(--radius-pill); border:1.5px solid var(--border); background:var(--surface); font-size:15px; font-family:var(--font); color:var(--ink); outline:none; }
.l-input:focus { border-color:var(--ink); }
.l-send-btn { width:40px; height:40px; border-radius:50%; background:var(--ink); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.l-icon-btn { width:40px; height:40px; border-radius:50%; background:var(--surface); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* PROFILE SHEET */
.l-profile-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; background:var(--bg); border-radius:20px 20px 0 0; border-top:1px solid var(--border); padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px)); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:100; }
.l-profile-sheet.open { transform:translateX(-50%) translateY(0); }

/* DEEP DIVE */
.l-deep-dive { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; height:85vh; height:85dvh; background:var(--bg); border-radius:20px 20px 0 0; overflow-y:auto; transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:200; }
.l-deep-dive::-webkit-scrollbar { display:none; }
.l-deep-dive.open { transform:translateX(-50%) translateY(0); }

/* OVERLAY */
.l-overlay { position:fixed; inset:0; background:rgba(17,17,16,0.45); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.l-overlay.show { opacity:1; pointer-events:all; }

/* Style quiz cards */
.sq-card { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:var(--radius-card); border:1.5px solid var(--border); margin-bottom:8px; cursor:pointer; background:var(--surface); transition:all 0.15s; }
.sq-card.sel { border-color:var(--ink); background:var(--surface-warm); }

/* Enrich loading */
.enrich-progress { height:2px; background:var(--border); border-radius:1px; margin:10px 0 4px; overflow:hidden; }
.enrich-progress-fill { height:100%; width:35%; background:var(--ink-faint); border-radius:1px; animation:enrichSlide 1.4s ease-in-out infinite; }
@keyframes enrichSlide { 0%{transform:translateX(-200%);} 100%{transform:translateX(500%);} }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
.skel { background:linear-gradient(90deg,var(--surface-warm) 25%,var(--border) 50%,var(--surface-warm) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite; }

/* First-run onboarding */
.ob-overlay { position:fixed;inset:0;z-index:3000;background:rgba(17,17,16,0.6);display:flex;align-items:flex-end;justify-content:center; }
.ob-sheet { width:100%;max-width:480px;background:var(--bg);border-radius:24px 24px 0 0;padding:32px 28px calc(32px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;align-items:center;text-align:center; }
.ob-icon { font-size:64px;line-height:1;margin-bottom:20px; }
.ob-title { font-size:22px;font-weight:700;color:var(--ink);margin-bottom:10px;font-family:var(--font-display);letter-spacing:-0.01em; }
.ob-body { font-size:15px;color:var(--ink-soft);line-height:1.55;margin-bottom:28px;max-width:300px; }
.ob-dots { display:flex;gap:6px;margin-bottom:28px; }
.ob-dot { width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.2s; }
.ob-dot.active { background:var(--ink); }
.ob-actions { display:flex;justify-content:space-between;align-items:center;width:100%; }
.ob-skip { font-size:14px;color:var(--ink-faint);cursor:pointer;padding:4px;background:none;border:none;font-family:var(--font); }
.ob-next { padding:14px 32px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius-pill);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font); }

/* TABLET */
@media (min-width:481px) {
  .l-input-bar { position:sticky; bottom:0; left:auto; right:auto; width:100%; max-width:100%; }
}

/* DESKTOP */
@media (min-width:768px) {
  .lumen-app { max-width:100%; flex-direction:row; }
  .l-sidebar { width:280px; border-right:1px solid var(--border); padding:24px 20px; flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .l-main { flex:1; display:flex; flex-direction:column; height:100vh; max-width:520px; }
  .l-input-bar { position:sticky; bottom:0; left:auto; right:auto; max-width:none; }
  .l-profile-sheet, .l-deep-dive { max-width:560px; }
}
</style>

function stars(r) {
  const f = Math.round(r || 0);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function parseMarkdown(t) {
  if (!t) return '';
  return t
    .replace(/SEARCH_MODELS:\{[\s\S]*?\}/g, '')
    .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '')
    .replace(/OUTFIT_CARD:\{[\s\S]*?\}/g, '')
    .replace(/```[\s\S]*?```/g, '')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
    .replace(/^\|\s*(.*?)\s*\|$/gm, row => {
      if (/^[\s|:-]+$/.test(row)) return '';
      const cells = row.split('|').filter(c => c.trim()).map(c => '<td style="padding:4px 8px;border:1px solid var(--border);font-size:12px">' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/gs, m => '<table style="border-collapse:collapse;width:100%;margin:8px 0">' + m + '</table>')
    .replace(/^[-•]\s+(.+)$/gm, '<div style="padding:2px 0 2px 12px;border-left:2px solid var(--accent)">$1</div>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function shortName(p) {
  let n = p.name || '';
  const b = (p.brand || '').toLowerCase();
  if (n.toLowerCase().startsWith(b + ' ' + b)) n = n.slice(p.brand.length + 1);
  if (n.toLowerCase().startsWith(b)) n = p.brand + n.slice(p.brand.length);
  return n.length > 40 ? n.slice(0, 38) + '…' : n;
}

function extractProfile(msgs) {
  const t = msgs.map(m => typeof m.content === 'string' ? m.content : '').join(' ').toLowerCase();
  const p = {};
  const sz  = t.match(/size\s+(\d+(?:\.\d+)?)/);
  const bud = t.match(/under\s+\$?(\d+)/);
  if (sz)  p.shoeSize = sz[1];
  if (bud) p.budget   = parseInt(bud[1]);
  if (t.includes('wide'))   p.width = 'wide';
  if (t.includes('narrow')) p.width = 'narrow';
  ['running','hiking','basketball','tennis','casual','walking'].forEach(u => { if (t.includes(u)) p.useCase = u; });
  return p;
}

function detectApiMode(text) {
  return /\b(find|shop|buy|search|where (to )?(buy|get|find)|price|store|purchase|sneaker|boot|sandal|shoe|clothing|outfit pieces|pieces for)\b/i.test(text) ? 'discover' : 'style';
}

function detectCategory(text) {
  const t = text.toLowerCase();
  if (/dress|gown|jumpsuit|romper/.test(t)) return 'dresses';
  if (/skirt|pants|jeans|shorts|leggings|trousers|chinos|jogger/.test(t)) return 'bottoms';
  if (/shirt|tee|top|blouse|sweater|hoodie|jacket|coat|blazer/.test(t)) return 'tops';
  if (/shoe|boot|sneaker|sandal|heel|loafer|oxford/.test(t)) return 'shoes';
  if (/bag|purse|tote|backpack|wallet/.test(t)) return 'bags';
  if (/watch|ring|necklace|bracelet|earring|jewelry|accessory/.test(t)) return 'accessories';
  return 'clothing';
}

function renderChipGroup(chips, onSelect) {
  const c = chat();

  chips.forEach(chip => {
    const btn = document.createElement('button');

      document.querySelectorAll('.chip-group').forEach(el => el.remove());
      row.remove();
      if (chip.action === 'focus') {
        const inp = document.getElementById('lumenInput') || document.getElementById('mInput');
        if (inp) {
          inp.placeholder = 'What do you like about it? (comfort, style, color, brand...)';
          inp.focus();
        }
      } else if (chip.action === 'camera') {
        _outfitCheckMode = true;
        document.getElementById('cameraInput')?.click();
      } else if (chip.action === 'gallery') {
        document.getElementById('galleryInput')?.click();
      } else if (chip.action === 'delete') {
        if (onSelect) onSelect(chip.msg, chip.action, { itemId: chip.itemId, itemName: chip.itemName });
      } else {
        if (onSelect) onSelect(chip.msg, chip.action);
        else if (chip.msg) sendMessage(chip.msg);
      }
    };
    row.appendChild(btn);
  });
  row.classList.add('chip-group');
  c.appendChild(row);
  scrollToLatest();
}

// ── API ───────────────────────────────────────────────────────────────────
async function apiFetch(path, body, signal) {
  const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
  const token   = session?.access_token || '';
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify(body),
    ...(signal ? { signal } : {})
  });
  if (!res.ok) throw new Error(path + ' ' + res.status);
  return res.json();
}

async function enrichProduct(p) {
  if (enrichCache[p.id]) return enrichCache[p.id];
  const data = await apiFetch('/api/enrich', { product:p, userProfile });
  enrichCache[p.id] = data;
  return data;
}

      '<span>Tap <b>★</b> on anything you like to save it to your <b>dressing room</b> — pick piece by piece, then review your picks from the ★ button up top.</span>';

function applyCardScroll(row) {
  let isDown = false, startX = 0, scrollLeft = 0;
  row.addEventListener('mousedown', e => {
    isDown = true;
    row.classList.add('dragging');
    startX = e.pageX - row.offsetLeft;
    scrollLeft = row.scrollLeft;
  });
  row.addEventListener('mouseleave', () => { isDown = false; row.classList.remove('dragging'); });
  row.addEventListener('mouseup', () => { isDown = false; row.classList.remove('dragging'); });
  row.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - row.offsetLeft;
    row.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });
}

  ];

    el.style.opacity = '1'; el.style.borderColor = 'var(--border)'; el.style.background = 'var(--bg)';

      picked = b.type;

      btn.style.opacity = '1';

function toggleSave(id) {
  const p = products.find(x => x.id === id) || savedProducts.find(x => x.id === id);
  if (!p) return;
  const adding = !savedItems.includes(id);
  if (!adding) {
    savedItems = savedItems.filter(x => x !== id);
    savedProducts = savedProducts.filter(x => x.id !== id);
  } else {
    savedItems.push(id);
    if (!savedProducts.find(x => x.id === id)) savedProducts.push(p);
  }
  persistDressingRoom();
  updateDressingBadge();
  const btn = document.getElementById('pin-' + id);
  if (btn) {
    btn.classList.toggle('saved', savedItems.includes(id));
    const svg = btn.querySelector('svg');
    if (svg) svg.setAttribute('fill', savedItems.includes(id) ? 'currentColor' : 'none');
  }
  updateSidebarSaved();
  if (adding && products.find(x => x.id === id)) updateShopperGuide();
  else if (document.getElementById('shopperGuide')) updateShopperGuide();
}

function removeFromDressing(id, btnEl) {
  toggleSave(id);
  const card = btnEl.closest('.l-card');
  if (card) {
    card.style.transition = 'opacity 0.25s, transform 0.25s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(() => card.remove(), 250);
  }
}

function updateDressingBadge() {
  const badge = document.getElementById('dressingCount');
  if (!badge) return;
  const n = savedProducts.length + savedOutfits.length;
  badge.textContent = n;
  badge.style.display = n > 0 ? 'flex' : 'none';
}

// Personal-shopper guide: after each star, acknowledge and steer toward the
// remaining categories of the current result set, then offer a review.
function updateShopperGuide() {
  const c = chat();
  if (!c) return;
  document.getElementById('shopperGuide')?.remove();
  if (!savedProducts.length) return;
  const cats = [...new Set(products.map(x => (x.category || '').toLowerCase()).filter(Boolean))];
  const savedCats = new Set(savedProducts.map(x => (x.category || '').toLowerCase()));
  const remaining = cats.filter(cat => !savedCats.has(cat));

  const wrap = document.createElement('div');
  wrap.id = 'shopperGuide';
  const text = remaining.length
    ? 'Saved to your dressing room ✓ Star any others you like — still to pick: <b>' + remaining.join('</b>, <b>') + '</b>.'
    : 'Saved ✓ Your set is looking complete — ready to review your picks, or need anything else?';
  wrap.innerHTML =
    '<div class="l-msg ai"><div class="l-av"><svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M10 2l1.5 4.5L16 8l-4.5 1.5L10 14l-1.5-4.5L4 8l4.5-1.5z"/></svg></div><div class="l-bbl ai">' + text + '</div></div>';

  const chipsRow = document.createElement('div');
  chipsRow.className = 'l-chips';
  const mk = (label, fn) => {
    const b = document.createElement('button');
    b.className = 'l-chip';
    b.textContent = label;
    b.onclick = fn;
    chipsRow.appendChild(b);
  };
  mk('Review my picks (' + savedProducts.length + ')', () => { wrap.remove(); openDressingRoom(); });
  if (remaining.length) {
    mk('Find ' + remaining[0], () => { wrap.remove(); sendMessage('Show me ' + remaining[0] + ' options to complete this outfit'); });
  } else {
    mk('I need something else', () => { wrap.remove(); document.getElementById('lumenInput')?.focus(); });

  wrap.appendChild(chipsRow);
  c.appendChild(wrap);
  scrollToLatest();
}

  buyBtn.addEventListener('click', () => logLinkClick(p.name, p.price, p.source, p.link || '', 'chat'));

  deepDiveOpen = true;

  // Swipe down to close — attach once (was re-attached every open, stacking listeners
  // and firing on normal scrolls). Now: must start at top of sheet, pull down 140px+, mostly vertical.
  if (!dd._swipeWired) {
    dd._swipeWired = true;
    let touchStartY = 0, touchStartX = 0, startedAtTop = false;
    dd.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      startedAtTop = dd.scrollTop <= 0;
    }, { passive: true });
    dd.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
      if (startedAtTop && dy > 140 && dy > dx * 2) closeDeepDive();
    }, { passive: true });
  }

  // Load enrich data

  }).catch(() => {
    const el = document.getElementById('dd-enrich-' + p.id);
    if (el) el.innerHTML = '';
  });

function detectGarmentPart(p) {
  const text = ((p.name || '') + ' ' + (p.category || '')).toLowerCase();
  if (/dress|gown|jumpsuit|romper|bodysuit/.test(text)) return 'dresses';
  if (/skirt|pants|jeans|shorts|leggings|trousers|chinos|jogger/.test(text)) return 'lower_body';
  return 'upper_body';
}

function openTryOn() {
  tryOnPersonDataUri = null;

  modal.style.display = 'flex';
  renderTryOnUpload();

function closeTryOn() {

    `<label style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:200px;border:2px dashed var(--border);border-radius:16px;cursor:pointer;gap:10px;color:var(--tx3);background:var(--card)">` +

  reader.onload = e => {

function renderTryOnConfirm() {
  const p = currentDiveProduct;
  document.getElementById('tryOnContent').innerHTML =
    `<div style="display:flex;gap:12px;margin-bottom:20px">` +
      `<img src="${tryOnPersonDataUri}" style="width:120px;height:160px;object-fit:cover;border-radius:12px;flex-shrink:0">` +

        `<div style="font-size:14px;font-weight:600;color:var(--tx1);line-height:1.3;margin-bottom:8px">${p ? p.name : ''}</div>` +
        (p && p.img ? `<img src="${p.img}" style="width:80px;height:80px;object-fit:cover;border-radius:8px">` : '') +
      `</div>` +
    `</div>` +
    `<button onclick="startTryOn()" style="display:block;width:100%;padding:14px;background:var(--tx1);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px">Try It On →</button>` +
    `<button onclick="renderTryOnUpload()" style="display:block;width:100%;padding:12px;background:var(--card);color:var(--tx2);border:1.5px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer">Choose different photo</button>`;
}

async function startTryOn() {
  const p = currentDiveProduct;
  if (!p || !tryOnPersonDataUri) return;
  renderTryOnProcessing('Starting…');

  try {
    const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
    const token = session?.access_token || '';
    const res = await fetch('/api/warp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        personUrl: tryOnPersonDataUri,
        productUrl: p.img,
        part: detectGarmentPart(p)
      })
    });
    const data = await res.json();
    if (!data.predictionId) throw new Error(data.error || 'No prediction ID returned');
    renderTryOnProcessing('Processing…');
    const resultUrl = await pollWarp(data.predictionId);
    renderTryOnResult(resultUrl);
  } catch (err) {
    renderTryOnError(err.message);
  }
}

async function pollWarp(predictionId) {
  const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
  const token = session?.access_token || '';
  for (let i = 0; i < 40; i++) {
    await new Promise(r => setTimeout(r, 3000));
    const res = await fetch('/api/warp?id=' + encodeURIComponent(predictionId), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.status === 'succeeded') return data.resultUrl;
    if (data.status === 'failed' || data.status === 'canceled') throw new Error(data.error || 'Try-on failed');
    renderTryOnProcessing(data.status === 'processing' ? 'Fitting garment…' : 'Starting…');
  }
  throw new Error('Timed out — try again');
}

function renderTryOnProcessing(statusText) {
  const el = document.getElementById('tryOnContent');
  if (!el) return;
  el.innerHTML =
    `<div style="text-align:center;padding:40px 0">` +
      `<div class="enrich-progress" style="margin:0 auto 16px;width:120px"><div class="enrich-progress-fill"></div></div>` +
      `<div id="tryOnStatus" style="font-size:14px;color:var(--tx2)">${statusText}</div>` +
      `<div style="font-size:12px;color:var(--tx3);margin-top:8px">This takes 30–90 seconds…</div>` +
    `</div>`;
}

function renderTryOnResult(resultUrl) {
  document.getElementById('tryOnContent').innerHTML =

    `<a href="${resultUrl}" download="tryon.jpg" style="display:block;text-align:center;padding:12px;background:var(--card);color:var(--tx2);border:1.5px solid var(--border);border-radius:12px;font-size:14px;text-decoration:none">Save Image</a>`;
}

function renderTryOnError(msg) {
  document.getElementById('tryOnContent').innerHTML =
    `<div style="text-align:center;padding:32px 0">` +
      `<div style="margin-bottom:12px;display:flex;justify-content:center"><svg viewBox="0 0 48 48" width="32" height="32" fill="none" stroke="var(--ink-soft)" stroke-width="1.5" aria-hidden="true"><path d="M24 8L4 40h40L24 8z" stroke-linejoin="round"/><path d="M24 22v8" stroke-linecap="round"/><circle cx="24" cy="34" r="1.5" fill="var(--ink-soft)" stroke="none"/></svg></div>` +
      `<div style="font-size:15px;font-weight:600;color:var(--tx1);margin-bottom:8px">Try-on failed</div>` +
      `<div style="font-size:13px;color:var(--tx3);margin-bottom:20px">${msg}</div>` +
      `<button onclick="renderTryOnConfirm()" style="padding:12px 24px;background:var(--tx1);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">Try Again</button>` +
    `</div>`;

// ── Outfit formula cards ──────────────────────────────────────────────────
function renderOutfitCards(text) {
  if (!text || (!/Outfit\s+\d+/i.test(text) && !/\*\*Outfit/i.test(text))) return false;
  const c = chat();
  if (!c) return false;

  const outfitBlocks = [];
  const regex = /\*?\*?Outfit\s+(\d+)[^*\n]*[-—]([^\n]+)\*?\*?\n([\s\S]*?)(?=\*?\*?Outfit\s+\d+|$)/gi;
  let match;
  while ((match = regex.exec(text)) !== null) {
    outfitBlocks.push({ number:match[1], occasion:match[2].trim(), content:match[3].trim() });
  }
  if (!outfitBlocks.length) return false;

  outfitBlocks.forEach(outfit => {
    const card = document.createElement('div');
    card.style.cssText = 'margin:6px 16px;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;background:var(--surface);';

    const header = document.createElement('div');
    header.style.cssText = 'padding:12px 14px 8px;border-bottom:1px solid var(--border);';
    header.innerHTML =
      `<div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px">Outfit ${outfit.number}</div>` +
      `<div style="font-size:14px;font-weight:600;color:var(--tx1);margin-top:2px">${outfit.occasion}</div>`;

    const body = document.createElement('div');
    body.style.cssText = 'padding:10px 14px 12px;font-size:13px;color:var(--tx2);line-height:1.5;white-space:pre-wrap;';
    body.textContent = outfit.content;

    const actions = document.createElement('div');
    actions.style.cssText = 'padding:8px 14px 12px;display:flex;gap:6px;flex-wrap:wrap;';
    ['Shop this look', 'Save outfit'].forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'l-chip';
      btn.style.cssText = 'font-size:11px;padding:5px 10px;';
      btn.textContent = label;
      btn.onclick = () => {
        if (label.includes('Shop')) sendMessage('Find me the pieces for the ' + outfit.occasion + ' outfit: ' + outfit.content);
        else addMessage('ai', '📌 Outfit ' + outfit.number + ' saved!');
      };
      actions.appendChild(btn);
    });

    card.appendChild(header);
    card.appendChild(body);
    card.appendChild(actions);
    c.appendChild(card);
  });

  setTimeout(() => {
    addMessage('ai', 'Want to find actual pieces for any of these looks?');
    renderChipGroup([
      { label:'Shop these looks',  msg:'Find clothes for my outfit formulas' },
      { label:'Refine my style',    msg:'Tell me more about my style and give me more outfits' },
      { label:'Visual search',      action:'camera' },
    ], msg => sendMessage(msg));
    scrollToLatest();
  }, 400);

  return true;
}

// ── Closet Outfit Card ────────────────────────────────────────────────────
async function ensureClosetLoaded() {
  if (closetItems.length > 0) return;
  try {
    const res = await fetch('/api/closet', {
      headers: { 'Authorization': 'Bearer ' + (currentSession?.access_token || '') }
    });
    if (!res.ok) { console.error('[closet] preload error:', res.status); return; }
    const data = await res.json();
    if (Array.isArray(data.items)) closetItems = data.items;
  } catch(e) { console.error('[closet] preload error:', e.message); }
}

function renderClosetOutfitCard(cardData) {
  const c = chat();
  if (!c) return;

  const { title, occasion, item_ids, note } = cardData;
  const items = (item_ids || [])
    .map(id => closetItems.find(i => String(i.id) === String(id)))
    .filter(Boolean);

  if (!items.length) {
    console.warn('[outfit_card] no items matched ids:', item_ids, 'closet size:', closetItems.length);
    return;
  }

  const card = document.createElement('div');
  card.style.cssText =
    'margin:8px 16px;border-radius:20px;border:1.5px solid var(--border);overflow:hidden;background:var(--surface);box-shadow:var(--shadow-card)';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'padding:14px 16px 10px;border-bottom:1px solid var(--border)';
  header.innerHTML =
    '<div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;' +
    'letter-spacing:1px;margin-bottom:3px">' + (occasion || 'Your outfit') + '</div>' +
    '<div style="font-size:16px;font-weight:700;color:var(--tx1)">' + (title || 'Outfit from your closet') + '</div>';
  card.appendChild(header);

  // Collage grid
  const n = Math.min(items.length, 4);
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;gap:1px;background:var(--border);' +
    (n === 1 ? 'grid-template-columns:1fr' :
     n === 2 ? 'grid-template-columns:1fr 1fr' :
               'grid-template-columns:1fr 1fr');

  items.slice(0, 4).forEach((item, idx) => {
    const cell = document.createElement('div');
    const isBottomSingle = n === 3 && idx === 2;
    cell.style.cssText = 'background:var(--photo);overflow:hidden;' +
      (isBottomSingle ? 'grid-column:span 2;aspect-ratio:2/1' : 'aspect-ratio:1/1');

    if (item.image_url) {
      const img = document.createElement('img');
      img.src = item.image_url;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      img.onerror = () => {
        cell.style.display = 'flex';
        cell.style.alignItems = 'center';
        cell.style.justifyContent = 'center';
        cell.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M20.38 18H3.62a1 1 0 0 1-.7-1.71L12 8l9.08 8.29A1 1 0 0 1 20.38 18z"/><path d="M12 8V5"/><circle cx="12" cy="4" r="1"/></svg>';
      };
      cell.appendChild(img);
    } else {
      cell.style.cssText += ';display:flex;align-items:center;justify-content:center';
      cell.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M20.38 18H3.62a1 1 0 0 1-.7-1.71L12 8l9.08 8.29A1 1 0 0 1 20.38 18z"/><path d="M12 8V5"/><circle cx="12" cy="4" r="1"/></svg>';
    }
    grid.appendChild(cell);
  });
  card.appendChild(grid);

  // Styling note
  if (note) {
    const noteEl = document.createElement('div');
    noteEl.style.cssText =
      'padding:10px 16px;border-top:1px solid var(--border);' +
      'font-size:13px;color:var(--tx2);line-height:1.5;font-style:italic';
    noteEl.textContent = note;
    card.appendChild(noteEl);
  }

  // Taste actions
  const actions = document.createElement('div');
  actions.style.cssText =
    'padding:10px 16px 12px;display:flex;gap:8px;border-top:1px solid var(--border)';

  const mkBtn = (emoji, label) => {
    const btn = document.createElement('button');
    btn.style.cssText =
      'padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);' +
      'background:var(--bg);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font)';
    btn.innerHTML = emoji + ' ' + label;
    return btn;
  };

  const likeBtn    = mkBtn('<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M17.21 3.79a4.5 4.5 0 0 0-6.36 0L10 4.64l-.85-.85a4.5 4.5 0 0 0-6.36 6.36l.85.85L10 17.36l6.36-6.36.85-.85a4.5 4.5 0 0 0 0-6.36z"/></svg>', 'Love it');
  const dislikeBtn = mkBtn('<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M13 11.5V5a1 1 0 0 0-1-1H6a1 1 0 0 0-.97.75l-1.5 6A1 1 0 0 0 4.5 12h4l-.6 2.4a1 1 0 0 0 .97 1.1L13 11.5zM16 11h-1.5a.5.5 0 0 1-.5-.5v-6a.5.5 0 0 1 .5-.5H16a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1z"/></svg>', 'Not for me');

  const sendSignal = (type) => {
    fetch('/api/taste-signal', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (currentSession?.access_token || '')
      },
      body: JSON.stringify({
        signal_type: type,
        content: {
          type: 'closet_outfit',
          title,
          occasion,
          item_ids,
          items: items.map(i => ({ id: i.id, name: i.name, category: i.category }))
        }
      })
    }).catch(() => {});
  };

  // Exclusive + deselectable vote. Love → saves the outfit for later; Not for me → asks for a new one.
  let outfitVote = null;
  const outfitKey = (title || '') + '|' + (item_ids || []).join(',');
  const styleVoteBtns = () => {
    const apply = (btn, active) => {
      btn.style.background = active ? 'var(--tx1)' : 'var(--bg)';
      btn.style.color = active ? '#fff' : '';
      btn.style.opacity = (outfitVote && !active) ? '0.4' : '1';
    };
    apply(likeBtn, outfitVote === 'like');
    apply(dislikeBtn, outfitVote === 'dislike');
  };
  likeBtn.onclick = () => {
    if (outfitVote === 'like') {
      outfitVote = null;
      savedOutfits = savedOutfits.filter(o => o.key !== outfitKey);
      persistSavedOutfits();
    } else {
      outfitVote = 'like';
      if (!savedOutfits.find(o => o.key === outfitKey)) {
        savedOutfits.push({ key: outfitKey, title, occasion, item_ids, note, savedAt: Date.now() });
        persistSavedOutfits();
      }
      sendSignal('positive');
    }
    updateDressingBadge();
    styleVoteBtns();
  };
  dislikeBtn.onclick = () => {
    if (outfitVote === 'dislike') { outfitVote = null; styleVoteBtns(); return; }
    outfitVote = 'dislike';
    styleVoteBtns();
    savedOutfits = savedOutfits.filter(o => o.key !== outfitKey);
    persistSavedOutfits();
    updateDressingBadge();
    sendSignal('negative');
    _sourceForNext = 'closet';
    sendMessage('Not feeling that one — show me a different outfit from my closet');
  };
  if (savedOutfits.find(o => o.key === outfitKey)) { outfitVote = 'like'; styleVoteBtns(); }

  actions.appendChild(likeBtn);
  actions.appendChild(dislikeBtn);
  card.appendChild(actions);

  c.appendChild(card);
  scrollToLatest();
}

async function handlePhotoUpload(e) {
  console.log('[photo] outfitCheckMode:', _outfitCheckMode, 'file:', e.target.files[0]?.name);
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const lastAiMsg = document.querySelector(
    '#lumenChat .l-msg.ai:last-of-type .l-bbl'
  )?.textContent || '';

  const isOutfitCheck =
    lastAiMsg.includes('Show me what you\'re wearing') ||
    lastAiMsg.includes('honest take') ||
    lastAiMsg.includes('what I\'m wearing') ||
    _outfitCheckMode === true;

  if (isOutfitCheck) {
    handleOutfitCheck(file);
    return;
  }

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const dataUrl  = ev.target.result;
    const base64   = dataUrl.split(',')[1];
    const mimeType = file.type;
    const c = chat();

    if (c) {
      const preview = document.createElement('div');

      preview.innerHTML =
        '<div class="l-av user"><svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M10 10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-5 0-8 2.5-8 4v1h16v-1c0-1.5-3-4-8-4z"/></svg></div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">' +
        `<img src="${dataUrl}" style="width:120px;height:120px;object-fit:cover;border-radius:12px;border:1.5px solid var(--border)">` +
        '<div class="l-bbl user" style="font-size:12px">Analyzing your photo...</div></div>';
      c.appendChild(preview);
      scrollToLatest();
    }

    const loadingId = 'vision-loading-' + Date.now();
    addMessage('ai', '🔍 Let me take a look at this...', loadingId);

    try {
      const result = await fetch('/api/vision', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + (currentSession?.access_token || '') },
        body: JSON.stringify({ imageBase64:base64, mimeType, mode:'identify' })
      }).then(r => r.json());

      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());

      if (result.error) { addMessage('ai', 'I had trouble analyzing that photo. Try a clearer image or describe what you see.'); return; }
      renderVisionResults(result, dataUrl);

    } catch(err) {
      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());
      addMessage('ai', 'Something went wrong. Please try again.');
    }
  };
  reader.readAsDataURL(file);
}

// ── Direct search (Claude brain → SerpAPI) ───────────────────────────────
async function handleDirectSearch(text) {
  addMessage('user', text);

  const loadingId = 'search-' + Date.now();
  addMessage('ai', '🧠 Finding the best options for you...', loadingId);
  scrollToLatest();

  try {
    const profileContext = currentProfile && Object.keys(currentProfile).length
      ? 'User profile: ' + JSON.stringify({
          season:    currentProfile.color_season,
          undertone: currentProfile.undertone,
          palette:   currentProfile.palette,
          aesthetic: currentProfile.aesthetic,
          gender:    currentProfile.gender,
          age:       currentProfile.age_range,
          size:      currentProfile.size_info
        })
      : '';

    const brainMessages = [{
      role: 'user',
      content: profileContext + '\n\n' +
        'The user needs: ' + text + '\n\n' +
        'Based on their specific profile, recommend 4 specific products to search for. ' +
        'Each must match their color palette, aesthetic, and body type.\n\n' +
        'Output ONLY this JSON, nothing else:\n' +
        'SEARCH_MODELS:{"models":[' +
        '{"brand":"Everlane","model":"Slim Chino","query":"Everlane slim chino dark olive mens",' +
        '"category":"bottoms","why":"Olive sits perfectly in your Autumn palette"}' +
        ']}'
    }];

    const brainResponse = await apiFetch('/api/chat', { messages: brainMessages, tab: 'discover', lang: currentLang });
    const content = brainResponse.content || '';
    const match = content.match(/SEARCH_MODELS:\s*(\{[\s\S]*?\})\s*$/);

    if (!match) {
      console.warn('[search] no SEARCH_MODELS, using fallback');
      await fallbackDirectSearch(text, loadingId);
      return;
    }

    let modelData;
    try { modelData = JSON.parse(match[1]); }
    catch(e) { await fallbackDirectSearch(text, loadingId); return; }

    const products = await apiFetch('/api/search', {
      models: modelData.models || [],
      userProfile: currentProfile || {}
    });

    document.getElementById(loadingId)?.remove();

    if (!products?.length) {
      addMessage('ai', 'I couldn\'t find exact matches right now. Try describing it differently.');
      return;
    }

    const firstWhy = modelData.models?.[0]?.why || '';
    addMessage('ai',
      'Here\'s what I found for you' + (firstWhy ? ' — ' + firstWhy : '') + ' 👇'
    );
    renderProductsInline(products,
      'Picked for your ' + (currentProfile?.color_season || 'style'));

    setTimeout(() => {
      renderChipGroup([
        { label: 'Lower budget',  msg: 'Find me cheaper: ' + text },
        { label: 'More premium',  msg: 'Find me premium version: ' + text },
        { label: 'Different color', msg: 'Find me different color: ' + text },
        { label: 'Rate my outfit',  msg: 'I want feedback on my outfit' }
      ], (msg) => sendMessage(msg));
      scrollToLatest();
    }, 300);

  } catch(e) {
    document.getElementById(loadingId)?.remove();
    console.error('[search] brain error:', e.message);
    addMessage('ai', 'Something went wrong. Try again.');
  }
}

async function fallbackDirectSearch(text, loadingId) {
  const query = text.replace(/^find me( this)?:/i, '').trim();

  const products = await apiFetch('/api/search', {
    models: [{
      brand: '',
      model: query,
      query: query,
      category: detectCategory(query),
      why: 'Matches your style profile'
    }],
    userProfile: currentProfile || {}
  }).catch(() => []);

  document.getElementById(loadingId)?.remove();

  if (!products?.length) {
    addMessage('ai', 'No matches found. Try describing it differently.');
    return;
  }

  addMessage('ai', 'Here\'s what I found 👇');
  renderProductsInline(products, 'For you');
}

    likeBtn.onclick = (e) => { e.stopPropagation(); handleOutfitFeedback(outfit, 'positive', cell, likeBtn, dislikeBtn, occasion, palette); };

    cell.addEventListener('mouseleave', () => { btns.style.opacity = '0'; });

    cell.onclick = () => {

      setTimeout(() => sendMessage('Find me the pieces for this look: ' + outfit.label + ' — ' + outfit.pieces.map(p => p.query).join(', ')), 300);
    };

    grid.appendChild(cell);
    outfitEls.push({ cell, outfit, likeBtn, dislikeBtn });
  });

  card.appendChild(grid);

  // Bottom chips
  const chips = document.createElement('div');
  chips.style.cssText = 'padding:12px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)';
  [

    { label: 'More casual',        msg: 'Show more casual options for ' + occasion.occasion },
    { label: 'Something else',     action: 'focus' }
  ].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'l-chip';
    btn.style.cssText = 'font-size:11px;padding:5px 10px';
    btn.textContent = c.label;
    btn.onclick = () => {
      if (c.action === 'focus') document.getElementById('lumenInput')?.focus();
      else sendMessage(c.msg);

  });
  card.appendChild(chips);
  chatEl.appendChild(card);
  scrollToLatest();

  generateOutfitImages(outfitEls, occasion, palette);
}

async function generateOutfitImages(outfitEls, occasion, palette) {
  const promises = outfitEls.map(async ({ cell, outfit }) => {
    try {
      const result = await fetch('/api/generate-preview', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (currentSession?.access_token || '')
        },
        body: JSON.stringify({
          mode: 'occasion',
          description: outfit.description,
          occasion: occasion.occasion,
          palette: (palette.colors || []).map(c => c.name).join(', '),
          gender: occasion.gender || 'women'
        })
      }).then(r => r.json());

      if (result.url) {
        const img = document.createElement('img');
        img.src = result.url;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0';
        img.onload = () => scrollToLatest();
        const placeholder = cell.querySelector('div:not([style*="absolute"])');
        if (placeholder) placeholder.remove();
        cell.insertBefore(img, cell.firstChild);
      }
    } catch(e) {
      console.error('[occasion] image gen failed:', e.message);
    }
  });
  await Promise.allSettled(promises);
}

async function handleOutfitFeedback(outfit, signal, cell, likeBtn, dislikeBtn, occasion, palette) {
  if (signal === 'positive') {
    likeBtn.style.background = '#E8490F';
    likeBtn.style.color = 'white';
    cell.style.outline = '2px solid #E8490F';
  } else {
    dislikeBtn.style.background = '#111';
    dislikeBtn.style.color = 'white';
    cell.style.opacity = '0.4';
    cell.style.transition = 'opacity 0.3s';
  }
  fetch('/api/taste-signal', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + (currentSession?.access_token || '')
    },
    body: JSON.stringify({
      signal_type: signal,
      content: {
        type: 'occasion_outfit',
        occasion: occasion.occasion,
        outfit_label: outfit.label,
        outfit_description: outfit.description,
        colors: (palette.colors || []).map(c => c.name),
        vibe: palette.vibe,
        gender: occasion.gender,
        pieces: outfit.pieces
      }
    })
  }).catch(() => {});
}

async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;
  hideSuggestionChips();

  // Occasion detection
  const occasionKeywords = ['baby shower', 'wedding', 'birthday', 'dinner', 'brunch', 'graduation', 'beach', 'cocktail', 'gala', 'party', 'date night', 'work event', 'conference', 'casual', 'dress code', 'what to wear'];
  const hasOccasion = occasionKeywords.some(k => text.toLowerCase().includes(k));
  const isOccasionRequest = hasOccasion || text.toLowerCase().includes('have an event') || text.toLowerCase().includes('what should i wear') || text.toLowerCase().includes('help me dress');
  if (isOccasionRequest) _occasionMode = true;

  if (onboardingActive && onboardingStep === 0) onboardingStep = 1;

  // Nudge toward closet when asking for outfit help but wardrobe is empty
  const isWardrobeRequest = /\b(outfit|wear|closet|wardrobe|style me|what (should|do) i wear|dress me)\b/i.test(text);
  if (isWardrobeRequest && closetItems.length === 0 && !_sourceForNext) {
    addMessage('user', text);
    messages.push({ role:'user', content:text });
    setTimeout(() => {
      addMessage('ai', 'Before I can style outfits for you, add a few items to your closet — I\'ll work with what you actually own. 👗');
      renderChipGroup([
        { label:'Add items now', action:'opencloset' },
        { label:'Shop the web instead', msg: text }
      ], (msg, action) => {
        if (action === 'opencloset') { toggleCloset(); return; }
        _sourceForNext = 'web';
        isLoading = false;
        sendMessage(msg);
      });
      scrollToLatest();
      isLoading = false;
    }, 350);
    return;
  }

  // Ask where to source outfit looks from (closet / web / both) before recommending
  const isWearIntent =
    /\b(what (should|do|can) i wear|what to wear|help me dress|dress me|style me|wear (today|tomorrow|tonight))\b/i.test(text) ||
    /qu[eé] me pongo|qu[eé] ponerme|ay[uú]dame a vestirme/i.test(text);
  const sourceAlreadyStated = /closet|guardarropa|tienda|stores|online|shop the web/i.test(text);
  if (isWearIntent && !sourceAlreadyStated && !_sourceForNext && closetItems.length > 0) {
    addMessage('user', text);
    messages.push({ role:'user', content:text });
    const askText = currentLang === 'es'
      ? '¿Te muestro looks de tu guardarropa, de tiendas, o ambos?'
      : 'Want looks from your closet, from the web, or both?';
    setTimeout(() => {
      addMessage('ai', askText);
      messages.push({ role:'assistant', content:askText });
      renderChipGroup([
        { label: currentLang === 'es' ? 'Mi guardarropa'    : 'My closet',    msg: currentLang === 'es' ? 'De mi guardarropa'   : 'From my closet',   action: 'closet' },
        { label: currentLang === 'es' ? 'Buscar en tiendas' : 'Shop the web', msg: currentLang === 'es' ? 'Busca en tiendas'    : 'Shop the web',     action: 'web' },
        { label: currentLang === 'es' ? 'Ambos'             : 'Both',         msg: currentLang === 'es' ? 'Ambos'               : 'Both',             action: 'both' },
      ], (msg, action) => {
        _sourceForNext = action;
        isLoading = false;
        sendMessage(msg);
      });
      scrollToLatest();
      isLoading = false;
    }, 350);
    return;
  }
  const sourceChoice = _sourceForNext;
  _sourceForNext = null;

  addMessage('user', text);
  messages.push({ role:'user', content:text });
  const typId = showTyping();

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 25000);

  try {
    const chatMessages = savedProducts.length > 0
      ? [...messages.slice(0, -1), {
          role:'user',
          content: messages[messages.length - 1].content +
            '\n\n[Context: User has saved these items: ' +
            savedProducts.filter(p => savedItems.includes(p.id)).map(p => p.brand + ' ' + shortName(p)).join(', ') + ']'
        }]
      : messages;

    let apiMessages = chatMessages;
    const hadPhoto = !!photoBase64;
    if (photoBase64) {
      const last = apiMessages[apiMessages.length - 1];
      apiMessages = [
        ...apiMessages.slice(0, -1),
        { role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:photoMimeType, data:photoBase64 } },
            { type:'text', text:typeof last.content === 'string' ? last.content : text }
        ]}
      ];
      photoBase64 = null; photoMimeType = null;
    }

    if (sourceChoice) {
      const note = {
        closet: '\n\n[Source preference: MY CLOSET. Build the look ONLY from owned closet items and reply with an OUTFIT_CARD token. Do not recommend products to buy.]',
        web:    '\n\n[Source preference: SHOP THE WEB. Recommend real products to buy and reply with a SEARCH_MODELS token. Do not use closet items.]',
        both:   '\n\n[Source preference: BOTH. First build one look from owned closet items (OUTFIT_CARD token), then recommend complementary pieces to buy (SEARCH_MODELS token).]'
      }[sourceChoice];
      const last = apiMessages[apiMessages.length - 1];
      apiMessages = [
        ...apiMessages.slice(0, -1),
        typeof last.content === 'string'
          ? { role:'user', content: last.content + note }
          : { role:'user', content: [...last.content, { type:'text', text: note }] }
      ];
    }

    const tab = currentMode = sourceChoice
      ? (sourceChoice === 'closet' ? 'style' : 'discover')
      : detectApiMode(text);
    const userContext = [
      userGender        ? 'Gender: ' + userGender : null,
      userAge           ? 'Age: '    + userAge    : null,
      userCurrentSeason ? 'Color season: ' + userCurrentSeason : null,
    ].filter(Boolean).join(', ') || undefined;

    const data = await apiFetch('/api/chat', { messages:apiMessages, tab, userContext, lang:currentLang }, controller.signal);
    clearTimeout(timeoutId);
    removeTyping(typId);
    const content = data.content || '';

    // Parse PROFILE_UPDATE
    const profMatch = content.match(/PROFILE_UPDATE:\s*(\{[\s\S]*?\})/);
    if (profMatch) {
      try {
        const cleaned = profMatch[1].replace(/'/g, '"').replace(/(\w+):/g, '"$1":').replace(/"(\w+)":\s*"([^"]*)"/g, '"$1":"$2"');
        const prof = JSON.parse(cleaned);
        if (prof.season)  { styleProfile.season    = prof.season;    userProfile.season    = prof.season; }
        if (prof.undertone){ styleProfile.undertone = prof.undertone; userProfile.undertone = prof.undertone; }
        if (prof.palette && Array.isArray(prof.palette)) {
          styleProfile.palette = prof.palette;
          userProfile.palette  = prof.palette;
          renderPaletteInChat(prof.palette, prof.season);
        }
        if (prof.style) userProfile.style = prof.style;
        currentProfile = { ...currentProfile, ...prof };
        updateProfileDisplay();
        if (onboardingStep === 1 && prof.palette?.length > 0) { onboardingStep = 2; setTimeout(() => renderStyleQuiz(), 600); }
        if (hadPhoto && prof.palette?.length > 0) {
          setTimeout(() => {
            renderChipGroup([
              { label:'Build outfits for me', msg:'Based on my colors, give me 3 outfit formulas' },
              { label:'Shop my palette',     msg:'Find clothes in my color palette' },
              { label:'Style quiz',    msg:null, action:'quiz' },
            ], (msg, action) => { if (action === 'quiz') renderStyleQuiz(); else sendMessage(msg); });
            scrollToLatest();
          }, 400);
        }
      } catch(e) { console.error('[profile] parse error:', e.message); }
    }

    // Diagnostics
    console.log('[occasion] raw response length:', content?.length);
    console.log('[occasion] has COLOR_PALETTE:', content?.includes('COLOR_PALETTE:'));
    console.log('[occasion] has OCCASION_OUTFITS:', content?.includes('OCCASION_OUTFITS:'));

    // Parse occasion tokens (COLOR_PALETTE + OCCASION_OUTFITS)
    const paletteStart  = content.indexOf('COLOR_PALETTE:');
    const occasionStart = content.indexOf('OCCASION_OUTFITS:');
    const hasOccasionTokens = paletteStart !== -1 && occasionStart !== -1 && paletteStart < occasionStart;

    if (hasOccasionTokens) {
      // Extract raw strings for each token
      const paletteRaw = content
        .slice(paletteStart + 'COLOR_PALETTE:'.length, occasionStart)
        .replace(/^```(?:json)?\s*/m, '').replace(/\s*```\s*$/m, '')
        .trim();
      const occasionRaw = content
        .slice(occasionStart + 'OCCASION_OUTFITS:'.length)
        .replace(/^```(?:json)?\s*/m, '').replace(/\s*```\s*$/m, '')
        .trim();

      console.log('[occasion] paletteRaw length:', paletteRaw.length, '| first 80:', paletteRaw.slice(0, 80));
      console.log('[occasion] occasionRaw length:', occasionRaw.length, '| first 80:', occasionRaw.slice(0, 80));

      // Always show clean text BEFORE the tokens — never show raw token text
      const displayText = content.slice(0, paletteStart)
        .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').trim();
      if (displayText) addMessage('ai', displayText);
      messages.push({ role:'assistant', content });

      let paletteJson = null, occasionJson = null;
      try { paletteJson  = JSON.parse(paletteRaw); }
      catch(e) { console.error('[occasion] palette parse error:', e.message, '| raw:', paletteRaw.slice(0, 120)); }
      try { occasionJson = JSON.parse(occasionRaw); }
      catch(e) { console.error('[occasion] occasion parse error:', e.message, '| raw:', occasionRaw.slice(0, 120)); }

      console.log('[occasion] paletteJson ok:', !!paletteJson);
      console.log('[occasion] occasionJson ok:', !!occasionJson);

      if (paletteJson && occasionJson) {
        console.log('[occasion] rendering card for:', occasionJson.occasion);
        setTimeout(() => renderOccasionCard(paletteJson, occasionJson), 300);
      }
      _chipSet = 'outfit';

    } else {
      // No occasion tokens — check OUTFIT_CARD and/or SEARCH_MODELS (source=both emits both), else plain text
      const outfitCardMatch = content.match(/OUTFIT_CARD:\s*(\{[\s\S]*?\})/);
      const tokMatch = content.match(/SEARCH_MODELS:\s*(\{[\s\S]*\})/);

      if (outfitCardMatch || tokMatch) {
        const firstTok = Math.min(
          outfitCardMatch ? content.indexOf('OUTFIT_CARD:') : Infinity,
          tokMatch ? content.indexOf('SEARCH_MODELS:') : Infinity
        );
        const displayText = content.slice(0, firstTok)
          .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '')
          .replace(/\s*```[a-z]*\s*$/g, '').trim();
        if (displayText) addMessage('ai', displayText);
        messages.push({ role:'assistant', content });

        if (outfitCardMatch) {
          try {
            const cardData = JSON.parse(outfitCardMatch[1]);
            setTimeout(async () => {
              await ensureClosetLoaded();
              renderClosetOutfitCard(cardData);
            }, 300);
          } catch(e) { console.error('[outfit_card] parse error:', e.message); }
          _chipSet = 'outfit';
        }

      if (tokMatch) {
        userProfile = { ...userProfile, ...extractProfile(messages) };
        updateProfileDisplay();

        let modelData;
        try { modelData = JSON.parse(tokMatch[1]); }
        catch(e) { addMessage('ai', 'Let me search for the best options for you…'); isLoading = false; showSuggestionChips('default'); return; }

        const srchTypId = showTyping();
        try {
          const found = await apiFetch('/api/search', { models:modelData.models || [], userProfile });
          removeTyping(srchTypId);
          if (!found.length) { addMessage('ai', "I couldn't find exact matches right now. Could you try rephrasing?"); isLoading = false; showSuggestionChips('default'); return; }
          products = found;
          if (!displayText) addMessage('ai', currentLang === 'es' ? 'Aquí están mis mejores opciones:' : 'Here are my top picks:');
          renderProductsInline(products, 'Expert picks for you');
          renderChipGroup([
            { label:'Compare',    msg:'Compare the items shown' },
            { label:'Lower budget',     msg:'Show me lower budget options' },
            { label:'More premium',     msg:'Show me more premium options' },
            { label:'Specific color',   msg:'I want a specific color' },
          ], msg => sendMessage(msg));
          _chipSet = 'products';
        } catch(e) {
          removeTyping(srchTypId);
          addMessage('ai', 'I had trouble searching right now. Please try again in a moment.');
        }
      }

      } else {
        const displayContent = content.replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').trim();
        messages.push({ role:'assistant', content });
        addMessage('ai', displayContent);
        renderOutfitCards(displayContent);
        if (onboardingActive && onboardingStep === 3) onboardingActive = false;
        _chipSet = 'default';
      }
    }

  } catch(e) {
    clearTimeout(timeoutId);
    removeTyping(typId);
    console.error('[chat] error:', e.message);
    addMessage('ai', 'Sorry, I hit a snag. Could you try that again?');
  }

  isLoading = false;
  showSuggestionChips();
}

// ── Input wiring ──────────────────────────────────────────────────────────
function wireInput(inp, btn) {
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
  });
  if (btn) btn.addEventListener('click', go);
  function go() {
    const v = inp.value.trim();
    if (!v) return;
    inp.value = '';
    sendMessage(v);
  }
}

function getObSlides() { return [
  { icon:'<svg viewBox="0 0 48 48" width="64" height="64" fill="none" stroke="var(--accent)" stroke-width="1.5" aria-hidden="true"><path d="M38 34H10a2 2 0 0 1-1.4-3.42L24 16l15.4 14.58A2 2 0 0 1 38 34z"/><path d="M24 16V11"/><circle cx="24" cy="9" r="2.5"/></svg>', title:t('ob_slide1_title'), body:t('ob_slide1_body') },
  { icon:'<svg viewBox="0 0 48 48" width="64" height="64" fill="none" stroke="var(--accent)" stroke-width="1.5" aria-hidden="true"><path d="M40 8H8a2 2 0 0 0-2 2v20a2 2 0 0 0 2 2h4v6l8-6h20a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2z"/><circle cx="16" cy="20" r="1.5" fill="var(--accent)"/><circle cx="24" cy="20" r="1.5" fill="var(--accent)"/><circle cx="32" cy="20" r="1.5" fill="var(--accent)"/></svg>', title:t('ob_slide2_title'), body:t('ob_slide2_body') },
  { icon:'<svg viewBox="0 0 48 48" width="64" height="64" fill="none" stroke="var(--accent)" stroke-width="1.5" aria-hidden="true"><path d="M12 14h24l-3 22H15L12 14z"/><path d="M19 14V11a5 5 0 0 1 10 0v3"/><circle cx="24" cy="26" r="3" fill="var(--accent)" stroke="none"/></svg>', title:t('ob_slide3_title'), body:t('ob_slide3_body') }
]; }

function showFirstRunOnboarding(afterFn) {
  let idx = 0;
  const overlay = document.createElement('div');
  overlay.className = 'ob-overlay';

  function render() {
    const slides = getObSlides();
    const s = slides[idx];
    const isLast = idx === slides.length - 1;
    overlay.innerHTML =
      '<div class="ob-sheet">' +
        '<div class="ob-icon" style="display:flex;align-items:center;justify-content:center">' + s.icon + '</div>' +
        '<div class="ob-title">' + s.title + '</div>' +
        '<div class="ob-body">' + s.body + '</div>' +
        '<div class="ob-dots">' +
          slides.map((_, i) => '<div class="ob-dot' + (i === idx ? ' active' : '') + '"></div>').join('') +
        '</div>' +
        '<div class="ob-actions">' +
          '<button class="ob-skip" onclick="finishOnboarding()">' + t('ob_skip') + '</button>' +
          '<button class="ob-next" onclick="' + (isLast ? 'finishOnboarding()' : 'nextObSlide()') + '">' +
            (isLast ? t('ob_start') : t('ob_next')) +
          '</button>' +
        '</div>' +
      '</div>';
  }

  window.nextObSlide  = () => { idx = Math.min(idx + 1, getObSlides().length - 1); render(); };
  window.finishOnboarding = () => {
    overlay.remove();
    localStorage.setItem('lumen_onboarded', '1');
    markOnboarded();
    if (afterFn) afterFn();
  };

  // Swipe left/right to move between slides
  let obTouchX = 0, obTouchY = 0;
  overlay.addEventListener('touchstart', e => {
    obTouchX = e.touches[0].clientX;
    obTouchY = e.touches[0].clientY;
  }, { passive: true });
  overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - obTouchX;
    const dy = Math.abs(e.changedTouches[0].clientY - obTouchY);
    if (Math.abs(dx) < 50 || dy > Math.abs(dx)) return;
    if (dx < 0) window.nextObSlide();
    else { idx = Math.max(idx - 1, 0); render(); }
  }, { passive: true });

  render();
  document.body.appendChild(overlay);
}

async function markOnboarded() {
  if (!currentSession?.access_token) return;
  fetch('/api/profile', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
    body: JSON.stringify({ updates: { has_onboarded: true } })
  }).catch(() => {});

async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }

  try {
    if (currentAuthTab === 'signup') {
      const signupRes  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'signup', email, password }) });
      const signupData = await signupRes.json();
      if (!signupRes.ok) { errEl.textContent = signupData.error || 'Signup failed'; return; }
    }
    const res  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'login', email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Something went wrong'; return; }
    localStorage.setItem('lumen_session', JSON.stringify(data.session));
    localStorage.setItem('lumen_user',    JSON.stringify(data.user));
    document.getElementById('auth-screen').remove();
    currentUser = data.user; currentSession = data.session;
    init();
  } catch(e) {
    errEl.textContent = 'Connection error. Try again.';
  }
}

async function signInWithGoogle() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { error } = await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:window.location.origin } });
    if (error) { const e = document.getElementById('auth-error'); if (e) e.textContent = 'Google sign-in failed. Try email instead.'; }
  } catch(e) {
    const errEl = document.getElementById('auth-error');
    if (errEl) errEl.textContent = 'Google sign-in unavailable. Try email instead.';
  }
}

// ── Session management ────────────────────────────────────────────────────
async function checkSession() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data:{ session } } = await supabase.auth.getSession();
    if (session) {
      localStorage.setItem('lumen_session', JSON.stringify(session));
      localStorage.setItem('lumen_user',    JSON.stringify(session.user));
      currentUser = session.user; currentSession = session;
      init(); return;
    }
  } catch(e) { /* fall through */ }

  const stored = localStorage.getItem('lumen_session');
  if (!stored) { showAuthScreen(); return; }

  try {
    const session = JSON.parse(stored);
    const res = await fetch('/api/auth', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + (session.access_token || '') },
      body:JSON.stringify({ action:'verify' })
    });
    if (res.ok) {
      const data = await res.json();
      currentUser = data.user; currentSession = session;
      init();
    } else {
      localStorage.removeItem('lumen_session');
      showAuthScreen();
    }
  } catch(e) { showAuthScreen(); }
}

function toggleCloset() {
  const panel = document.getElementById('closetPanel');
  const overlay = document.getElementById('overlay');
  if (!panel) return;

  closetVisible = !closetVisible;

  if (closetVisible) {
    panel.style.transform = 'translateX(-50%) translateY(0)';
    if (overlay) overlay.classList.add('show');
    loadClosetItems();
  } else {
    panel.style.transform = 'translateX(-50%) translateY(100%)';
    if (overlay) overlay.classList.remove('show');
  }
}

async function loadClosetItems() {
  // Render cached items immediately so the panel is never blank while fetching.
  renderClosetGrid(closetActiveCategory);
  updateClosetProgress();
  try {
    const res = await fetch('/api/closet', {
      method: 'GET',
      headers: {
        'Authorization': 'Bearer ' + (currentSession?.access_token || '')
      }
    });
    if (!res.ok) {
      // Non-200 response (e.g. auth error, 500): keep existing closetItems intact.
      console.error('[closet] fetch error:', res.status);
      return;
    }
    const data = await res.json();
    closetItems = data.items || [];
    renderClosetGrid(closetActiveCategory);
    updateClosetProgress();
  } catch(e) {
    console.error('[closet] load error:', e.message);
    // Network failure: leave closetItems/grid as-is so cached items remain visible.
  }
}

function _nudgeDismissed(id) {
  try { return JSON.parse(localStorage.getItem('lumen_nudges') || '{}')[id] === true; } catch(e) { return false; }
}
function _dismissNudge(id) {
  try {
    const seen = JSON.parse(localStorage.getItem('lumen_nudges') || '{}');
    seen[id] = true;
    localStorage.setItem('lumen_nudges', JSON.stringify(seen));
  } catch(e) {}
}

function renderNudge(containerId, nudgeId, text, onTap) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  if (_nudgeDismissed(nudgeId)) return;

  const wrap = document.createElement('div');
  wrap.style.cssText =
    'display:flex;align-items:center;gap:8px;padding:8px 14px;' +
    'background:var(--surface-warm);border-bottom:1px solid var(--border)';

  const arrow = document.createElement('span');
  arrow.setAttribute('aria-hidden', 'true');
  arrow.style.cssText = 'color:var(--ink-soft);font-size:13px;flex-shrink:0';
  arrow.textContent = '›';

  const label = document.createElement('span');
  label.style.cssText =
    'flex:1;font-size:14px;color:var(--ink-soft);line-height:1.3;' +
    (onTap ? 'cursor:pointer;text-decoration:underline;text-underline-offset:2px' : '');
  label.textContent = text;
  if (onTap) label.addEventListener('click', onTap);

  const dismiss = document.createElement('button');
  dismiss.setAttribute('aria-label', 'Dismiss');
  dismiss.style.cssText =
    'flex-shrink:0;background:none;border:none;cursor:pointer;' +
    'color:var(--ink-faint);font-size:16px;line-height:1;padding:2px 4px';
  dismiss.textContent = '×';
  dismiss.addEventListener('click', () => {
    _dismissNudge(nudgeId);
    container.innerHTML = '';
  });

  wrap.appendChild(arrow);
  wrap.appendChild(label);
  wrap.appendChild(dismiss);
  container.appendChild(wrap);
}

function updateClosetProgress() {
  const count = closetItems.length;
  const pct = Math.min((count / 10) * 100, 100);
  const countEl = document.getElementById('closetCount');
  const barEl = document.getElementById('closetProgressBar');
  if (countEl) countEl.textContent = count;
  if (barEl) barEl.style.width = pct + '%';

  if (count === 0) {
    renderNudge('closet-nudge', 'nudge_closet_0', t('nudge_0'));

function compressImage(dataUrl, maxDim, quality) {
  maxDim = maxDim || 1200;
  quality = quality || 0.8;
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else        { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const out = canvas.toDataURL('image/jpeg', quality);
      resolve({ base64: out.split(',')[1], mimeType: 'image/jpeg' });
    };
    img.src = dataUrl;
  });
}

function composeEditorialCard(cleanBase64, brandName) {
  return new Promise(function(resolve, reject) {
    const img = new Image();
    img.onload = function() {
      const W = 800, H = 1000, STRIP = 60;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Warm sand background
      ctx.fillStyle = '#EDE0D0';
      ctx.fillRect(0, 0, W, H);

      // Scale garment to 75% of canvas height, centered in upper area
      const availH = H - STRIP;
      const targetH = availH * 0.75;
      const scale = Math.min(targetH / img.height, (W * 0.8) / img.width);
      const dw = img.width * scale;
      const dh = img.height * scale;
      const dx = (W - dw) / 2;
      const dy = (availH - dh) / 2;

      // Garment drop shadow
      ctx.shadowColor = 'rgba(0,0,0,0.08)';
      ctx.shadowBlur = 24;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 8;
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Bottom white strip
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, H - STRIP, W, STRIP);

      // Brand label: LUMEN | BRANDNAME
      const label = 'LUMEN | ' + (brandName ? brandName.toUpperCase() : 'LUMEN');
      ctx.fillStyle = '#111111';
      ctx.font = '700 18px -apple-system, "Helvetica Neue", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if ('letterSpacing' in ctx) ctx.letterSpacing = '2px';
      ctx.fillText(label, W / 2, H - STRIP / 2);

      resolve(canvas.toDataURL('image/png').split(',')[1]);
    };
    img.onerror = reject;
    img.src = 'data:image/png;base64,' + cleanBase64;
  });
}

function closePhotoGuide() {
  document.getElementById('photo-guide')?.remove();
}

function openClosetUpload() {
  closePhotoGuide();
  document.getElementById('closetUpload')?.click();
}

async function handleClosetUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const { base64, mimeType } = await compressImage(ev.target.result);

    const grid = document.getElementById('closetGrid');
    const emptyEl = document.getElementById('closetEmpty');
    if (emptyEl) emptyEl.style.display = 'none';

    const loadingCell = document.createElement('div');
    loadingCell.id = 'prettify-loading';
    loadingCell.style.cssText =
      'aspect-ratio:3/4;border-radius:10px;background:var(--card);' +
      'display:flex;flex-direction:column;align-items:center;' +
      'justify-content:center;border:1.5px dashed var(--accent);gap:6px';
    loadingCell.innerHTML =
      '<div class="enrich-progress" style="width:48px;margin-bottom:6px"><div class="enrich-progress-fill"></div></div>' +
      '<div style="font-size:9px;color:var(--accent);font-weight:700;' +
      'text-align:center;text-transform:uppercase;letter-spacing:0.5px">' +
      'Prettifying...</div>';

    grid.insertBefore(loadingCell, grid.firstChild);

    try {
      const result = await fetch('/api/closet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (currentSession?.access_token || '')
        },
        body: JSON.stringify({ imageBase64: base64, mimeType })
      }).then(r => r.json());

      document.getElementById('prettify-loading')?.remove();

      if (result.error) {
        console.error('[closet]', result.error);
        showPrettifyError(grid, emptyEl);
        return;
      }

      if (result.items && result.items.length > 1) {
        showMultiItemReview(result.items);
      } else {
        window._pendingCleanBase64 = result.cleanBase64;
        showBrandConfirmation(result.garmentData);
      }

    } catch(err) {
      document.getElementById('prettify-loading')?.remove();
      console.error('[closet] upload failed:', err.message);
      showPrettifyError(grid, emptyEl);
    }
  };
  reader.readAsDataURL(file);
}

function showPrettifyError(grid, emptyEl) {
  if (closetItems.length === 0 && emptyEl) emptyEl.style.display = 'block';
  const errCell = document.createElement('div');
  errCell.style.cssText =
    'aspect-ratio:3/4;border-radius:10px;background:var(--card);' +
    'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
    'padding:14px;border:1.5px dashed #ff3b30;gap:8px;text-align:center';
  errCell.innerHTML =
    '<div style="display:flex;justify-content:center"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--ink-faint)" stroke-width="1.5" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>' +
    '<div style="font-size:11px;font-weight:600;color:var(--tx1);line-height:1.5">' +
      'That photo didn\'t work — try better lighting or lay the item flat' +
    '</div>' +
    '<button onclick="this.closest(\'[style]\').remove();showPhotoGuide()" ' +
      'style="margin-top:4px;padding:7px 14px;background:var(--tx1);color:#fff;' +
      'border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)">' +

  if (grid) grid.insertBefore(errCell, grid.firstChild);
}

async function deleteClosetItem(id) {
  if (!id) return;
  try {
    await fetch('/api/closet', {
      method: 'DELETE',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (currentSession?.access_token || '')
      },
      body: JSON.stringify({ id })
    });
    closetItems = closetItems.filter(i => i.id !== id);
    renderClosetGrid(closetActiveCategory);
    updateClosetProgress();
  } catch(e) {
    console.error('[closet] delete error:', e.message);
  }
}

let _detailItems = [];
let _detailIndex = 0;
let _similarProducts = [];
let _swipeInitialized = false;

function initDetailSwipe() {
  if (_swipeInitialized) return;
  _swipeInitialized = true;
  const sheet = document.getElementById('itemDetailSheet');
  if (!sheet) return;
  let sx = 0, sy = 0;
  sheet.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) navigateDetail(dx < 0 ? 1 : -1);
  }, { passive: true });
}

function openItemDetail(item) {
  initDetailSwipe();
  const src = closetActiveCategory === 'all' ? closetItems : closetItems.filter(i => i.category === closetActiveCategory);
  _detailItems = src.length ? src : [item];
  _detailIndex = _detailItems.findIndex(i => i.id === item.id);
  if (_detailIndex === -1) { _detailItems = [item]; _detailIndex = 0; }
  _detailItem = _detailItems[_detailIndex];
  renderDetailContent();
  document.getElementById('itemDetailSheet').style.transform = 'translateX(-50%) translateY(0)';
}

async function loadSimilarItems(item) {
  const grid = document.getElementById('detailSimilarGrid');
  const section = document.getElementById('detailSimilarSection');
  if (!grid || !section) return;
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: item.name, brand: item.brand || '', category: item.category || '', colors: item.colors || '' })
    });
    const data = await res.json();
    const products = data.products || [];
    if (!products.length) { section.style.display = 'none'; return; }
    _similarProducts = products;
    grid.innerHTML = products.map((p, i) =>
      '<div style="border-radius:12px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;position:relative;background:var(--bg)" onclick="openSimilarProduct(' + i + ')">' +
        '<div style="aspect-ratio:1/1;background:#F0EEEC;overflow:hidden;display:flex;align-items:center;justify-content:center">' +
          (p.image ? '<img src="' + p.image + '" style="width:100%;height:100%;object-fit:cover" loading="lazy">' : '<span style="color:var(--ink-faint)"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M20.38 18H3.62a1 1 0 0 1-.7-1.71L12 8l9.08 8.29A1 1 0 0 1 20.38 18z"/><path d="M12 8V5"/><circle cx="12" cy="4" r="1"/></svg></span>') +
        '</div>' +
        '<div style="padding:8px 10px 10px">' +
          '<div style="font-size:12px;font-weight:600;color:var(--tx1);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;margin-bottom:3px">' + p.title + '</div>' +
          '<div style="font-size:13px;font-weight:700;color:var(--tx1)">$' + (p.price || 0).toFixed(2) + '</div>' +

    console.error('[similar] load error:', e.message);
