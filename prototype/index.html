<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ShopAI</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FFFFFF;--card:#F5F5F5;--photo:#F0EEEC;--tx1:#111111;--tx2:#666666;--tx3:#999999;
  --accent:#E8490F;--border:#E5E5E5;
  --font:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx1);font-family:var(--font);-webkit-font-smoothing:antialiased;}

/* ── MOBILE APP ── */
.m-app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

/* Header */
.header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;}
.logo{font-size:21px;font-weight:800;letter-spacing:-0.6px;color:var(--tx1);line-height:1;display:flex;align-items:center;gap:2px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:1px;flex-shrink:0;margin-bottom:1px;}
.profile-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}

/* Scroll area */
.m-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + env(safe-area-inset-bottom,0px));}
.m-scroll::-webkit-scrollbar{display:none;}

/* Chat */
.chat{padding:14px 16px 10px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-end;}
.msg.u{flex-direction:row-reverse;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.av.ai{background:#111;}
.av.u{background:#E8E8E8;}
.bbl{padding:10px 14px;font-size:14px;line-height:1.5;}
.bbl.ai{background:var(--card);border-radius:18px 18px 18px 4px;color:var(--tx1);max-width:82%;}
.bbl.u{background:var(--tx1);border-radius:18px 18px 4px 18px;color:#fff;max-width:75%;}

/* Pin tray */
.pin-tray{margin:2px 16px 14px;background:var(--card);border-radius:12px;padding:12px 14px;}
.pin-tray-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.pin-row{display:flex;align-items:center;gap:7px;}
.pin-th{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--photo);}
.pin-th img{width:100%;height:100%;object-fit:cover;}
.pin-th-empty{width:52px;height:52px;border-radius:8px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tx3);font-size:18px;font-weight:300;}
.pin-action{margin-left:auto;font-size:12px;font-weight:600;color:var(--tx1);text-decoration:underline;cursor:pointer;white-space:nowrap;}

/* Section label */
.sec-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding:0 16px;}

/* Grid */
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;}

/* Card */
.card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;transition:transform 0.1s ease;}
.card:active{transform:scale(0.97);}

/* Tutorial ring */
@keyframes tutPulse{
  0%  {box-shadow:0 0 0 3px rgba(232,73,15,0.9);}
  16% {box-shadow:0 0 0 9px rgba(232,73,15,0);}
  33% {box-shadow:0 0 0 3px rgba(232,73,15,0.7);}
  49% {box-shadow:0 0 0 9px rgba(232,73,15,0);}
  66% {box-shadow:0 0 0 3px rgba(232,73,15,0.45);}
  82% {box-shadow:0 0 0 9px rgba(232,73,15,0);}
  100%{box-shadow:none;}
}
.tut-ring{animation:tutPulse 3s ease-out forwards;}

/* Card photo */
.c-photo{width:100%;height:180px;background:#F0EEEC !important;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden;}
.c-photo img{width:100%;height:100%;object-fit:contain;object-position:center;}

/* Pin btn */
.pin-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.18);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;font-size:13px;transition:background 0.15s,transform 0.1s;flex-shrink:0;}
.pin-btn:active{transform:scale(0.88);}
.pin-btn.on{background:#111;}

/* Badge */
.badge{position:absolute;top:8px;left:8px;z-index:3;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.2px;}
.b-expert{background:#FFF0E8;color:var(--accent);}
.b-value {background:#F0FDF4;color:#16A34A;}
.b-seller{background:rgba(0,0,0,0.07);color:#111;}

/* Card body */
.c-body{padding:9px 11px 13px;}
.c-brand{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.c-model{font-size:13px;font-weight:600;color:var(--tx1);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px;}
.c-cat{font-size:10px;color:var(--tx3);margin-bottom:7px;}
.price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.c-price{font-size:18px;font-weight:700;color:var(--tx1);}
.ppill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}
.pp-deal{background:#F0FDF4;color:#16A34A;}
.pp-typ {background:#FEFCE8;color:#CA8A04;}
.pp-high{background:#FEF2F2;color:#DC2626;}
.c-store{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx2);margin-bottom:2px;}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.c-rating{font-size:10px;color:var(--tx3);}
.stars{color:#F59E0B;}

/* Chips */
.chips-wrap{padding:10px 16px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chips-inner{display:inline-flex;gap:7px;}
.chip{display:inline-flex;align-items:center;padding:8px 13px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--tx1);background:#fff;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all 0.1s;}
.chip.hit{background:var(--tx1);color:#fff;border-color:var(--tx1);}

/* Input */
.input-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px calc(22px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:10px;z-index:20;}
.inp{flex:1;height:44px;background:#F0F0F0;border-radius:22px;border:none;padding:0 18px;font-size:15px;font-family:var(--font);color:var(--tx1);outline:none;-webkit-appearance:none;}
.inp::placeholder{color:var(--tx3);}
.send{width:36px;height:36px;border-radius:50%;background:var(--tx1);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send svg{width:15px;height:15px;}

/* ── DEEP DIVE ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
.overlay.on{opacity:1;pointer-events:all;}

.dd-panel{position:fixed;bottom:0;left:0;right:0;max-height:92dvh;background:#fff;border-radius:24px 24px 0 0;z-index:101;transform:translateY(100%);display:flex;flex-direction:column;will-change:transform;user-select:none;}
.dd-handle{width:40px;height:4px;background:#CCC;border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.dd-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px;flex-shrink:0;}
.dot{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--tx1);background:transparent;transition:background 0.2s;}
.dot.on{background:var(--tx1);}
.dd-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.dd-scroll::-webkit-scrollbar{display:none;}
.dd-content{padding:2px 16px 48px;transition:opacity 0.2s ease,transform 0.2s ease;}

/* Deep dive internals */
.dd-photo{width:100%;height:280px;background:#F0EEEC !important;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:16px;margin-bottom:16px;overflow:hidden;}
.dd-photo img{width:100%;height:100%;object-fit:contain;object-position:center;}
.dd-brand{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;}
.dd-model{font-size:26px;font-weight:700;color:var(--tx1);letter-spacing:-0.5px;line-height:1.15;margin:3px 0 4px;}
.dd-cat{font-size:14px;color:var(--tx2);margin-bottom:16px;}
.dd-div{height:1px;background:var(--border);margin:16px 0;}
.dd-stitle{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:11px;}

.store-row{display:flex;align-items:center;padding:10px 12px;border-radius:10px;margin-bottom:6px;}
.store-row.best{background:#FFF0E8;}
.si{flex:1;}
.sname{font-size:14px;font-weight:600;color:var(--tx1);}
.store-row.best .sname{color:var(--accent);}
.sdel{font-size:11px;color:var(--tx2);margin-top:1px;}
.sprice{font-size:17px;font-weight:700;color:var(--tx1);}
.store-row.best .sprice{color:var(--accent);}
.deal-note{font-size:12px;color:#16A34A;font-weight:500;margin-top:6px;}

.expert-text{font-size:15px;line-height:1.65;color:var(--tx1);}

.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.score-lbl{width:76px;font-size:12px;color:var(--tx2);flex-shrink:0;}
.score-track{flex:1;height:4px;background:#EFEFEF;border-radius:2px;overflow:hidden;}
.score-fill{height:100%;background:var(--tx1);border-radius:2px;width:0;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.score-val{font-size:12px;font-weight:600;color:var(--tx1);width:26px;text-align:right;flex-shrink:0;}

.tech-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{padding:5px 11px;background:var(--card);border-radius:20px;font-size:12px;color:var(--tx1);}

.rev{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;font-size:13px;line-height:1.45;}
.rev.pro{color:#16A34A;}
.rev.con{color:#B45309;}

.fun-fact{font-size:13px;color:var(--tx2);font-style:italic;line-height:1.55;}

.cta-btn{width:100%;height:54px;background:var(--tx1);color:#fff;border:none;border-radius:27px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:22px;letter-spacing:-0.2px;}
.cta-sub{text-align:center;font-size:11px;color:var(--tx3);margin-top:6px;}

/* ── DESKTOP ── */
.d-app{display:none;}
@media(min-width:768px){
  .m-app{display:none;}
  .d-app{display:flex;height:100dvh;overflow:hidden;}

  .d-sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:#fff;}
  .d-logo{height:60px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);}
  .d-logo .logo{font-size:20px;}
  .d-profile{padding:16px 20px;border-bottom:1px solid var(--border);}
  .d-av{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;}
  .d-name{font-size:14px;font-weight:600;color:var(--tx1);}
  .d-detail{font-size:12px;color:var(--tx2);margin-top:2px;}
  .d-pins-sec{padding:16px 20px;}
  .d-pins-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .d-pins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .d-pt{aspect-ratio:1;border-radius:8px;background:var(--photo);overflow:hidden;}
  .d-pt img{width:100%;height:100%;object-fit:cover;}
  .d-pt-empty{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:14px;}

  .d-chat{width:380px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .d-chat-head{height:60px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;flex-shrink:0;}
  .d-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .d-msgs::-webkit-scrollbar{display:none;}
  .d-inp-wrap{padding:12px 16px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;}

  .d-products{flex:1;overflow:hidden;display:flex;flex-direction:column;}
  .d-prod-head{height:60px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .d-prod-count{font-size:14px;font-weight:600;color:var(--tx1);}
  .d-prod-scroll{flex:1;overflow-y:auto;padding:16px;}
  .d-prod-scroll::-webkit-scrollbar{display:none;}
  .d-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
  .d-grid .card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.07);}
  .d-grid .card{transition:transform 0.18s ease,box-shadow 0.18s ease;}
}
</style>
</head>
<body>

<!-- ════════ MOBILE ════════ -->
<div class="m-app">
  <div class="header">
    <div class="logo">ShopAI<span class="logo-dot"></span></div>
    <button class="profile-btn" aria-label="Profile">👤</button>
  </div>

  <div class="m-scroll" id="mScroll">
  </div>

  <!-- Input -->
  <div class="input-bar">
    <input class="inp" id="mInput" type="text" placeholder="Ask about shoes, sizing, or alternatives…" />
    <button class="send" id="mSend" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- ════════ DESKTOP ════════ -->
<div class="d-app">
  <!-- Sidebar -->
  <div class="d-sidebar">
    <div class="d-logo"><div class="logo">ShopAI<span class="logo-dot"></span></div></div>
    <div class="d-profile">
      <div class="d-av">😊</div>
      <div class="d-name" id="dProfileName">Your Profile</div>
      <div class="d-detail" id="dProfileDetail">Tell me what you need</div>
    </div>
    <div class="d-pins-sec">
      <div class="d-pins-lbl">📌 Shortlist</div>
      <div class="d-pins-grid" id="dPinsGrid">
        <div class="d-pt-empty">+</div>
        <div class="d-pt-empty">+</div>
        <div class="d-pt-empty">+</div>
        <div class="d-pt-empty">+</div>
      </div>
    </div>
  </div>

  <!-- Chat panel -->
  <div class="d-chat">
    <div class="d-chat-head">Conversation</div>
    <div class="d-msgs" id="dMsgs"></div>
    <div class="d-inp-wrap">
      <input class="inp" id="dInput" type="text" placeholder="Ask a follow-up…" />
      <button class="send" id="dSend">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Products panel -->
  <div class="d-products">
    <div class="d-prod-head"><span class="d-prod-count" id="dProdCount">Ready to search</span></div>
    <div class="d-prod-scroll"><div class="d-grid" id="dGrid"></div></div>
  </div>
</div>

<!-- ════════ DEEP DIVE ════════ -->
<div class="overlay" id="overlay" onclick="overlayClick(event)"></div>
<div class="dd-panel" id="ddPanel">
  <div class="dd-handle"></div>
  <div class="dd-dots" id="ddDots"></div>
  <div class="dd-scroll" id="ddScroll">
    <div class="dd-content" id="ddContent"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let products    = [];
let pinned      = new Set();
let curIdx      = 0;
let panelOpen   = false;
let messages    = [];
let userProfile = {};
let enrichCache = {};
let isLoading   = false;

// ── Maps ──────────────────────────────────────────────────────────────────
const INDS = {
  LOW:   { cls:'pp-deal', lbl:'🟢 Low'   },
  USUAL: { cls:'pp-typ',  lbl:'🟡 Usual' },
  HIGH:  { cls:'pp-high', lbl:'🔴 High'  }
};

const STORE_COLORS = {
  'Amazon':'#FF9900','Zappos':'#005DAA','Nike.com':'#111','Hoka.com':'#009BDE',
  'NB.com':'#CC0000','On.com':'#111','Adidas.com':'#111','REI':'#4CAF50',
  'ASICS.com':'#1B4D8E','Walmart':'#0071CE'
};

// ── Utilities ─────────────────────────────────────────────────────────────
function stars(r) {
  const f = Math.round(r || 0);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function parseMarkdown(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function storeColor(src) { return STORE_COLORS[src] || '#999'; }

function extractProfile(msgs) {
  const t = msgs.map(m => m.content).join(' ').toLowerCase();
  const p = {};
  const sz  = t.match(/size\s+(\d+(?:\.\d+)?)/);
  const bud = t.match(/under\s+\$?(\d+)/);
  if (sz)  p.shoeSize = sz[1];
  if (bud) p.budget   = parseInt(bud[1]);
  if (t.includes('wide'))   p.width = 'wide';
  if (t.includes('narrow')) p.width = 'narrow';
  ['running','hiking','basketball','tennis','casual','walking'].forEach(u => {
    if (t.includes(u)) p.useCase = u;
  });
  return p;
}

function updateProfileDisplay() {
  const nameEl   = document.getElementById('dProfileName');
  const detailEl = document.getElementById('dProfileDetail');
  if (!nameEl) return;
  const parts = [];
  if (userProfile.shoeSize) parts.push('Size ' + userProfile.shoeSize);
  if (userProfile.width)    parts.push(userProfile.width.charAt(0).toUpperCase() + userProfile.width.slice(1));
  if (userProfile.useCase)  parts.push(userProfile.useCase.charAt(0).toUpperCase() + userProfile.useCase.slice(1));
  if (parts.length && detailEl) detailEl.textContent = parts.join(' · ');
}

// ── Chat UI ───────────────────────────────────────────────────────────────
function scrollBottom() {
  const ms = document.getElementById('mScroll');
  const dc = document.getElementById('dMsgs');
  if (ms) ms.scrollTop = ms.scrollHeight;
  if (dc) dc.scrollTop = dc.scrollHeight;
}

function addMessage(role, text) {
  const isAI = role === 'ai';
  const html  = `<div class="msg${isAI ? '' : ' u'}"><div class="av ${isAI ? 'ai' : 'u'}">${isAI ? '🤖' : '😊'}</div><div class="bbl ${isAI ? 'ai' : 'u'}">${isAI ? parseMarkdown(text) : text}</div></div>`;
  const mc = document.getElementById('shopai-chat');
  const dc = document.getElementById('dMsgs');
  if (mc) mc.insertAdjacentHTML('beforeend', html);
  if (dc) dc.insertAdjacentHTML('beforeend', html);
  scrollBottom();
}

function showTyping() {
  const id   = 'typ' + Date.now();
  const html = `<div class="msg" id="${id}"><div class="av ai">🤖</div><div class="bbl ai" style="color:var(--tx3);font-style:italic">ShopAI is thinking…</div></div>`;
  const mc = document.getElementById('shopai-chat');
  const dc = document.getElementById('dMsgs');
  if (mc) mc.insertAdjacentHTML('beforeend', html);
  if (dc) dc.insertAdjacentHTML('beforeend', html);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  document.querySelectorAll('#' + id).forEach(el => el.remove());
}

// ── API ───────────────────────────────────────────────────────────────────
async function apiFetch(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(path + ' ' + res.status);
  return res.json();
}

async function enrichProduct(p) {
  if (enrichCache[p.id]) return enrichCache[p.id];
  const data = await apiFetch('/api/enrich', { product: p, userProfile });
  enrichCache[p.id] = data;
  return data;
}

// ── Cards ─────────────────────────────────────────────────────────────────
function makeCard(p, isFirst) {
  const ind   = INDS[p.priceIndicator] || INDS.USUAL;
  const isPin = pinned.has(p.id);
  const pinSvg = isPin
    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="#fff" stroke="#fff" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
    : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  return `
<div class="card${isFirst ? ' tut-ring' : ''}" data-id="${p.id}" onclick="openDD(${p.id})">
  <div class="c-photo">
    <img src="${p.img || ''}" alt="${p.brand} ${p.name || ''}" loading="lazy" onerror="this.style.display='none'">
    ${p.why ? '<div class="badge b-expert">Expert Pick</div>' : ''}
    <button class="pin-btn${isPin ? ' on' : ''}" onclick="togglePin(event,${p.id})" aria-label="Pin">${pinSvg}</button>
  </div>
  <div class="c-body">
    <div class="c-brand">${p.brand || ''}</div>
    <div class="c-model">${p.name || ''}</div>
    <div class="c-cat">${p.category || ''}</div>
    <div class="price-row">
      <span class="c-price">$${p.price || ''}</span>
      <span class="ppill ${ind.cls}">${ind.lbl}</span>
    </div>
    <div class="c-store"><span class="s-dot" style="background:${storeColor(p.source)}"></span>${p.source || ''}</div>
    <div class="c-rating"><span class="stars">${stars(p.rating)}</span> ${p.rating || ''} (${(p.reviews || 0).toLocaleString()})</div>
  </div>
</div>`;
}

function renderProducts() {
  const mg   = document.getElementById('mGrid');
  const dg   = document.getElementById('dGrid');
  const html = products.map((p, i) => makeCard(p, i === 0)).join('');
  if (mg) mg.innerHTML = html;
  if (dg) dg.innerHTML = html;
  setTimeout(() => document.querySelectorAll('.tut-ring').forEach(el => el.classList.remove('tut-ring')), 3200);

  const label = products.length + ' expert picks for you';
  const sl = document.getElementById('shopai-sec-label');
  const dl = document.getElementById('dProdCount');
  if (sl) { sl.textContent = label; sl.style.display = ''; }
  if (dl) dl.textContent = label;

  updatePinTray();
}

function togglePin(e, id) {
  e.stopPropagation();
  pinned.has(id) ? pinned.delete(id) : pinned.add(id);
  renderProducts();
}

function updatePinTray() {
  const pinnedList = products.filter(p => pinned.has(p.id));
  const row  = document.getElementById('shopai-pin-row');
  const tray = document.getElementById('shopai-pin-tray');
  const dg   = document.getElementById('dPinsGrid');

  if (row) {
    let h = '';
    for (let i = 0; i < 5; i++) {
      const p = pinnedList[i];
      h += p
        ? '<div class="pin-th"><img src="' + (p.img||'') + '" alt="' + p.brand + '" onerror="this.style.display=\'none\'"></div>'
        : '<div class="pin-th-empty">+</div>';
    }
    h += '<span class="pin-action" onclick="findSimilar()">Find similar →</span>';
    row.innerHTML = h;
    if (tray) tray.style.display = pinnedList.length ? '' : 'none';
  }

  if (dg) {
    let h = '';
    for (let i = 0; i < 4; i++) {
      const p = pinnedList[i];
      h += p
        ? '<div class="d-pt"><img src="' + (p.img||'') + '" alt="' + p.brand + '" onerror="this.style.display=\'none\'"></div>'
        : '<div class="d-pt-empty">+</div>';
    }
    dg.innerHTML = h;
  }
}

function findSimilar() {
  const list = products.filter(p => pinned.has(p.id));
  if (!list.length) return;
  sendMessage('Find more options similar to my pinned shoes: ' + list.map(p => p.brand + ' ' + (p.name || '')).join(', '));
}

// ── Chips ─────────────────────────────────────────────────────────────────
function chipTap(el) {
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), 280);
  const txt = el.textContent.trim().replace(/^[^a-zA-Z]+/, '').trim();
  if (txt) sendMessage(txt);
}

// ── Deep Dive ─────────────────────────────────────────────────────────────
const ddPanel   = document.getElementById('ddPanel');
const ddContent = document.getElementById('ddContent');
const ddScroll  = document.getElementById('ddScroll');
const overlay   = document.getElementById('overlay');

function buildDots() {
  document.getElementById('ddDots').innerHTML =
    products.map((_, i) => '<div class="dot' + (i === curIdx ? ' on' : '') + '"></div>').join('');
}

function syncDots() {
  document.querySelectorAll('#ddDots .dot').forEach((d, i) => d.classList.toggle('on', i === curIdx));
}

function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-fill').forEach(el => {
      el.style.width = (el.dataset.w || 0) + '%';
    });
  });
}

function populateDeepDiveBasic(p) {
  const ind = INDS[p.priceIndicator] || INDS.USUAL;
  ddContent.innerHTML = `
<div class="dd-photo"><img src="${p.img || ''}" alt="${p.brand} ${p.name || ''}" onerror="this.style.display='none'"></div>
<div class="dd-brand">${p.brand || ''}</div>
<div class="dd-model">${p.name || ''}</div>
<div class="dd-cat">${p.category || ''}</div>
<div class="dd-div"></div>
<div class="dd-stitle">💰 Best price right now</div>
<div class="store-row best">
  <div class="si">
    <div class="sname">${p.source || ''}</div>
    <div class="sdel">${p.delivery || ''}</div>
  </div>
  <div class="sprice">$${p.price || ''}</div>
</div>
<div style="margin-top:6px"><span class="ppill ${ind.cls}">${ind.lbl} price</span></div>
<div id="enrich-section">
  <div class="dd-div"></div>
  <div class="dd-stitle" style="color:var(--tx3)">🔄 Loading expert analysis…</div>
</div>
<a class="cta-btn" href="${p.link || '#'}" target="_blank" rel="noopener noreferrer" style="display:block;text-decoration:none;text-align:center;line-height:54px;margin-top:22px">Buy on ${p.source || ''} — $${p.price || ''}</a>
<p class="cta-sub">Best price · ${p.delivery || ''}</p>`;
}

function populateDeepDiveEnriched(data) {
  const el = document.getElementById('enrich-section');
  if (!el) return;
  const scores   = data.scores || {};
  const tech     = Array.isArray(data.technology) ? data.technology : [data.technology || ''];
  const techHtml = tech.filter(Boolean).map(t => '<span class="tag">' + t + '</span>').join('');
  const scoreRows = Object.entries(scores).map(function(entry) {
    const lbl = entry[0], val = entry[1];
    return '<div class="score-row"><span class="score-lbl">' + lbl + '</span><div class="score-track"><div class="score-fill" data-w="' + val + '" style="width:0%"></div></div><span class="score-val">' + ((val || 0) / 10).toFixed(1) + '</span></div>';
  }).join('');
  el.outerHTML = `
<div class="dd-div"></div>
<div class="dd-stitle">🏆 Expert take</div>
<p class="expert-text">${data.expertTake || ''}</p>
<div class="dd-div"></div>
<div class="dd-stitle">📊 Match score</div>
${scoreRows}
<div class="dd-div"></div>
<div class="dd-stitle">⚡ Technology</div>
<div class="tech-tags">${techHtml}</div>
<div class="dd-div"></div>
<div class="dd-stitle">⭐ Reviews</div>
${data.prosSummary ? '<div class="rev pro">✓ ' + data.prosSummary + '</div>' : ''}
${data.consSummary ? '<div class="rev con">💡 ' + data.consSummary + '</div>' : ''}
${data.funFact ? '<div class="dd-div"></div><div class="dd-stitle">🏅 Did you know</div><p class="fun-fact">' + data.funFact + '</p>' : ''}`;
  requestAnimationFrame(animateBars);
}

function openDD(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  curIdx = products.indexOf(p);
  buildDots();
  populateDeepDiveBasic(p);
  ddScroll.scrollTop = 0;
  overlay.classList.add('on');
  ddPanel.style.transition = 'none';
  ddPanel.style.transform  = 'translateY(100%)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ddPanel.style.transition = 'transform 0.35s cubic-bezier(0.32,0.72,0,1)';
    ddPanel.style.transform  = 'translateY(0)';
    panelOpen = true;
  }));
  enrichProduct(p).then(function(data) {
    if (panelOpen && products[curIdx] && products[curIdx].id === id) {
      populateDeepDiveEnriched(data);
    }
  }).catch(function() {});
}

function closeDD() {
  ddPanel.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
  ddPanel.style.transform  = 'translateY(100%)';
  overlay.classList.remove('on');
  panelOpen = false;
}

function overlayClick(e) { if (e.target === overlay) closeDD(); }

function navigate(dir) {
  const next = curIdx + dir;
  if (next < 0 || next >= products.length) return;
  const slideOut = dir > 0 ? -22 : 22;
  const slideIn  = dir > 0 ?  22 : -22;
  ddContent.style.transition = 'opacity 0.15s ease,transform 0.15s ease';
  ddContent.style.opacity    = '0';
  ddContent.style.transform  = 'translateX(' + slideOut + 'px)';
  const nextP = products[next];
  setTimeout(function() {
    curIdx = next;
    populateDeepDiveBasic(nextP);
    syncDots();
    ddScroll.scrollTop = 0;
    ddContent.style.transition = 'none';
    ddContent.style.transform  = 'translateX(' + slideIn + 'px)';
    ddContent.style.opacity    = '0';
    requestAnimationFrame(function() { requestAnimationFrame(function() {
      ddContent.style.transition = 'opacity 0.22s ease,transform 0.22s ease';
      ddContent.style.opacity    = '1';
      ddContent.style.transform  = 'translateX(0)';
    }); });
    enrichProduct(nextP).then(function(data) {
      if (panelOpen && curIdx === next) populateDeepDiveEnriched(data);
    }).catch(function() {});
  }, 150);
}

// ── Touch ─────────────────────────────────────────────────────────────────
var tx0 = 0, ty0 = 0, tt0 = 0, dragging = false;

ddPanel.addEventListener('touchstart', function(e) {
  tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; tt0 = Date.now();
  dragging = true;
  ddPanel.style.transition = 'none';
}, { passive: true });

ddPanel.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  var dx = e.touches[0].clientX - tx0, dy = e.touches[0].clientY - ty0;
  if (dy > 0 && ddScroll.scrollTop <= 0 && Math.abs(dy) > Math.abs(dx)) {
    ddPanel.style.transform = 'translateY(' + (dy * 0.36) + 'px)';
    e.preventDefault();
  }
}, { passive: false });

ddPanel.addEventListener('touchend', function(e) {
  if (!dragging) return;
  dragging = false;
  var dx  = e.changedTouches[0].clientX - tx0;
  var dy  = e.changedTouches[0].clientY - ty0;
  var vel = dy / (Date.now() - tt0);
  if (dy > 80 && vel > 0.22 && ddScroll.scrollTop <= 0) { closeDD(); return; }
  ddPanel.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
  ddPanel.style.transform  = 'translateY(0)';
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    dx < 0 ? navigate(1) : navigate(-1);
  }
}, { passive: true });

document.addEventListener('keydown', function(e) {
  if (!panelOpen) return;
  if (e.key === 'Escape')     closeDD();
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
});

// ── Send Message ──────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  const typId = showTyping();

  try {
    const data    = await apiFetch('/api/chat', { messages });
    removeTyping(typId);
    const content  = data.content || '';
    const tokMatch = content.match(/SEARCH_MODELS:(\{[\s\S]*\})/);

    if (tokMatch) {
      const displayText = content.slice(0, content.indexOf('SEARCH_MODELS:')).trim();
      if (displayText) addMessage('ai', displayText);
      messages.push({ role: 'assistant', content });
      userProfile = extractProfile(messages);
      updateProfileDisplay();

      let modelData;
      try { modelData = JSON.parse(tokMatch[1]); }
      catch (e) { addMessage('ai', "Let me search for the best options for you…"); isLoading = false; return; }

      const srchTypId = showTyping();
      try {
        const found = await apiFetch('/api/search', { models: modelData.models || [], userProfile });
        removeTyping(srchTypId);

        if (!found.length) {
          addMessage('ai', "I couldn't find exact matches right now. Could you try rephrasing your search?");
          isLoading = false; return;
        }

        products = found;
        const hasWhy  = !!products[0].why;
        const useCase = (products[0] && products[0].category) || 'your needs';
        addMessage('ai', hasWhy
          ? "Here are my expert picks for you — each selected specifically for " + useCase + ". I've matched the best models to your profile and found real prices across retailers."
          : "I found " + products.length + " options specifically for you — here are your top picks:");

        renderProducts();

        const cw = document.getElementById('shopai-chips');
        if (cw) cw.style.display = '';
        const ms = document.getElementById('mScroll');
        const mg = document.getElementById('mGrid');
        if (ms && mg) setTimeout(function() { mg.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 300);

      } catch (e) {
        removeTyping(srchTypId);
        addMessage('ai', "I had trouble searching right now. Please try again in a moment.");
      }

    } else {
      messages.push({ role: 'assistant', content });
      addMessage('ai', content);
    }

  } catch (e) {
    removeTyping(typId);
    addMessage('ai', "I'm having trouble connecting. Please check your connection and try again.");
  }

  isLoading = false;
}

// ── Input wiring ──────────────────────────────────────────────────────────
function wireInput(inp, btn) {
  if (!inp) return;
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
  });
  if (btn) btn.addEventListener('click', go);
  function go() {
    var v = inp.value.trim();
    if (!v) return;
    inp.value = '';
    sendMessage(v);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
(function init() {
  var mScrollEl = document.getElementById('mScroll');
  if (mScrollEl) {
    mScrollEl.innerHTML = [
      '<div class="chat" id="shopai-chat"></div>',
      '<div class="pin-tray" id="shopai-pin-tray" style="display:none">',
      '  <div class="pin-tray-lbl">📌 Your shortlist</div>',
      '  <div class="pin-row" id="shopai-pin-row"></div>',
      '</div>',
      '<div class="sec-label" id="shopai-sec-label" style="display:none"></div>',
      '<div class="m-grid" id="mGrid"></div>',
      '<div class="chips-wrap" id="shopai-chips" style="display:none;margin-top:12px">',
      '  <div class="chips-inner">',
      '    <button class="chip" onclick="chipTap(this)">🔍 More like these</button>',
      '    <button class="chip" onclick="chipTap(this)">🏷️ Same brand</button>',
      '    <button class="chip" onclick="chipTap(this)">💰 Lower price</button>',
      '    <button class="chip" onclick="chipTap(this)">⚡ Better tech</button>',
      '    <button class="chip" onclick="chipTap(this)">🎨 Other colors</button>',
      '    <button class="chip" onclick="chipTap(this)">🏆 Premium picks</button>',
      '  </div>',
      '</div>'
    ].join('');
  }

  try {
    var saved = localStorage.getItem('shopai_profile');
    if (saved) userProfile = JSON.parse(saved);
  } catch (e) {}

  wireInput(document.getElementById('mInput'), document.getElementById('mSend'));
  wireInput(document.getElementById('dInput'), document.getElementById('dSend'));

  addMessage('ai', "Hi! I'm ShopAI — your personal shoe expert. Tell me what you're looking for and I'll find the best deals across every store.");
})();
</script>
