  }
}

function logLinkClick(title, price, merchant, link, source) {
  if (!currentSession?.access_token) return;
  fetch('/api/taste-signal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
    body: JSON.stringify({ signal_type: 'link_click', content: { title, price, merchant, link, source } })
  }).catch(() => {});
}

function openSimilarProduct(idx) {
  const p = _similarProducts[idx];
  if (!p || !p.link) return;
  logLinkClick(p.title, p.price, p.merchant, p.link, 'similar');
  window.open(p.link, '_blank', 'noopener');
}

function toggleSimilarLike(btn, idx) {
  const p = _similarProducts[idx];
  if (!p) return;
  const liked = btn.dataset.liked === '1';
  btn.dataset.liked = liked ? '0' : '1';
  btn.innerHTML     = liked ? '<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M17.21 3.79a4.5 4.5 0 0 0-6.36 0L10 4.64l-.85-.85a4.5 4.5 0 0 0-6.36 6.36l.85.85L10 17.36l6.36-6.36.85-.85a4.5 4.5 0 0 0 0-6.36z"/></svg>' : '<svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M17.21 3.79a4.5 4.5 0 0 0-6.36 0L10 4.64l-.85-.85a4.5 4.5 0 0 0-6.36 6.36l.85.85L10 17.36l6.36-6.36.85-.85a4.5 4.5 0 0 0 0-6.36z"/></svg>';
  if (!liked && currentSession?.access_token) {
    fetch('/api/taste-signal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
      body: JSON.stringify({ signal_type: 'product_like', content: { title: p.title, price: p.price, merchant: p.merchant, link: p.link } })
    }).catch(e => console.error('[taste] signal error:', e.message));
  }
}

function navigateDetail(dir) {
  const next = _detailIndex + dir;
  if (next < 0 || next >= _detailItems.length) return;
  const inner = document.getElementById('itemDetailInner');
  if (!inner) return;
  inner.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
  inner.style.transform   = 'translateX(' + (dir > 0 ? '-60px' : '60px') + ')';
  inner.style.opacity     = '0';
  setTimeout(() => {
    _detailIndex = next;
    _detailItem  = _detailItems[_detailIndex];
    renderDetailContent();
    inner.style.transition = 'none';
    inner.style.transform  = 'translateX(' + (dir > 0 ? '60px' : '-60px') + ')';
    inner.style.opacity    = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      inner.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
      inner.style.transform  = 'translateX(0)';
      inner.style.opacity    = '1';
    }));
  }, 180);
}

function closeItemDetail() {
  document.getElementById('itemDetailSheet').style.transform = 'translateX(-50%) translateY(100%)';
  _detailItem = null;
}

function markDetailDirty() {
  const btn = document.getElementById('detailSaveBtn');
  if (btn) btn.style.display = 'block';
}

async function saveDetailEdit() {
  if (!_detailItem) return;
  const name  = document.getElementById('detailNameInput')?.value?.trim();
  const brand = document.getElementById('detailBrandInput')?.value?.trim() || null;
  if (!name) return;
  const btn = document.getElementById('detailSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    await fetch('/api/closet', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (currentSession?.access_token||'') },
      body: JSON.stringify({ id: _detailItem.id, name, brand })
    });
    const item = closetItems.find(i => i.id === _detailItem.id);
    if (item) { item.name = name; item.brand = brand; _detailItem = item; }
    if (btn) { btn.style.display = 'none'; btn.disabled = false; btn.textContent = t('detail_save'); }
    renderClosetGrid(closetActiveCategory);
  } catch(e) {
    console.error('[detail] save error:', e.message);
    if (btn) { btn.disabled = false; btn.textContent = t('detail_save'); }
  }
}

function detailAction(action) {
  if (!_detailItem) return;
  const item = _detailItem;
  closeItemDetail();
  if (action === 'remove') { deleteClosetItem(item.id); return; }
  toggleCloset();
  setTimeout(() => {
    if (action === 'style')   sendMessage('Build me an outfit around my ' + item.name);
    if (action === 'similar') sendMessage('Find pieces similar to my ' + item.name);
    if (action === 'cheaper') sendMessage('Find me ' + item.name + ' at a lower price');
  }, 400);
}

function filterBrandsDetail(val) {
  const box = document.getElementById('brandSuggestionsDetail');
  if (!box) return;
  const q = val.trim().toLowerCase();
  const matches = q ? BRANDS.filter(b => b.toLowerCase().includes(q)).slice(0,8) : BRANDS.slice(0,8);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(b => {
    const lo = b.toLowerCase(), idx = lo.indexOf(q);
    const label = q && idx !== -1
      ? b.slice(0,idx) + '<strong>' + b.slice(idx,idx+q.length) + '</strong>' + b.slice(idx+q.length) : b;
    return '<div onmousedown="selectBrandDetail(\'' + b.replace(/'/g,"\\'") + '\')" style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--tx1)">' + label + '</div>';
  }).join('');
  box.style.display = 'block';
}
function hideBrandSuggestionsDetail() { const b = document.getElementById('brandSuggestionsDetail'); if(b) b.style.display='none'; }
function selectBrandDetail(brand) {
  const input = document.getElementById('detailBrandInput');
  if (input) { input.value = brand; input.focus(); markDetailDirty(); }
  hideBrandSuggestionsDetail();
}

function toggleClosetSelectMode() {
  closetSelectMode = !closetSelectMode;
  closetSelectedIds.clear();
  const btn = document.getElementById('closetSelectBtn');
  if (btn) btn.textContent = closetSelectMode ? t('closet_done') : t('closet_select');
  const actionBar = document.getElementById('closetActionBar');
  const addBar   = document.getElementById('closetAddBar');
  if (actionBar) actionBar.style.display = closetSelectMode ? 'flex' : 'none';
  if (addBar)    addBar.style.display    = closetSelectMode ? 'none' : 'block';
  renderClosetGrid(closetActiveCategory);
}

function toggleItemSelect(id) {
  if (closetSelectedIds.has(id)) closetSelectedIds.delete(id);
  else closetSelectedIds.add(id);
  updateClosetActionBar();
  renderClosetGrid(closetActiveCategory);
}

function updateClosetActionBar() {
  const n = closetSelectedIds.size;
  const countEl  = document.getElementById('closetSelectedCount');
  const editBtn  = document.getElementById('closetEditBtn');
  const deleteBtn = document.getElementById('closetDeleteBtn');
  if (countEl)  countEl.textContent  = n ? n + ' selected' : 'Select items';
  if (editBtn)  { editBtn.disabled  = n !== 1; editBtn.style.opacity  = n === 1 ? '1' : '0.4'; }
  if (deleteBtn){ deleteBtn.disabled = n === 0; deleteBtn.style.opacity = n > 0  ? '1' : '0.4'; }
}

async function deleteSelectedItems() {
  const ids = [...closetSelectedIds];
  if (!ids.length) return;
  const deleteBtn = document.getElementById('closetDeleteBtn');
  if (deleteBtn) { deleteBtn.disabled = true; deleteBtn.textContent = 'Deleting…'; }
  for (const id of ids) {
    try {
      await fetch('/api/closet', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (currentSession?.access_token || '') },
        body: JSON.stringify({ id })
      });
      closetItems = closetItems.filter(i => i.id !== id);
    } catch(e) { console.error('[closet] delete error:', e.message); }
  }
  toggleClosetSelectMode();
  updateClosetProgress();
}

function editSelectedItem() {
  const [id] = [...closetSelectedIds];
  const item = closetItems.find(i => i.id === id);
  if (!item) return;
  toggleClosetSelectMode();
  showEditItemCard(item);
}

function showEditItemCard(item) {

  card.style.cssText = 'grid-column:1/-1;border:1.5px solid var(--border);border-radius:14px;overflow:visible;background:#fff;margin-bottom:8px';
  card.innerHTML =
    '<div style="display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">' +
      (item.image_url ? '<img src="' + item.image_url + '" style="width:60px;height:60px;object-fit:contain;border-radius:8px;background:var(--card);flex-shrink:0">' : '') +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:13px;font-weight:700;color:var(--tx1)">Edit item</div>' +
        '<div style="font-size:11px;color:var(--tx3)">' + item.category + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="padding:12px 14px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border)">' +
      '<div>' +

      '</div>' +
      '<div style="position:relative">' +
        '<label style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px">Brand</label>' +
        '<input id="editBrandInput" type="text" autocomplete="off" value="' + (item.brand||'').replace(/"/g,'&quot;') + '" placeholder="e.g. Nike, Zara…"' +
          ' oninput="filterBrandsEdit(this.value)"' +
          ' onfocus="filterBrandsEdit(this.value)"' +
          ' onblur="setTimeout(hideBrandSuggestionsEdit,150)"' +
          ' style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);box-sizing:border-box;outline:none">' +
        '<div id="brandSuggestionsEdit" style="display:none;position:absolute;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow-y:auto;max-height:160px;z-index:200;box-shadow:0 6px 16px rgba(0,0,0,0.08)"></div>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;padding:12px 14px">' +
      '<button onclick="saveEditItem(\'' + item.id + '\')" style="flex:1;padding:11px;background:var(--tx1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">Save changes</button>' +
      '<button onclick="document.getElementById(\'edit-item-card\')?.remove()" style="padding:11px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--font)">Cancel</button>' +
    '</div>';
  grid.insertBefore(card, grid.firstChild);
}

async function saveEditItem(id) {
  const name  = document.getElementById('editNameInput')?.value?.trim();
  const brand = document.getElementById('editBrandInput')?.value?.trim() || null;
  if (!name) return;
  const saveBtn = document.querySelector('#edit-item-card button');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
  try {
    await fetch('/api/closet', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (currentSession?.access_token || '') },
      body: JSON.stringify({ id, name, brand })
    });
    const item = closetItems.find(i => i.id === id);
    if (item) { item.name = name; item.brand = brand; }
    document.getElementById('edit-item-card')?.remove();
    renderClosetGrid(closetActiveCategory);
  } catch(e) {
    console.error('[closet] edit error:', e.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save changes'; }
  }
}

function filterBrandsEdit(val) {
  const box   = document.getElementById('brandSuggestionsEdit');
  const input = document.getElementById('editBrandInput');
  if (!box) return;
  const q = val.trim().toLowerCase();
  const matches = q ? BRANDS.filter(b => b.toLowerCase().includes(q)).slice(0,8) : BRANDS.slice(0,8);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(b => {
    const lo = b.toLowerCase(), idx = lo.indexOf(q);
    const label = q && idx !== -1
      ? b.slice(0,idx) + '<strong>' + b.slice(idx,idx+q.length) + '</strong>' + b.slice(idx+q.length)
      : b;
    return '<div onmousedown="selectBrandEdit(\'' + b.replace(/'/g,"\\'") + '\')" style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--tx1)">' + label + '</div>';
  }).join('');
  box.style.display = 'block';
}
function hideBrandSuggestionsEdit() { const b = document.getElementById('brandSuggestionsEdit'); if(b) b.style.display='none'; }
function selectBrandEdit(brand) {
  const input = document.getElementById('editBrandInput');
  if (input) { input.value = brand; input.focus(); }
  hideBrandSuggestionsEdit();
}

const BRANDS = [

  'Carhartt','Supreme','Palace','Stussy','Kith','New Balance','Asics','Vans',
  'Converse','Dr. Martens','Birkenstock','UGG','The North Face','Patagonia',
  'Arc\'teryx','Lululemon','Gymshark','Skims','Savage X Fenty','Victoria\'s Secret',
  'Aritzia','Everlane','Cos','& Other Stories','Monki','Weekday','Acne Studios',

];

// ── Multi-garment review (2+ items detected in one photo) ─────────────────
function showMultiItemReview(items) {
  window._multiItems = items.map((item, i) => ({ ...item, brand: null, checked: true, _idx: i }));
  document.getElementById('multi-review-sheet')?.remove();

  // Full-height bottom sheet, above the closet panel (z-index 1100)
  const sheet = document.createElement('div');
  sheet.id = 'multi-review-sheet';
  sheet.style.cssText =
    'position:fixed;bottom:0;left:50%;transform:translateX(-50%);' +
    'width:100%;max-width:480px;height:85vh;background:var(--bg);' +
    'border-radius:20px 20px 0 0;border-top:1px solid var(--border);' +
    'z-index:1100;display:flex;flex-direction:column;' +
    'box-shadow:0 -4px 32px rgba(0,0,0,0.18)';

  // Fixed header
  const header = document.createElement('div');
  header.style.cssText =
    'padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;' +
    'display:flex;justify-content:space-between;align-items:center';
  header.innerHTML =
    '<div>' +
      '<div style="font-size:16px;font-weight:700;color:var(--tx1);font-family:var(--font-display);letter-spacing:-0.01em">' + items.length + ' items found</div>' +
      '<div style="font-size:12px;color:var(--tx3);margin-top:2px">' + t('multi_edit_hint') + '</div>' +
    '</div>' +
    '<button onclick="cancelMultiReview()" style="font-size:22px;background:none;border:none;cursor:pointer;color:var(--tx2);padding:4px 8px;line-height:1">✕</button>';
  sheet.appendChild(header);

  // Scrollable rows — flex:1 so footer is always pinned at bottom
  const rowsArea = document.createElement('div');
  rowsArea.id = 'multi-review-rows';
  rowsArea.style.cssText = 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch';
  window._multiItems.forEach((item, i) => rowsArea.appendChild(_buildMultiRow(item, i)));
  sheet.appendChild(rowsArea);

  // Fixed footer
  const footer = document.createElement('div');
  footer.style.cssText =
    'padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;' +
    'padding-bottom:calc(12px + env(safe-area-inset-bottom,16px));display:flex;gap:8px';
  const addBtn = document.createElement('button');
  addBtn.id = 'multi-add-btn';
  addBtn.style.cssText =
    'flex:1;padding:14px;background:var(--tx1);color:#fff;border:none;border-radius:12px;' +
    'font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)';
  addBtn.textContent = 'Add ' + items.length + ' items to closet';
  addBtn.onclick = saveAllMultiItems;
  const cancelBtn = document.createElement('button');
  cancelBtn.style.cssText =
    'padding:14px 18px;background:var(--card);border:1.5px solid var(--border);' +
    'border-radius:12px;font-size:15px;cursor:pointer;font-family:var(--font);color:var(--tx2)';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = cancelMultiReview;
  footer.appendChild(addBtn);
  footer.appendChild(cancelBtn);
  sheet.appendChild(footer);

  document.body.appendChild(sheet);
}

function _buildMultiRow(item, i) {
  const row = document.createElement('div');
  row.id = 'multi-row-' + i;
  row.style.cssText =
    'padding:12px 16px;display:flex;gap:12px;align-items:flex-start;' +
    'border-bottom:1px solid var(--border)';

  // Standard checkbox — unambiguous include/skip toggle
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = true;
  cb.style.cssText =
    'width:20px;height:20px;margin-top:18px;flex-shrink:0;cursor:pointer;' +
    'accent-color:var(--tx1)';
  cb.onchange = () => {
    window._multiItems[i].checked = cb.checked;
    // Dim skipped rows so it's obvious they won't be saved
    row.style.opacity = cb.checked ? '1' : '0.35';
    _updateMultiCount();
  };

  // Square thumbnail
  const thumb = document.createElement('img');
  thumb.src = 'data:image/png;base64,' + item.cleanBase64;
  thumb.style.cssText =
    'width:60px;height:60px;object-fit:cover;border-radius:8px;background:var(--card);flex-shrink:0;margin-top:4px';

  // Name + brand + category
  const info = document.createElement('div');
  info.style.cssText = 'flex:1;min-width:0;display:flex;flex-direction:column;gap:6px';

  const catPill = document.createElement('span');
  catPill.style.cssText =
    'font-size:10px;padding:2px 8px;border-radius:20px;background:var(--card);' +
    'border:1px solid var(--border);color:var(--tx3);align-self:flex-start;text-transform:capitalize';
  catPill.textContent = item.garmentData.category;

  const nameIn = document.createElement('input');
  nameIn.type = 'text';
  nameIn.value = item.garmentData.name || '';
  nameIn.placeholder = 'Item name';
  nameIn.style.cssText =
    'width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;' +
    'font-size:13px;font-family:var(--font);box-sizing:border-box;outline:none';
  nameIn.oninput = () => { window._multiItems[i].garmentData.name = nameIn.value; };

  const brandIn = document.createElement('input');
  brandIn.type = 'text';
  brandIn.autocomplete = 'off';
  brandIn.placeholder = 'Brand (optional)';
  brandIn.style.cssText =
    'width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px 8px 0 0;' +
    'font-size:12px;font-family:var(--font);box-sizing:border-box;outline:none;color:var(--tx2)';

  const suggBox = document.createElement('div');
  suggBox.style.cssText =
    'display:none;background:#fff;border:1.5px solid var(--border);border-top:none;' +
    'border-radius:0 0 8px 8px;overflow-y:auto;max-height:140px;' +
    'box-shadow:0 6px 16px rgba(0,0,0,0.08)';

  const brandWrap = document.createElement('div');
  brandWrap.style.position = 'relative';
  brandWrap.appendChild(brandIn);
  brandWrap.appendChild(suggBox);

  const showBrandSugg = (val) => {
    const q = val.trim().toLowerCase();
    const matches = q ? BRANDS.filter(b => b.toLowerCase().includes(q)).slice(0, 8) : BRANDS.slice(0, 8);
    if (!matches.length) { suggBox.style.display = 'none'; return; }
    suggBox.innerHTML = matches.map(b => {
      const lo = b.toLowerCase(), idx = lo.indexOf(q);
      const label = q && idx !== -1
        ? b.slice(0, idx) + '<strong>' + b.slice(idx, idx + q.length) + '</strong>' + b.slice(idx + q.length)
        : b;
      return '<div style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--tx1)">' + label + '</div>';
    }).join('');
    suggBox.querySelectorAll('div').forEach((el, j) => {
      el.onmousedown = (e) => {
        e.preventDefault();
        brandIn.value = matches[j];
        window._multiItems[i].brand = matches[j];
        suggBox.style.display = 'none';
        brandIn.style.borderRadius = '8px';
      };
    });
    brandIn.style.borderRadius = '8px 8px 0 0';
    suggBox.style.display = 'block';
  };

  brandIn.oninput = () => { window._multiItems[i].brand = brandIn.value.trim() || null; showBrandSugg(brandIn.value); };
  brandIn.onfocus = () => showBrandSugg(brandIn.value);
  brandIn.onblur = () => setTimeout(() => { suggBox.style.display = 'none'; brandIn.style.borderRadius = '8px'; }, 150);

  info.appendChild(catPill);
  info.appendChild(nameIn);
  info.appendChild(brandWrap);

  // Remove button (× just removes the row entirely)
  const rem = document.createElement('button');
  rem.style.cssText =
    'width:28px;height:28px;border-radius:50%;background:var(--card);' +
    'border:1.5px solid var(--border);cursor:pointer;font-size:16px;line-height:1;' +
    'display:flex;align-items:center;justify-content:center;color:var(--tx3);flex-shrink:0;margin-top:4px';
  rem.textContent = '×';
  rem.title = 'Remove this item';
  rem.onclick = () => {
    window._multiItems[i].checked = false;
    window._multiItems[i]._removed = true;
    row.remove();
    _updateMultiCount();
  };

  row.appendChild(cb);
  row.appendChild(thumb);
  row.appendChild(info);
  row.appendChild(rem);
  return row;
}

function _updateMultiCount() {
  const n = (window._multiItems || []).filter(m => m.checked && !m._removed).length;
  const btn = document.getElementById('multi-add-btn');
  if (!btn) return;
  if (n === 0) { btn.textContent = 'Nothing selected'; btn.disabled = true; btn.style.opacity = '0.4'; }
  else { btn.textContent = 'Add ' + n + ' item' + (n > 1 ? 's' : '') + ' to closet'; btn.disabled = false; btn.style.opacity = '1'; }
}

async function saveAllMultiItems() {
  const toAdd = (window._multiItems || []).filter(m => m.checked && !m._removed);
  if (!toAdd.length) return;
  const btn = document.getElementById('multi-add-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  let saved = 0;
  for (const item of toAdd) {
    try {
      const r = await fetch('/api/closet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (currentSession?.access_token || '')
        },
        body: JSON.stringify({
          action: 'finalize',
          compositeBase64: item.cleanBase64,
          name: item.garmentData.name || 'Clothing Item',
          category: item.garmentData.category || 'tops',
          color: item.garmentData.color || null,
          brand: item.brand || null
        })
      }).then(r => r.json());
      if (r.error) throw new Error(r.error);
      closetItems.unshift({
        id: r.item.id,
        name: r.item.name,
        category: r.item.category,
        colors: [item.garmentData.color].filter(Boolean),
        image_url: r.item.imageUrl,
        brand: item.brand || null
      });
      saved++;
      if (btn) btn.textContent = 'Saving ' + saved + ' of ' + toAdd.length + '…';
    } catch(e) {
      console.error('[closet] multi finalize error:', e.message);
    }
  }
  cancelMultiReview();
  renderClosetGrid(closetActiveCategory);
  updateClosetProgress();
}

function cancelMultiReview() {
  window._multiItems = null;
  document.getElementById('multi-review-sheet')?.remove();
  if (closetItems.length === 0) {
    const emptyEl = document.getElementById('closetEmpty');
    if (emptyEl) emptyEl.style.display = 'block';
  }
}

function showBrandConfirmation(item) {
  const grid = document.getElementById('closetGrid');
  const emptyEl = document.getElementById('closetEmpty');
  if (emptyEl) emptyEl.style.display = 'none';

  const safeItem = JSON.stringify(item).replace(/"/g, '&quot;');

  const card = document.createElement('div');
  card.id = 'brand-confirm-card';
  card.style.cssText = 'grid-column:1/-1;border:1.5px solid var(--border);border-radius:14px;overflow:visible;background:#fff;margin-bottom:8px';

  card.innerHTML =
    '<div style="display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">' +
      '<img src="data:image/png;base64,' + (window._pendingCleanBase64 || '') + '" style="width:60px;height:60px;object-fit:contain;border-radius:8px;background:var(--card);flex-shrink:0">' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:13px;font-weight:700;color:var(--tx1);margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + item.name + '</div>' +
        '<div style="font-size:11px;color:var(--tx3)">' + item.category + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="padding:12px 14px;border-bottom:1px solid var(--border);position:relative">' +
      '<label style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">Brand</label>' +
      '<input id="brandInput" type="text" autocomplete="off" placeholder="e.g. Nike, Zara, Gucci…"' +
        ' oninput="filterBrands(this.value)"' +
        ' onfocus="filterBrands(this.value)"' +
        ' onblur="setTimeout(hideBrandSuggestions,150)"' +
        ' style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);box-sizing:border-box;outline:none">' +
      '<div id="brandSuggestions" style="display:none;position:absolute;left:14px;right:14px;background:#fff;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow-y:auto;max-height:180px;z-index:200;box-shadow:0 6px 16px rgba(0,0,0,0.08)"></div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;padding:12px 14px">' +
      '<button onclick="confirmAddItem(' + safeItem + ')" style="flex:1;padding:11px;background:var(--tx1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">' + t('add_save_closet') + '</button>' +
      '<button onclick="cancelAddItem()" style="padding:11px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--font)">' + t('add_cancel') + '</button>' +
    '</div>';

  grid.insertBefore(card, grid.firstChild);
}

function filterBrands(val) {
  const box = document.getElementById('brandSuggestions');
  const input = document.getElementById('brandInput');
  if (!box) return;
  const q = val.trim().toLowerCase();
  const matches = q
    ? BRANDS.filter(b => b.toLowerCase().includes(q)).slice(0, 8)
    : BRANDS.slice(0, 8);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(b => {
    const lo = b.toLowerCase(), idx = lo.indexOf(q);
    const label = q && idx !== -1
      ? b.slice(0, idx) + '<strong>' + b.slice(idx, idx + q.length) + '</strong>' + b.slice(idx + q.length)
      : b;
    return '<div onmousedown="selectBrand(\'' + b.replace(/'/g, "\\'") + '\')"' +
      ' style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--tx1)">' +
      label + '</div>';
  }).join('');
  const rect = input.getBoundingClientRect();
  box.style.width = rect.width + 'px';
  box.style.display = 'block';
}

function hideBrandSuggestions() {
  const box = document.getElementById('brandSuggestions');
  if (box) box.style.display = 'none';
}

function selectBrand(brand) {
  const input = document.getElementById('brandInput');
  if (input) { input.value = brand; input.focus(); }
  hideBrandSuggestions();
}

async function confirmAddItem(item) {
  const brandInput = document.getElementById('brandInput');
  const brand = brandInput?.value?.trim() || item.brand || null;

  const confirmBtn = document.querySelector('#brand-confirm-card button');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Saving…'; }

  try {
    const result = await fetch('/api/closet', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (currentSession?.access_token || '')
      },
      body: JSON.stringify({
        action: 'finalize',
        compositeBase64: window._pendingCleanBase64,
        name: item.name,
        category: item.category,
        color: item.color,
        brand
      })
    }).then(r => r.json());

    if (result.error) throw new Error(result.error);

    closetItems.unshift({
      id: result.item.id,
      name: result.item.name,
      category: result.item.category,
      colors: [item.color].filter(Boolean),
      image_url: result.item.imageUrl,
      brand
    });

    window._pendingCleanBase64 = null;
    document.getElementById('brand-confirm-card')?.remove();
    renderClosetGrid(closetActiveCategory);
    updateClosetProgress();

  } catch(err) {
    console.error('[closet] finalize error:', err.message);
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = '✓ Add to closet'; }
  }
}

function cancelAddItem() {
  window._pendingCleanBase64 = null;
  document.getElementById('brand-confirm-card')?.remove();
  if (closetItems.length === 0) {
    const emptyEl = document.getElementById('closetEmpty');
    if (emptyEl) emptyEl.style.display = 'block';
  }
}

checkSession();
</script>

<div id="closetPanel" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;height:90vh;background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--border);overflow:hidden;z-index:1001;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column">

  <!-- Header -->
  <div style="padding:12px 16px;
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;
    align-items:center;flex-shrink:0;
    position:sticky;top:0;background:var(--bg);
    z-index:10">
    <div id="closetTitle" style="font-size:16px;font-weight:700;color:var(--tx1)">My Closet</div>
    <div style="display:flex;align-items:center;gap:4px">
      <button id="closetSelectBtn" onclick="toggleClosetSelectMode()"
        style="font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:6px 10px;font-family:var(--font)">Select</button>
      <button onclick="toggleCloset()"
        style="font-size:22px;background:none;border:none;cursor:pointer;color:var(--tx2);line-height:1;padding:6px">✕</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="padding:10px 16px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    flex-shrink:0">
    <div style="font-size:12px;
      color:var(--tx2);margin-bottom:6px;
      display:flex;justify-content:space-between">
      <span>
        <span id="closetCount">0</span> items
      </span>
      <span id="closetHint" style="color:var(--tx3)">
        Add 10 for better suggestions
      </span>
    </div>
    <div style="height:4px;
      background:var(--border);
      border-radius:2px;overflow:hidden">
      <div id="closetProgressBar"
        style="height:100%;width:0%;
        background:var(--accent);
        border-radius:2px;
        transition:width 0.4s ease">
      </div>
    </div>
  </div>

  <!-- Contextual nudge -->
  <div id="closet-nudge"></div>

  <!-- Category tabs -->
  <div style="display:flex;
    overflow-x:auto;flex-shrink:0;
    border-bottom:1px solid var(--border);
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch">
    <style>
      .cat-tab {
        padding:10px 14px;
        font-size:13px;
        font-weight:500;
        color:var(--tx3);
        white-space:nowrap;
        cursor:pointer;
        border:none;
        border-bottom:2px solid transparent;
        background:none;
        font-family:var(--font);
        flex-shrink:0;
      }
      .cat-tab.active {
        color:var(--tx1);
        border-bottom-color:var(--tx1);
        font-weight:700;
      }
    </style>
    <button class="cat-tab active"
      onclick="filterCloset('all',this)">
      All
    </button>
    <button class="cat-tab"
      onclick="filterCloset('tops',this)">
      Tops
    </button>
    <button class="cat-tab"
      onclick="filterCloset('bottoms',this)">
      Bottoms
    </button>
    <button class="cat-tab"
      onclick="filterCloset('dresses',this)">
      Dresses
    </button>
    <button class="cat-tab"
      onclick="filterCloset('shoes',this)">
      Shoes
    </button>
    <button class="cat-tab"
      onclick="filterCloset('outerwear',this)">
      Outerwear
    </button>
    <button class="cat-tab"
      onclick="filterCloset('accessories',this)">
      Accessories
    </button>
  </div>

  <!-- Item grid -->
  <div id="closetGrid"
    style="flex:1;overflow-y:auto;
    padding:12px;display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;align-content:start">

    <!-- Empty state -->
    <div id="closetEmpty" style="grid-column:1/-1;text-align:center;padding:52px 24px 32px;display:flex;flex-direction:column;align-items:center">
      <div style="margin-bottom:20px"><svg viewBox="0 0 72 72" width="72" height="72" fill="none" stroke="var(--ink-faint)" stroke-width="1.5" aria-hidden="true"><path d="M56 52H16a2 2 0 0 1-1.4-3.42L36 29 57.4 48.58A2 2 0 0 1 56 52z"/><path d="M36 29V21"/><circle cx="36" cy="18.5" r="2.5"/></svg></div>
      <div id="closetEmptyTitle" style="font-size:17px;font-weight:700;color:var(--tx1);margin-bottom:8px">Your closet is empty</div>
      <div id="closetEmptyBody" style="font-size:13px;color:var(--tx2);line-height:1.55;margin-bottom:24px;max-width:240px">Add your first item and Lumen will start building outfits from your own wardrobe</div>
      <button id="closetAddFirstBtn" onclick="showPhotoGuide()" style="padding:13px 28px;background:var(--tx1);color:#fff;border:none;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">Add my first item</button>
    </div>
  </div>

  <!-- Select-mode action bar (hidden until Select is tapped) -->
  <div id="closetActionBar" style="display:none;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);align-items:center;gap:10px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))">
    <span id="closetSelectedCount" style="flex:1;font-size:13px;font-weight:600;color:var(--tx2)">Select items</span>
    <button id="closetEditBtn" onclick="editSelectedItem()" disabled
      style="padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--tx1);opacity:0.4">Edit</button>
    <button id="closetDeleteBtn" onclick="deleteSelectedItems()" disabled
      style="padding:9px 18px;border-radius:10px;border:none;background:#ff3b30;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);opacity:0.4">Delete</button>
  </div>

  <!-- Normal add button -->
  <div id="closetAddBar" style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);position:sticky;bottom:0;padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px))">
    <button onclick="showPhotoGuide()"
      style="display:flex;width:100%;
      align-items:center;justify-content:center;
      gap:8px;padding:14px;
      background:var(--tx1);color:#fff;
      border:none;border-radius:12px;
      font-size:15px;font-weight:600;
      cursor:pointer;font-family:var(--font)">
      <span style="font-size:18px">+</span>
      <span id="closetAddItemText">Add clothing item</span>
    </button>

    <input type="file" id="closetUpload"
      accept="image/*"
      style="display:none"
      onchange="handleClosetUpload(event)">
  </div>
</div>

<!-- Item detail sheet -->
<div id="itemDetailSheet" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;height:92vh;background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--border);overflow-y:auto;z-index:1002;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)">
  <div id="itemDetailInner"></div>
</div>

</body>
</html>
