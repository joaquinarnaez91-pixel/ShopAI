<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lumen — Your Personal Style Guide</title>
<style>
:root {
  --bg:#FFFFFF; --card:#F5F5F5; --photo:#F0EEEC;
  --tx1:#111111; --tx2:#666666; --tx3:#999999;
  --accent:#E8490F; --border:#E5E5E5;
  --font:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html,body { height:100%; overflow:hidden; background:#FFFFFF; color:var(--tx1); font-family:var(--font); -webkit-font-smoothing:antialiased; }

.lumen-app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* HEADER */
.l-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid #E5E5E5; background:#FFFFFF; flex-shrink:0; z-index:10; }
.l-logo { font-family:'Fraunces',Georgia,serif; font-weight:700; font-size:22px; color:#111111; letter-spacing:-0.3px; display:flex; align-items:center; gap:0; }
.l-dot { width:8px; height:8px; border-radius:50%; background:#E8490F; display:inline-block; margin-left:4px; flex-shrink:0; margin-bottom:2px; }
.l-profile-btn { width:36px; height:36px; border-radius:50%; background:var(--card); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--tx2); }

/* CHAT */
.l-chat { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:12px 0; padding-bottom:160px; scroll-behavior:smooth; background:#FFFFFF; }
.l-chat::-webkit-scrollbar { display:none; }

/* MESSAGES */
.l-msg { display:flex; align-items:flex-end; gap:8px; padding:3px 16px; margin-bottom:2px; }
.l-msg.ai { flex-direction:row; }
.l-msg.user { flex-direction:row-reverse; }
.l-av { width:28px; height:28px; border-radius:50%; background:var(--tx1); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-bottom:2px; }
.l-av.user { background:#E8E8E8; }
.l-bbl { max-width:78%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; }
.l-bbl.ai { background:var(--card); color:var(--tx1); border-bottom-left-radius:4px; }
.l-bbl.user { background:var(--tx1); color:#fff; border-bottom-right-radius:4px; }

/* CHIPS */
.l-chips { display:flex; flex-wrap:wrap; gap:7px; padding:4px 16px 8px 52px; }
.l-chip { padding:7px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg); font-size:13px; font-weight:500; color:var(--tx1); cursor:pointer; font-family:var(--font); transition:all 0.15s; white-space:nowrap; }
.l-chip:active { background:var(--tx1); color:#fff; border-color:var(--tx1); }

/* PRODUCT CARD ROW */
.l-card-row { padding:8px 16px; display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; cursor:grab; user-select:none; }
.l-card-row::-webkit-scrollbar { display:none; }
.l-card-row.dragging { cursor:grabbing; scroll-snap-type:none; }

/* PRODUCT CARD */
.l-card { flex-shrink:0; width:220px; border-radius:16px; border:1.5px solid var(--border); background:var(--bg); overflow:hidden; cursor:pointer; scroll-snap-align:start; box-shadow:0 2px 12px rgba(0,0,0,0.07); transition:transform 0.15s,box-shadow 0.15s; position:relative; }
.l-card:active { transform:scale(0.97); }
.l-card-img { width:100%; height:200px; background:var(--photo); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--tx3); }
.l-card-img img { width:100%; height:100%; object-fit:cover; }
.l-card-body { padding:10px 12px 12px; }
.l-card-brand { font-size:10px; font-weight:700; color:var(--tx3); text-transform:uppercase; letter-spacing:0.5px; }
.l-card-name { font-size:13px; font-weight:600; color:var(--tx1); margin:2px 0 4px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.l-card-price-row { display:flex; align-items:center; justify-content:space-between; }
.l-card-price { font-size:15px; font-weight:700; color:var(--tx1); }
.l-card-indicator { font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; }
.l-card-indicator.LOW { background:#E8F5E9; color:#2E7D32; }
.l-card-indicator.USUAL { background:#FFF8E1; color:#F57F17; }
.l-card-indicator.HIGH { background:#FFEBEE; color:#C62828; }
.l-card-source { font-size:11px; color:var(--tx3); margin-top:4px; }
.l-card-stars { font-size:11px; color:var(--tx2); margin-top:2px; }
.l-card-pin { position:absolute; top:8px; right:8px; width:32px; height:32px; border-radius:50%; background:white; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
.l-card-pin.saved { background:var(--tx1); }
.l-card-pin.saved svg { stroke:white; }
.l-expert-badge { position:absolute; top:8px; left:8px; background:var(--accent); color:white; font-size:9px; font-weight:700; padding:3px 7px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }

/* INPUT BAR */
.l-input-bar { position:fixed; bottom:0; left:0; right:0; width:100%; max-width:480px; margin:0 auto; padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom,16px)); background:#FFFFFF; border-top:1px solid #E5E5E5; display:flex; align-items:center; gap:8px; z-index:10; box-sizing:border-box; }
.l-input { flex:1; padding:10px 16px; border-radius:24px; border:1.5px solid var(--border); background:var(--card); font-size:15px; font-family:var(--font); color:var(--tx1); outline:none; }
.l-input:focus { border-color:var(--tx1); }
.l-send-btn { width:40px; height:40px; border-radius:50%; background:var(--tx1); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.l-icon-btn { width:40px; height:40px; border-radius:50%; background:var(--card); border:1.5px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* PROFILE SHEET */
.l-profile-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; background:var(--bg); border-radius:20px 20px 0 0; border-top:1px solid var(--border); padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px)); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:100; }
.l-profile-sheet.open { transform:translateX(-50%) translateY(0); }

/* DEEP DIVE */
.l-deep-dive { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:480px; height:85vh; background:var(--bg); border-radius:20px 20px 0 0; overflow-y:auto; transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); z-index:200; }
.l-deep-dive::-webkit-scrollbar { display:none; }
.l-deep-dive.open { transform:translateX(-50%) translateY(0); }

/* OVERLAY */
.l-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.l-overlay.show { opacity:1; pointer-events:all; }

/* Style quiz cards */
.sq-card { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:10px; border:1.5px solid var(--border); margin-bottom:8px; cursor:pointer; background:#fff; transition:all 0.15s; }
.sq-card.sel { border-color:var(--tx1); background:var(--card); }

/* Enrich loading */
.enrich-progress { height:2px; background:var(--border); border-radius:1px; margin:10px 0 4px; overflow:hidden; }
.enrich-progress-fill { height:100%; width:35%; background:var(--tx3); border-radius:1px; animation:enrichSlide 1.4s ease-in-out infinite; }
@keyframes enrichSlide { 0%{transform:translateX(-200%);} 100%{transform:translateX(500%);} }

/* TABLET: un-fix input bar once viewport is wider than mobile */
@media (min-width:481px) {
  .l-input-bar { position:sticky; bottom:0; left:auto; right:auto; width:100%; max-width:100%; }
}

/* DESKTOP */
@media (min-width:768px) {
  .lumen-app { max-width:100%; flex-direction:row; }
  .l-sidebar { width:280px; border-right:1px solid var(--border); padding:24px 20px; flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .l-main { flex:1; display:flex; flex-direction:column; height:100vh; max-width:520px; }
  .l-input-bar { position:sticky; bottom:0; left:auto; right:auto; max-width:none; }
  .l-profile-sheet, .l-deep-dive { max-width:560px; }
}
</style>

<script>
// ── Supabase config (anon key is public by design) ────────────────────────
const SUPABASE_URL      = 'https://mipdomxenbsmgrsitote.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcGRvbXhlbmJzbWdyc2l0b3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MjM0MzUsImV4cCI6MjA5NTQ5OTQzNX0.5BOsjNK60UMz8woU-tHyNloPACX6lIKOrBF4BgdLdKw';

// ── State ─────────────────────────────────────────────────────────────────
let products        = [];
let savedItems      = [];   // saved product ids
let savedProducts   = [];   // saved product objects
let messages        = [];
let userProfile     = {};
let enrichCache     = {};
let isLoading       = false;
let enrichLoadTimer = null;
let deepDiveOpen    = false;
let profileOpen     = false;
let currentDiveProduct = null;
let tryOnPersonDataUri = null;
let _outfitCheckMode = false;
let _occasionMode = false;
let currentProfile = {};

// Closet
let closetItems = [];
let closetSelectMode = false;
const closetSelectedIds = new Set();
let _detailItem = null;
let closetVisible = false;
let closetActiveCategory = 'all';

// Onboarding
let onboardingStep   = 0;
let onboardingActive = true;
let styleProfile = { undertone:null, season:null, palette:[], aesthetic:null };

// User context chips
let userGender        = null;
let userAge           = null;
let userCurrentSeason = null;

// Photo upload
let photoBase64   = null;
let photoMimeType = null;

// Auth state
let currentUser    = null;
let currentSession = null;
let currentAuthTab = 'login';

// API mode (auto-detected from message content, invisible to user)
let currentMode = 'style';

const ENRICH_LABELS = [
  'Scanning expert reviews…',
  'Analyzing value for money…',
  'Checking buyer feedback…',
  'Building your expert report…'
];

// ── Utilities ─────────────────────────────────────────────────────────────
function stars(r) {
  const f = Math.round(r || 0);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function parseMarkdown(t) {
  if (!t) return '';
  return t
    .replace(/SEARCH_MODELS:\{[\s\S]*?\}/g, '')
    .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '')
    .replace(/```[\s\S]*?```/g, '')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
    .replace(/^\|\s*(.*?)\s*\|$/gm, row => {
      if (/^[\s|:-]+$/.test(row)) return '';
      const cells = row.split('|').filter(c => c.trim()).map(c => '<td style="padding:4px 8px;border:1px solid var(--border);font-size:12px">' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/gs, m => '<table style="border-collapse:collapse;width:100%;margin:8px 0">' + m + '</table>')
    .replace(/^[-•]\s+(.+)$/gm, '<div style="padding:2px 0 2px 12px;border-left:2px solid var(--accent)">$1</div>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function shortName(p) {
  let n = p.name || '';
  const b = (p.brand || '').toLowerCase();
  if (n.toLowerCase().startsWith(b + ' ' + b)) n = n.slice(p.brand.length + 1);
  if (n.toLowerCase().startsWith(b)) n = p.brand + n.slice(p.brand.length);
  return n.length > 40 ? n.slice(0, 38) + '…' : n;
}

function extractProfile(msgs) {
  const t = msgs.map(m => typeof m.content === 'string' ? m.content : '').join(' ').toLowerCase();
  const p = {};
  const sz  = t.match(/size\s+(\d+(?:\.\d+)?)/);
  const bud = t.match(/under\s+\$?(\d+)/);
  if (sz)  p.shoeSize = sz[1];
  if (bud) p.budget   = parseInt(bud[1]);
  if (t.includes('wide'))   p.width = 'wide';
  if (t.includes('narrow')) p.width = 'narrow';
  ['running','hiking','basketball','tennis','casual','walking'].forEach(u => { if (t.includes(u)) p.useCase = u; });
  return p;
}

function detectApiMode(text) {
  return /\b(find|shop|buy|search|where (to )?(buy|get|find)|price|store|purchase|sneaker|boot|sandal|shoe|clothing|outfit pieces|pieces for)\b/i.test(text) ? 'discover' : 'style';
}

function detectCategory(text) {
  const t = text.toLowerCase();
  if (/dress|gown|jumpsuit|romper/.test(t)) return 'dresses';
  if (/skirt|pants|jeans|shorts|leggings|trousers|chinos|jogger/.test(t)) return 'bottoms';
  if (/shirt|tee|top|blouse|sweater|hoodie|jacket|coat|blazer/.test(t)) return 'tops';
  if (/shoe|boot|sneaker|sandal|heel|loafer|oxford/.test(t)) return 'shoes';
  if (/bag|purse|tote|backpack|wallet/.test(t)) return 'bags';
  if (/watch|ring|necklace|bracelet|earring|jewelry|accessory/.test(t)) return 'accessories';
  return 'clothing';
}

function startEnrichAnim() {
  stopEnrichAnim();
  let i = 0;
  enrichLoadTimer = setInterval(() => {
    i = (i + 1) % ENRICH_LABELS.length;
    const el = document.querySelector('.enrich-loading-label');
    if (el) el.textContent = ENRICH_LABELS[i];
  }, 2000);
}

function stopEnrichAnim() {
  clearInterval(enrichLoadTimer);
  enrichLoadTimer = null;
}

// ── Chat helpers ──────────────────────────────────────────────────────────
function chat() { return document.getElementById('lumenChat'); }

function scrollToLatest() {
  const chatEl = document.getElementById('lumenChat');
  if (!chatEl) return;
  setTimeout(() => {
    chatEl.scrollTop = chatEl.scrollHeight + 200;
  }, 200);
}

function addMessage(role, text, id) {
  const isAI  = role === 'ai';
  const idAttr = id ? ` id="${id}"` : '';
  const html = `<div class="l-msg ${isAI ? 'ai' : 'user'}"${idAttr}>` +
    `<div class="l-av ${isAI ? '' : 'user'}">${isAI ? '✨' : '😊'}</div>` +

// ── API ───────────────────────────────────────────────────────────────────
async function apiFetch(path, body, signal) {
  const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
  const token   = session?.access_token || '';
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify(body),
    ...(signal ? { signal } : {})
  });
  if (!res.ok) throw new Error(path + ' ' + res.status);
  return res.json();
}

async function enrichProduct(p) {
  if (enrichCache[p.id]) return enrichCache[p.id];
  const data = await apiFetch('/api/enrich', { product:p, userProfile });
  enrichCache[p.id] = data;
  return data;
}

function applyCardScroll(row) {
  let isDown = false, startX = 0, scrollLeft = 0;
  row.addEventListener('mousedown', e => {
    isDown = true;
    row.classList.add('dragging');
    startX = e.pageX - row.offsetLeft;
    scrollLeft = row.scrollLeft;
  });
  row.addEventListener('mouseleave', () => { isDown = false; row.classList.remove('dragging'); });
  row.addEventListener('mouseup', () => { isDown = false; row.classList.remove('dragging'); });
  row.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - row.offsetLeft;
    row.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });
}

function addTasteFeedback(prods) {
  const c = chat();
  if (!c || !prods.length) return;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;padding:4px 16px 8px;align-items:center';
  const label = document.createElement('span');
  label.style.cssText = 'font-size:12px;color:var(--tx3)';
  label.textContent = 'These picks:';
  wrap.appendChild(label);
  const buttons = [
    { emoji: '❤️', label: 'Love it', type: 'love' },
    { emoji: '👍', label: 'Good', type: 'good' },
    { emoji: '👎', label: 'Not for me', type: 'not_for_me' }
  ];
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.style.cssText = 'padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;transition:all 0.15s';
    btn.textContent = b.emoji + ' ' + b.label;
    btn.onclick = () => {
      wrap.querySelectorAll('button').forEach(el => el.style.opacity = '0.4');
      btn.style.opacity = '1';
      btn.style.borderColor = 'var(--tx1)';
      btn.style.background = 'var(--card)';
      const token = localStorage.getItem('lumen_token');
      fetch('/api/taste-signal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
        body: JSON.stringify({
          signal_type: b.type,
          content: { products: prods.map(p => ({ brand: p.brand, name: p.name, category: p.category })) }
        })
      }).catch(() => {});
    };
    wrap.appendChild(btn);
  });
  c.appendChild(wrap);
}

function toggleSave(id) {
  const p = products.find(x => x.id === id) || savedProducts.find(x => x.id === id);
  if (!p) return;
  if (savedItems.includes(id)) {
    savedItems = savedItems.filter(x => x !== id);
    savedProducts = savedProducts.filter(x => x.id !== id);
  } else {
    savedItems.push(id);
    if (!savedProducts.find(x => x.id === id)) savedProducts.push(p);
  }
  const btn = document.getElementById('pin-' + id);
  if (btn) {
    btn.classList.toggle('saved', savedItems.includes(id));
    const svg = btn.querySelector('svg');
    if (svg) svg.setAttribute('fill', savedItems.includes(id) ? 'currentColor' : 'none');
  }
  updateSidebarSaved();
}

function detectGarmentPart(p) {
  const text = ((p.name || '') + ' ' + (p.category || '')).toLowerCase();
  if (/dress|gown|jumpsuit|romper|bodysuit/.test(text)) return 'dresses';
  if (/skirt|pants|jeans|shorts|leggings|trousers|chinos|jogger/.test(text)) return 'lower_body';
  return 'upper_body';
}

        (p && p.img ? `<img src="${p.img}" style="width:80px;height:80px;object-fit:cover;border-radius:8px">` : '') +
      `</div>` +
    `</div>` +
    `<button onclick="startTryOn()" style="display:block;width:100%;padding:14px;background:var(--tx1);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px">Try It On →</button>` +

}

async function startTryOn() {
  const p = currentDiveProduct;
  if (!p || !tryOnPersonDataUri) return;
  renderTryOnProcessing('Starting…');

  try {
    const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
    const token = session?.access_token || '';
    const res = await fetch('/api/warp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        personUrl: tryOnPersonDataUri,
        productUrl: p.img,
        part: detectGarmentPart(p)
      })
    });
    const data = await res.json();
    if (!data.predictionId) throw new Error(data.error || 'No prediction ID returned');
    renderTryOnProcessing('Processing…');
    const resultUrl = await pollWarp(data.predictionId);
    renderTryOnResult(resultUrl);
  } catch (err) {
    renderTryOnError(err.message);
  }
}

async function pollWarp(predictionId) {
  const session = JSON.parse(localStorage.getItem('lumen_session') || '{}');
  const token = session?.access_token || '';
  for (let i = 0; i < 40; i++) {
    await new Promise(r => setTimeout(r, 3000));
    const res = await fetch('/api/warp?id=' + encodeURIComponent(predictionId), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.status === 'succeeded') return data.resultUrl;
    if (data.status === 'failed' || data.status === 'canceled') throw new Error(data.error || 'Try-on failed');
    renderTryOnProcessing(data.status === 'processing' ? 'Fitting garment…' : 'Starting…');
  }
  throw new Error('Timed out — try again');
}

function renderTryOnProcessing(statusText) {
  const el = document.getElementById('tryOnContent');

  el.innerHTML =
    `<div style="text-align:center;padding:40px 0">` +

      `<div id="tryOnStatus" style="font-size:14px;color:var(--tx2)">${statusText}</div>` +
      `<div style="font-size:12px;color:var(--tx3);margin-top:8px">This takes 30–90 seconds…</div>` +
    `</div>`;
}

function renderOutfitCards(text) {
  if (!text || (!/Outfit\s+\d+/i.test(text) && !/\*\*Outfit/i.test(text))) return false;
  const c = chat();
  if (!c) return false;

  const outfitBlocks = [];
  const regex = /\*?\*?Outfit\s+(\d+)[^*\n]*[-—]([^\n]+)\*?\*?\n([\s\S]*?)(?=\*?\*?Outfit\s+\d+|$)/gi;
  let match;
  while ((match = regex.exec(text)) !== null) {
    outfitBlocks.push({ number:match[1], occasion:match[2].trim(), content:match[3].trim() });
  }
  if (!outfitBlocks.length) return false;

  outfitBlocks.forEach(outfit => {
    const card = document.createElement('div');
    card.style.cssText = 'margin:6px 16px;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;background:#fff;';

      `<div style="font-size:14px;font-weight:600;color:var(--tx1);margin-top:2px">${outfit.occasion}</div>`;

    const body = document.createElement('div');
    body.style.cssText = 'padding:10px 14px 12px;font-size:13px;color:var(--tx2);line-height:1.5;white-space:pre-wrap;';
    body.textContent = outfit.content;

    const actions = document.createElement('div');
    actions.style.cssText = 'padding:8px 14px 12px;display:flex;gap:6px;flex-wrap:wrap;';
    ['🛍️ Shop this look', '📌 Save outfit'].forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'l-chip';
      btn.style.cssText = 'font-size:11px;padding:5px 10px;';
      btn.textContent = label;
      btn.onclick = () => {
        if (label.includes('Shop')) sendMessage('Find me the pieces for the ' + outfit.occasion + ' outfit: ' + outfit.content);
        else addMessage('ai', '📌 Outfit ' + outfit.number + ' saved!');
      };
      actions.appendChild(btn);
    });

    card.appendChild(header);
    card.appendChild(body);
    card.appendChild(actions);
    c.appendChild(card);

  setTimeout(() => {
    addMessage('ai', 'Want to find actual pieces for any of these looks?');
    renderChipGroup([
      { label:'🛍️ Shop these looks',  msg:'Find clothes for my outfit formulas' },
      { label:'✨ Refine my style',    msg:'Tell me more about my style and give me more outfits' },
      { label:'📷 Visual search',      action:'camera' },
    ], msg => sendMessage(msg));
    scrollToLatest();
  }, 400);

  return true;
}

async function handlePhotoUpload(e) {
  console.log('[photo] outfitCheckMode:', _outfitCheckMode, 'file:', e.target.files[0]?.name);
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const lastAiMsg = document.querySelector(
    '#lumenChat .l-msg.ai:last-of-type .l-bbl'
  )?.textContent || '';

  const isOutfitCheck =
    lastAiMsg.includes('Show me what you\'re wearing') ||
    lastAiMsg.includes('honest take') ||
    lastAiMsg.includes('what I\'m wearing') ||
    _outfitCheckMode === true;

  if (isOutfitCheck) {
    handleOutfitCheck(file);
    return;
  }

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const dataUrl  = ev.target.result;
    const base64   = dataUrl.split(',')[1];
    const mimeType = file.type;
    const c = chat();

    if (c) {
      const preview = document.createElement('div');
      preview.className = 'l-msg user';
      preview.innerHTML =
        '<div class="l-av user">😊</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">' +
        `<img src="${dataUrl}" style="width:120px;height:120px;object-fit:cover;border-radius:12px;border:1.5px solid var(--border)">` +
        '<div class="l-bbl user" style="font-size:12px">Analyzing your photo...</div></div>';
      c.appendChild(preview);
      scrollToLatest();
    }

    const loadingId = 'vision-loading-' + Date.now();
    addMessage('ai', '🔍 Let me take a look at this...', loadingId);

    try {
      const result = await fetch('/api/vision', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + (currentSession?.access_token || '') },
        body: JSON.stringify({ imageBase64:base64, mimeType, mode:'identify' })
      }).then(r => r.json());

      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());

      if (result.error) { addMessage('ai', 'I had trouble analyzing that photo. Try a clearer image or describe what you see.'); return; }
      renderVisionResults(result, dataUrl);

    } catch(err) {
      document.querySelectorAll('#' + loadingId).forEach(el => el.remove());
      addMessage('ai', 'Something went wrong. Please try again.');
    }
  };
  reader.readAsDataURL(file);
}

    document.getElementById(loadingId)?.remove();

// ── Direct search (Claude brain → SerpAPI) ───────────────────────────────
async function handleDirectSearch(text) {
  addMessage('user', text);

  const loadingId = 'search-' + Date.now();
  addMessage('ai', '🧠 Finding the best options for you...', loadingId);
  scrollToLatest();

  try {
    const profileContext = currentProfile && Object.keys(currentProfile).length
      ? 'User profile: ' + JSON.stringify({
          season:    currentProfile.color_season,
          undertone: currentProfile.undertone,
          palette:   currentProfile.palette,
          aesthetic: currentProfile.aesthetic,
          gender:    currentProfile.gender,
          age:       currentProfile.age_range,
          size:      currentProfile.size_info
        })
      : '';

    const brainMessages = [{
      role: 'user',
      content: profileContext + '\n\n' +
        'The user needs: ' + text + '\n\n' +
        'Based on their specific profile, recommend 4 specific products to search for. ' +
        'Each must match their color palette, aesthetic, and body type.\n\n' +
        'Output ONLY this JSON, nothing else:\n' +
        'SEARCH_MODELS:{"models":[' +
        '{"brand":"Everlane","model":"Slim Chino","query":"Everlane slim chino dark olive mens",' +
        '"category":"bottoms","why":"Olive sits perfectly in your Autumn palette"}' +
        ']}'
    }];

    const brainResponse = await apiFetch('/api/chat', { messages: brainMessages, tab: 'discover' });
    const content = brainResponse.content || '';
    const match = content.match(/SEARCH_MODELS:\s*(\{[\s\S]*?\})\s*$/);

    if (!match) {
      console.warn('[search] no SEARCH_MODELS, using fallback');
      await fallbackDirectSearch(text, loadingId);
      return;
    }

    let modelData;
    try { modelData = JSON.parse(match[1]); }
    catch(e) { await fallbackDirectSearch(text, loadingId); return; }

    const products = await apiFetch('/api/search', {
      models: modelData.models || [],
      userProfile: currentProfile || {}
    });

    document.getElementById(loadingId)?.remove();

    if (!products?.length) {
      addMessage('ai', 'I couldn\'t find exact matches right now. Try describing it differently.');
      return;
    }

    const firstWhy = modelData.models?.[0]?.why || '';
    addMessage('ai',
      'Here\'s what I found for you' + (firstWhy ? ' — ' + firstWhy : '') + ' 👇'
    );
    renderProductsInline(products,
      'Picked for your ' + (currentProfile?.color_season || 'style'));

    setTimeout(() => {
      renderChipGroup([
        { label: '💰 Lower budget',  msg: 'Find me cheaper: ' + text },
        { label: '🏆 More premium',  msg: 'Find me premium version: ' + text },
        { label: '🎨 Different color', msg: 'Find me different color: ' + text },
        { label: '📷 Rate my outfit',  msg: 'I want feedback on my outfit' }
      ], (msg) => sendMessage(msg));
      scrollToLatest();
    }, 300);

  } catch(e) {
    document.getElementById(loadingId)?.remove();
    console.error('[search] brain error:', e.message);
    addMessage('ai', 'Something went wrong. Try again.');
  }
}

async function fallbackDirectSearch(text, loadingId) {
  const query = text.replace(/^find me( this)?:/i, '').trim();

  const products = await apiFetch('/api/search', {
    models: [{
      brand: '',
      model: query,
      query: query,
      category: detectCategory(query),
      why: 'Matches your style profile'
    }],
    userProfile: currentProfile || {}
  }).catch(() => []);

  document.getElementById(loadingId)?.remove();

  if (!products?.length) {
    addMessage('ai', 'No matches found. Try describing it differently.');
    return;
  }

  addMessage('ai', 'Here\'s what I found 👇');
  renderProductsInline(products, 'For you');
}

async function generateOutfitImages(outfitEls, occasion, palette) {
  const promises = outfitEls.map(async ({ cell, outfit }) => {
    try {
      const result = await fetch('/api/generate-preview', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (currentSession?.access_token || '')
        },
        body: JSON.stringify({
          mode: 'occasion',
          description: outfit.description,
          occasion: occasion.occasion,
          palette: (palette.colors || []).map(c => c.name).join(', '),
          gender: occasion.gender || 'women'
        })
      }).then(r => r.json());

      if (result.url) {
        const img = document.createElement('img');
        img.src = result.url;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0';
        img.onload = () => scrollToLatest();
        const placeholder = cell.querySelector('div:not([style*="absolute"])');
        if (placeholder) placeholder.remove();
        cell.insertBefore(img, cell.firstChild);
      }
    } catch(e) {
      console.error('[occasion] image gen failed:', e.message);
    }
  });
  await Promise.allSettled(promises);
}

async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;

  // Occasion detection
  const occasionKeywords = ['baby shower', 'wedding', 'birthday', 'dinner', 'brunch', 'graduation', 'beach', 'cocktail', 'gala', 'party', 'date night', 'work event', 'conference', 'casual', 'dress code', 'what to wear'];
  const hasOccasion = occasionKeywords.some(k => text.toLowerCase().includes(k));
  const isOccasionRequest = hasOccasion || text.toLowerCase().includes('have an event') || text.toLowerCase().includes('what should i wear') || text.toLowerCase().includes('help me dress');
  if (isOccasionRequest) _occasionMode = true;

  if (onboardingActive && onboardingStep === 0) onboardingStep = 1;

  addMessage('user', text);
  messages.push({ role:'user', content:text });
  const typId = showTyping();

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 25000);

  try {
    const chatMessages = savedProducts.length > 0
      ? [...messages.slice(0, -1), {
          role:'user',
          content: messages[messages.length - 1].content +
            '\n\n[Context: User has saved these items: ' +
            savedProducts.filter(p => savedItems.includes(p.id)).map(p => p.brand + ' ' + shortName(p)).join(', ') + ']'
        }]
      : messages;

    let apiMessages = chatMessages;
    const hadPhoto = !!photoBase64;
    if (photoBase64) {
      const last = apiMessages[apiMessages.length - 1];
      apiMessages = [
        ...apiMessages.slice(0, -1),
        { role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:photoMimeType, data:photoBase64 } },
            { type:'text', text:typeof last.content === 'string' ? last.content : text }
        ]}
      ];
      photoBase64 = null; photoMimeType = null;
    }

    const tab = currentMode = detectApiMode(text);
    const userContext = [
      userGender        ? 'Gender: ' + userGender : null,
      userAge           ? 'Age: '    + userAge    : null,
      userCurrentSeason ? 'Color season: ' + userCurrentSeason : null,
    ].filter(Boolean).join(', ') || undefined;

    const data = await apiFetch('/api/chat', { messages:apiMessages, tab, userContext }, controller.signal);
    clearTimeout(timeoutId);
    removeTyping(typId);
    const content = data.content || '';

    // Parse PROFILE_UPDATE
    const profMatch = content.match(/PROFILE_UPDATE:\s*(\{[\s\S]*?\})/);
    if (profMatch) {
      try {
        const cleaned = profMatch[1].replace(/'/g, '"').replace(/(\w+):/g, '"$1":').replace(/"(\w+)":\s*"([^"]*)"/g, '"$1":"$2"');
        const prof = JSON.parse(cleaned);
        if (prof.season)  { styleProfile.season    = prof.season;    userProfile.season    = prof.season; }
        if (prof.undertone){ styleProfile.undertone = prof.undertone; userProfile.undertone = prof.undertone; }
        if (prof.palette && Array.isArray(prof.palette)) {
          styleProfile.palette = prof.palette;
          userProfile.palette  = prof.palette;
          renderPaletteInChat(prof.palette, prof.season);
        }
        if (prof.style) userProfile.style = prof.style;
        currentProfile = { ...currentProfile, ...prof };
        updateProfileDisplay();
        if (onboardingStep === 1 && prof.palette?.length > 0) { onboardingStep = 2; setTimeout(() => renderStyleQuiz(), 600); }
        if (hadPhoto && prof.palette?.length > 0) {
          setTimeout(() => {
            renderChipGroup([
              { label:'👗 Build outfits for me', msg:'Based on my colors, give me 3 outfit formulas' },
              { label:'🛍️ Shop my palette',     msg:'Find clothes in my color palette' },
              { label:'✨ See my style quiz',    msg:null, action:'quiz' },
            ], (msg, action) => { if (action === 'quiz') renderStyleQuiz(); else sendMessage(msg); });
            scrollToLatest();
          }, 400);
        }
      } catch(e) { console.error('[profile] parse error:', e.message); }
    }

    // Diagnostics
    console.log('[occasion] raw response length:', content?.length);
    console.log('[occasion] has COLOR_PALETTE:', content?.includes('COLOR_PALETTE:'));
    console.log('[occasion] has OCCASION_OUTFITS:', content?.includes('OCCASION_OUTFITS:'));

    // Parse occasion tokens (COLOR_PALETTE + OCCASION_OUTFITS)
    const paletteStart  = content.indexOf('COLOR_PALETTE:');
    const occasionStart = content.indexOf('OCCASION_OUTFITS:');
    const hasOccasionTokens = paletteStart !== -1 && occasionStart !== -1 && paletteStart < occasionStart;

    if (hasOccasionTokens) {
      // Extract raw strings for each token
      const paletteRaw = content
        .slice(paletteStart + 'COLOR_PALETTE:'.length, occasionStart)
        .replace(/^```(?:json)?\s*/m, '').replace(/\s*```\s*$/m, '')
        .trim();
      const occasionRaw = content
        .slice(occasionStart + 'OCCASION_OUTFITS:'.length)
        .replace(/^```(?:json)?\s*/m, '').replace(/\s*```\s*$/m, '')
        .trim();

      console.log('[occasion] paletteRaw length:', paletteRaw.length, '| first 80:', paletteRaw.slice(0, 80));
      console.log('[occasion] occasionRaw length:', occasionRaw.length, '| first 80:', occasionRaw.slice(0, 80));

      // Always show clean text BEFORE the tokens — never show raw token text
      const displayText = content.slice(0, paletteStart)
        .replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').trim();
      if (displayText) addMessage('ai', displayText);
      messages.push({ role:'assistant', content });

      let paletteJson = null, occasionJson = null;
      try { paletteJson  = JSON.parse(paletteRaw); }
      catch(e) { console.error('[occasion] palette parse error:', e.message, '| raw:', paletteRaw.slice(0, 120)); }
      try { occasionJson = JSON.parse(occasionRaw); }
      catch(e) { console.error('[occasion] occasion parse error:', e.message, '| raw:', occasionRaw.slice(0, 120)); }

      console.log('[occasion] paletteJson ok:', !!paletteJson);
      console.log('[occasion] occasionJson ok:', !!occasionJson);

      if (paletteJson && occasionJson) {
        console.log('[occasion] rendering card for:', occasionJson.occasion);
        setTimeout(() => renderOccasionCard(paletteJson, occasionJson), 300);
      }

    } else {
      // No occasion tokens — normal SEARCH_MODELS / text path
      const tokMatch = content.match(/SEARCH_MODELS:\s*(\{[\s\S]*\})/);
      if (tokMatch) {
        const displayText = content.slice(0, content.indexOf('SEARCH_MODELS:')).replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').replace(/\s*```[a-z]*\s*$/g, '').trim();
        if (displayText) addMessage('ai', displayText);
        messages.push({ role:'assistant', content });
        userProfile = { ...userProfile, ...extractProfile(messages) };
        updateProfileDisplay();

        let modelData;
        try { modelData = JSON.parse(tokMatch[1]); }
        catch(e) { addMessage('ai', 'Let me search for the best options for you…'); isLoading = false; return; }

        const srchTypId = showTyping();
        try {
          const found = await apiFetch('/api/search', { models:modelData.models || [], userProfile });
          removeTyping(srchTypId);
          if (!found.length) { addMessage('ai', "I couldn't find exact matches right now. Could you try rephrasing?"); isLoading = false; return; }
          products = found;
          const useCase = (products[0]?.category) || 'your needs';
          addMessage('ai', products[0]?.why
            ? 'Here are my picks for you — each selected for ' + useCase + '. Real prices across retailers.'
            : 'I found ' + products.length + ' options — here are your top picks:');
          renderProductsInline(products, 'Expert picks for you');
          renderChipGroup([
            { label:'🔍 Compare these',    msg:'Compare the items shown' },
            { label:'💰 Lower budget',     msg:'Show me lower budget options' },
            { label:'🏆 More premium',     msg:'Show me more premium options' },
            { label:'🎨 Specific color',   msg:'I want a specific color' },
          ], msg => sendMessage(msg));
        } catch(e) {
          removeTyping(srchTypId);
          addMessage('ai', 'I had trouble searching right now. Please try again in a moment.');
        }

      } else {
        const displayContent = content.replace(/PROFILE_UPDATE:\{[\s\S]*?\}/g, '').trim();
        messages.push({ role:'assistant', content });
        addMessage('ai', displayContent);
        renderOutfitCards(displayContent);
        if (onboardingActive && onboardingStep === 3) onboardingActive = false;
      }
    }

  } catch(e) {
    clearTimeout(timeoutId);
    removeTyping(typId);
    console.error('[chat] error:', e.message);
    addMessage('ai', 'Sorry, I hit a snag. Could you try that again?');
  }

  isLoading = false;
}

// ── Input wiring ──────────────────────────────────────────────────────────
function wireInput(inp, btn) {
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
  });
  if (btn) btn.addEventListener('click', go);
  function go() {
    const v = inp.value.trim();
    if (!v) return;
    inp.value = '';
    sendMessage(v);
  }
}

async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }

  try {
    if (currentAuthTab === 'signup') {
      const signupRes  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'signup', email, password }) });
      const signupData = await signupRes.json();
      if (!signupRes.ok) { errEl.textContent = signupData.error || 'Signup failed'; return; }
    }
    const res  = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'login', email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Something went wrong'; return; }
    localStorage.setItem('lumen_session', JSON.stringify(data.session));
    localStorage.setItem('lumen_user',    JSON.stringify(data.user));
    document.getElementById('auth-screen').remove();
    currentUser = data.user; currentSession = data.session;
    init();
  } catch(e) {
    errEl.textContent = 'Connection error. Try again.';
  }
}

async function signInWithGoogle() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { error } = await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:window.location.origin } });
    if (error) { const e = document.getElementById('auth-error'); if (e) e.textContent = 'Google sign-in failed. Try email instead.'; }
  } catch(e) {
    const errEl = document.getElementById('auth-error');
    if (errEl) errEl.textContent = 'Google sign-in unavailable. Try email instead.';
  }
}

// ── Session management ────────────────────────────────────────────────────
async function checkSession() {
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data:{ session } } = await supabase.auth.getSession();
    if (session) {
      localStorage.setItem('lumen_session', JSON.stringify(session));
      localStorage.setItem('lumen_user',    JSON.stringify(session.user));
      currentUser = session.user; currentSession = session;
      init(); return;
    }
  } catch(e) { /* fall through */ }

  const stored = localStorage.getItem('lumen_session');
  if (!stored) { showAuthScreen(); return; }

  try {
    const session = JSON.parse(stored);
    const res = await fetch('/api/auth', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + (session.access_token || '') },
      body:JSON.stringify({ action:'verify' })
    });
    if (res.ok) {
      const data = await res.json();
      currentUser = data.user; currentSession = session;
      init();
    } else {
      localStorage.removeItem('lumen_session');
      showAuthScreen();
    }
  } catch(e) { showAuthScreen(); }
}

function compressImage(dataUrl, maxDim, quality) {
  maxDim = maxDim || 1200;
  quality = quality || 0.8;
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else        { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const out = canvas.toDataURL('image/jpeg', quality);
      resolve({ base64: out.split(',')[1], mimeType: 'image/jpeg' });
    };
    img.src = dataUrl;
  });
}

function composeEditorialCard(cleanBase64, brandName) {
  return new Promise(function(resolve, reject) {
    const img = new Image();
    img.onload = function() {
      const W = 800, H = 1000, STRIP = 60;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Warm sand background
      ctx.fillStyle = '#EDE0D0';
      ctx.fillRect(0, 0, W, H);

      // Scale garment to 75% of canvas height, centered in upper area
      const availH = H - STRIP;
      const targetH = availH * 0.75;
      const scale = Math.min(targetH / img.height, (W * 0.8) / img.width);
      const dw = img.width * scale;
      const dh = img.height * scale;
      const dx = (W - dw) / 2;
      const dy = (availH - dh) / 2;

      // Garment drop shadow
      ctx.shadowColor = 'rgba(0,0,0,0.08)';
      ctx.shadowBlur = 24;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 8;
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Bottom white strip
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, H - STRIP, W, STRIP);

      // Brand label: LUMEN | BRANDNAME
      const label = 'LUMEN | ' + (brandName ? brandName.toUpperCase() : 'LUMEN');
      ctx.fillStyle = '#111111';
      ctx.font = '700 18px -apple-system, "Helvetica Neue", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if ('letterSpacing' in ctx) ctx.letterSpacing = '2px';
      ctx.fillText(label, W / 2, H - STRIP / 2);

      resolve(canvas.toDataURL('image/png').split(',')[1]);
    };
    img.onerror = reject;
    img.src = 'data:image/png;base64,' + cleanBase64;
  });
}

async function handleClosetUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const { base64, mimeType } = await compressImage(ev.target.result);

    const grid = document.getElementById('closetGrid');
    const emptyEl = document.getElementById('closetEmpty');
    if (emptyEl) emptyEl.style.display = 'none';

    const loadingCell = document.createElement('div');
    loadingCell.id = 'prettify-loading';
    loadingCell.style.cssText =
      'aspect-ratio:3/4;border-radius:10px;background:var(--card);' +
      'display:flex;flex-direction:column;align-items:center;' +
      'justify-content:center;border:1.5px dashed var(--accent);gap:6px';
    loadingCell.innerHTML =
      '<div style="font-size:22px">✨</div>' +
      '<div style="font-size:9px;color:var(--accent);font-weight:700;' +
      'text-align:center;text-transform:uppercase;letter-spacing:0.5px">' +
      'Prettifying...</div>';

    grid.insertBefore(loadingCell, grid.firstChild);

    try {
      const result = await fetch('/api/closet', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (currentSession?.access_token || '')
        },
        body: JSON.stringify({ imageBase64: base64, mimeType })
      }).then(r => r.json());

      document.getElementById('prettify-loading')?.remove();

      if (result.error) {
        console.error('[closet]', result.error);
        if (closetItems.length === 0 && emptyEl) emptyEl.style.display = 'block';
        return;
      }

      window._pendingCleanBase64 = result.cleanBase64;
      showBrandConfirmation(result.garmentData);

    } catch(err) {
      document.getElementById('prettify-loading')?.remove();
      console.error('[closet] upload failed:', err.message);
      if (closetItems.length === 0 && emptyEl) emptyEl.style.display = 'block';
    }
  };
  reader.readAsDataURL(file);
}

}

function filterBrands(val) {
  const box = document.getElementById('brandSuggestions');
  const input = document.getElementById('brandInput');
  if (!box) return;
  const q = val.trim().toLowerCase();
  const matches = q
    ? BRANDS.filter(b => b.toLowerCase().includes(q)).slice(0, 8)
    : BRANDS.slice(0, 8);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(b => {
    const lo = b.toLowerCase(), idx = lo.indexOf(q);
    const label = q && idx !== -1
      ? b.slice(0, idx) + '<strong>' + b.slice(idx, idx + q.length) + '</strong>' + b.slice(idx + q.length)
      : b;
    return '<div onmousedown="selectBrand(\'' + b.replace(/'/g, "\\'") + '\')"' +
      ' style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--tx1)">' +
      label + '</div>';
  }).join('');
  const rect = input.getBoundingClientRect();
  box.style.width = rect.width + 'px';
  box.style.display = 'block';
}

function hideBrandSuggestions() {
  const box = document.getElementById('brandSuggestions');
  if (box) box.style.display = 'none';
}

function selectBrand(brand) {
  const input = document.getElementById('brandInput');
  if (input) { input.value = brand; input.focus(); }
  hideBrandSuggestions();
}

async function confirmAddItem(item) {
  const brandInput = document.getElementById('brandInput');
  const brand = brandInput?.value?.trim() || item.brand || null;

  const confirmBtn = document.querySelector('#brand-confirm-card button');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '✨ Saving…'; }

  try {
    const result = await fetch('/api/closet', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (currentSession?.access_token || '')
      },
      body: JSON.stringify({
        action: 'finalize',
        compositeBase64: window._pendingCleanBase64,
        name: item.name,
        category: item.category,
        color: item.color,
        brand
      })
    }).then(r => r.json());

    if (result.error) throw new Error(result.error);

    closetItems.unshift({
      id: result.item.id,
      name: result.item.name,
      category: result.item.category,
      colors: [item.color].filter(Boolean),
      image_url: result.item.imageUrl,
      brand
    });

    window._pendingCleanBase64 = null;
    document.getElementById('brand-confirm-card')?.remove();
    renderClosetGrid(closetActiveCategory);
    updateClosetProgress();

  } catch(err) {
    console.error('[closet] finalize error:', err.message);
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = '✓ Add to closet'; }
  }
}

function cancelAddItem() {
  window._pendingCleanBase64 = null;
  document.getElementById('brand-confirm-card')?.remove();
  if (closetItems.length === 0) {
    const emptyEl = document.getElementById('closetEmpty');
    if (emptyEl) emptyEl.style.display = 'block';
  }
}

checkSession();
</script>

<div id="closetPanel" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;height:90vh;background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--border);overflow:hidden;z-index:1001;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column">

  <!-- Header -->
  <div style="padding:12px 16px;
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;
    align-items:center;flex-shrink:0;
    position:sticky;top:0;background:var(--bg);
    z-index:10">
    <div style="font-size:16px;font-weight:700;color:var(--tx1)">My Closet</div>
    <div style="display:flex;align-items:center;gap:4px">
      <button id="closetSelectBtn" onclick="toggleClosetSelectMode()"
        style="font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:6px 10px;font-family:var(--font)">Select</button>
      <button onclick="toggleCloset()"
        style="font-size:22px;background:none;border:none;cursor:pointer;color:var(--tx2);line-height:1;padding:6px">✕</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div style="padding:10px 16px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    flex-shrink:0">
    <div style="font-size:12px;
      color:var(--tx2);margin-bottom:6px;
      display:flex;justify-content:space-between">
      <span>
        <span id="closetCount">0</span> items
      </span>
      <span style="color:var(--tx3)">
        Add 10 for better suggestions
      </span>
    </div>
    <div style="height:4px;
      background:var(--border);
      border-radius:2px;overflow:hidden">
      <div id="closetProgressBar"
        style="height:100%;width:0%;
        background:var(--accent);
        border-radius:2px;
        transition:width 0.4s ease">
      </div>
    </div>
  </div>

  <!-- Category tabs -->
  <div style="display:flex;
    overflow-x:auto;flex-shrink:0;
    border-bottom:1px solid var(--border);
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch">
    <style>
      .cat-tab {
        padding:10px 14px;
        font-size:13px;
        font-weight:500;
        color:var(--tx3);
        white-space:nowrap;
        cursor:pointer;
        border:none;
        border-bottom:2px solid transparent;
        background:none;
        font-family:var(--font);
        flex-shrink:0;
      }
      .cat-tab.active {
        color:var(--tx1);
        border-bottom-color:var(--tx1);
        font-weight:700;
      }
    </style>
    <button class="cat-tab active"
      onclick="filterCloset('all',this)">
      All
    </button>
    <button class="cat-tab"
      onclick="filterCloset('tops',this)">
      Tops
    </button>
    <button class="cat-tab"
      onclick="filterCloset('bottoms',this)">
      Bottoms
    </button>
    <button class="cat-tab"
      onclick="filterCloset('dresses',this)">
      Dresses
    </button>
    <button class="cat-tab"
      onclick="filterCloset('shoes',this)">
      Shoes
    </button>
    <button class="cat-tab"
      onclick="filterCloset('outerwear',this)">
      Outerwear
    </button>
    <button class="cat-tab"
      onclick="filterCloset('accessories',this)">
      Accessories
    </button>
  </div>

  <!-- Item grid -->
  <div id="closetGrid"
    style="flex:1;overflow-y:auto;
    padding:12px;display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;align-content:start">

    <!-- Empty state -->
    <div id="closetEmpty"
      style="grid-column:1/-1;
      text-align:center;padding:48px 20px;
      color:var(--tx3)">
      <div style="font-size:40px;
        margin-bottom:12px">👗</div>
      <div style="font-size:14px;
        font-weight:600;color:var(--tx2);
        margin-bottom:6px">
        Your closet is empty
      </div>
      <div style="font-size:12px;
        line-height:1.5">
        Add your clothes and Lumen will<br>
        build outfits from what you own
      </div>
    </div>
  </div>

  <!-- Select-mode action bar (hidden until Select is tapped) -->
  <div id="closetActionBar" style="display:none;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);align-items:center;gap:10px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))">
    <span id="closetSelectedCount" style="flex:1;font-size:13px;font-weight:600;color:var(--tx2)">Select items</span>
    <button id="closetEditBtn" onclick="editSelectedItem()" disabled
      style="padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--tx1);opacity:0.4">Edit</button>
    <button id="closetDeleteBtn" onclick="deleteSelectedItems()" disabled
      style="padding:9px 18px;border-radius:10px;border:none;background:#ff3b30;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);opacity:0.4">Delete</button>
  </div>

  <!-- Normal add button -->
  <div id="closetAddBar" style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);position:sticky;bottom:0;padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px))">
    <button onclick="showPhotoGuide()"
      style="display:flex;width:100%;
      align-items:center;justify-content:center;
      gap:8px;padding:14px;
      background:var(--tx1);color:#fff;
      border:none;border-radius:12px;
      font-size:15px;font-weight:600;
      cursor:pointer;font-family:var(--font)">
      <span style="font-size:18px">+</span>
      Add clothing item
    </button>

    <input type="file" id="closetUpload"
      accept="image/*"
      style="display:none"
      onchange="handleClosetUpload(event)">
  </div>
</div>

<!-- Item detail sheet -->
<div id="itemDetailSheet" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;height:92vh;background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--border);overflow-y:auto;z-index:1002;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1)">
  <div id="itemDetailInner"></div>
</div>

</body>
</html>
